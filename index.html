<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IO: FIRST CONTACT — VR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
canvas{display:block;width:100%;height:100%;}

/* ── Pre-VR overlay (visible only on flat screen before entering VR) ── */
#overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 60%,rgba(8,4,2,.97) 0%,#000 100%);
  font-family:'Courier New',monospace;z-index:10;
}
.iotitle{
  font-size:clamp(3rem,9vw,7rem);color:#ff6600;letter-spacing:.5em;
  text-shadow:0 0 40px #ff4400,0 0 100px #ff2200;
  animation:tp 3s ease-in-out infinite;
}
@keyframes tp{0%,100%{text-shadow:0 0 40px #ff4400,0 0 100px #ff2200}50%{text-shadow:0 0 60px #ff6600,0 0 140px #ff3300}}
.sub{color:rgba(255,160,50,.45);font-size:.78rem;letter-spacing:.35em;margin:.5rem 0 .3rem;}
.sub2{color:rgba(55,205,255,.32);font-size:.68rem;letter-spacing:.28em;margin-bottom:2.4rem;}
.scanline{width:280px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,102,0,.6),transparent);margin-bottom:2.4rem;animation:sc 2s ease-in-out infinite;}
@keyframes sc{0%,100%{opacity:.3}50%{opacity:1}}
#vr-btn{
  font-family:'Courier New',monospace;font-size:.9rem;letter-spacing:.25em;
  color:#ff6600;background:none;border:1px solid rgba(255,102,0,.5);
  padding:14px 52px;cursor:pointer;text-transform:uppercase;
  transition:all .2s;outline:none;
}
#vr-btn:hover:not(:disabled){background:rgba(255,102,0,.1);box-shadow:0 0 22px rgba(255,102,0,.4);border-color:#ff6600;}
#vr-btn:disabled{opacity:.3;cursor:not-allowed;}
.ctrlinfo{
  margin-top:2.4rem;color:rgba(255,160,50,.26);font-size:.64rem;
  letter-spacing:.12em;text-align:center;line-height:2.1;
}
.ctrlinfo span{color:rgba(255,160,50,.5);}
#status{
  margin-top:1.2rem;font-size:.62rem;letter-spacing:.18em;
  color:rgba(55,205,255,.35);min-height:1.2em;text-align:center;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Flat-screen overlay: visible before entering VR, invisible inside headset -->
<div id="overlay">
  <div class="iotitle">IO</div>
  <div class="sub">FIRST CONTACT · JUPITER SYSTEM · 2184 CE</div>
  <div class="sub2">META QUEST 3 · WEBXR IMMERSIVE VR</div>
  <div class="scanline"></div>
  <button id="vr-btn" disabled>CHECKING VR SUPPORT…</button>
  <div class="ctrlinfo">
    <span>LEFT STICK</span> Move &nbsp;·&nbsp; <span>LEFT GRIP</span> Sprint<br>
    <span>RIGHT STICK ←→</span> Snap Turn 45° &nbsp;·&nbsp; <span>RIGHT TRIGGER</span> Fire<br>
    <span>A BUTTON</span> Super Jump &nbsp;·&nbsp; Raise left wrist to read HUD
  </div>
  <div id="status"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// ══════════════════════════════════════════════════════════════════════
//  IO : FIRST CONTACT  ·  WebXR VR Edition
//  Optimised for Meta Quest 3 / Quest Pro (72–90 Hz target)
//
//  Architecture:
//  • Single scene — weapon lives in world space on rightGrip
//  • Dolly group   — camera + controllers move together on terrain
//  • XR head-tracking adds physical head pose on top of dolly.y
//  • Canvas-texture wrist HUD on left grip (raise wrist to read)
//  • Handedness-aware controller assignment (works regardless of
//    which Quest controller connects first)
//  • GLSL: Io terrain FBM · Jupiter bands + GRS · laser bolt rim-glow
// ══════════════════════════════════════════════════════════════════════

// ── Scene globals ──────────────────────────────────────────────────────
let renderer, scene, camera, dolly, clock;
let terrainU, jupU;
let terrainMesh=null;          // reference for floor raycasting
const floorRay=new THREE.Raycaster(); // downward ray for terrain collision

// Controllers — assigned by handedness on 'connected' event
let rightCtrl=null, leftCtrl=null, rightGrip=null, leftGrip=null;
// Raw XRInputSource references — stored on 'connected' so haptic() can
// call .gamepad.hapticActuators[0].pulse() directly without any lookup.
let rightXRSource=null, leftXRSource=null;

// Weapon (attached to rightGrip after connection)
let weaponGroup=null, energyCells=[], muzzleLight=null, muzzleSphere=null;

// Wrist HUD (attached to leftGrip after connection)
let hudCanvas, hudCtx, hudTexture, hudMesh=null;

// Damage vignette sphere (child of dolly)
let damageSphere;

// ── Game state ──────────────────────────────────────────────────────────
let gameActive=false, gameOverState=false;
let health=100, maxHealth=100, shield=100, maxShield=100;
let score=0, kills=0, wave=1, lastSpawn=0, waveThresh=500, shieldRegen=0, healthRegen=0;
// ── Combo multiplier ─────────────────────────────────────────────
let comboCount=0, comboTimer=0, comboMult=1;
// ── Boss system ──────────────────────────────────────────────────
let bossEnemy=null, bossPhase=1;
// ── Upgrade system ───────────────────────────────────────────────
let pendingUpgrade=false, upgradePhase=false, upgradeCards=[];
// ── Player energy shield ─────────────────────────────────────────
let shieldActive=false, shieldDur=0, shieldRecharge=0, shieldMesh=null, xWasPressed=false;
const SHIELD_DUR=3.0, SHIELD_RECHARGE=10.0;
// ── Weapon degradation ───────────────────────────────────────────
let weaponCondition={}; // type → 0..100
// ── Day/night cycle ──────────────────────────────────────────────
let sunLight=null, ambientLight=null, dayNightAngle=0;
const DAY_NIGHT_PERIOD=600; // seconds (10 minutes)
// ── Spatial audio tracks ─────────────────────────────────────────
let enemyHumNodes={};  // enemyId → {osc,gain,pan}
let musicNodes=null;
// ── Impact craters ───────────────────────────────────────────────
let craters=[];
// ── Jump physics — Io surface gravity = 1/6 Earth (1.635 m/s²) ──
let playerVY=0, isGrounded=true;
const IO_GRAVITY=1.635;        // units/s²
const JUMP_VEL=Math.sqrt(2*IO_GRAVITY*50); // launch speed to reach 50 units peak
let enemies=[], pBolts=[], eBolts=[], explosions=[];
let lavaLights=[], plumeList=[];
let rockGroups=[];    // [{meshes:[lod0,lod1], lastLOD}] for distance-based LOD
let volcanoLODs=[];   // [{meshes:[lod0,lod1,lod2], lastLOD}] per volcano
// Volcano colliders — XZ centre, base radius, height, base world Y
// Populated in buildVolcanoes() after terrain heights are known.
let volcanoColliders=[];

// ── Input state ────────────────────────────────────────────────────────
let snapCooldown=0, leftGripHeld=false, aWasPressed=false, bWasPressed=false;
// ── Dash state ────────────────────────────────────────────────────
let dashActive=false, dashRemaining=0, dashCooldown=0;
const DASH_SPEED=50;    // units/s (covers 10 m in 0.2 s)
const DASH_DIST=10;     // metres
const DASH_DUR=DASH_DIST/DASH_SPEED; // 0.2 s
const DASH_COOLDOWN=2.0;// seconds between dashes
const DASH_STOP_R=2.0;  // enemy proximity that cancels dash
const _dashDir=new THREE.Vector3(); // normalised forward direction of dash
let fireCooldown=0, mfTimer=0;
let kickZ=0, kickRX=0; // weapon recoil springs

// ── Super Blast charge state ──────────────────────────────────────
let triggerHeld=false, chargeTime=0;
const CHARGE_MAX=8.0;
let chargeOsc=null, chargeGain=null;
let shockwaves=[];
let chargeSphere=null, chargeBoids=null, chargeBoidData=[];
let waveBillboard=null;
let gameOverBillboard=null;

// ── Weapon system ─────────────────────────────────────────────────────
let currentWeapon='laser';
let weaponAmmoMap={laser:Infinity};
let grenadeProjs=[], rocketProjs=[], cannonProjs=[], slashWaves=[];
// ── Sword slash wave velocity tracking ──────────────────────────
// Track right grip world position each frame to compute swing velocity.
const _prevGripPos=new THREE.Vector3();
const _currGripPos=new THREE.Vector3();
let gripVelX=0, gripVelY=0, gripVelZ=0; // world-space velocity components
const SLASH_SPEED_THRESHOLD=4.0;  // m/s — minimum swing speed to fire a slash wave
const SLASH_COOLDOWN=0.28;        // seconds between slash waves (prevent spam on slow swings)
let slashCooldown=0;
let gripPosInitialised=false;
let pickups=[];
let flameCooldown=0;

const SPEED=5.5, SPRINT=9.0, SENS_SNAP=Math.PI/4; // 45° snap turns

// Quest 3 controller pitch offset in radians.
// The grip space -Z axis already points roughly "forward" when you hold the
// controller, but the physical controller body tilts downward ~30°.
// WEAPON_PITCH rotates the barrel down in grip space to match, so a neutral
// comfortable wrist position aims the barrel straight ahead.
// Tune this if still uncomfortable: more negative = barrel aims lower.
const WEAPON_PITCH = -0.45; // ≈ -26°  (was -0.18 / -10°)

// ── Terrain helpers (JS mirrors GLSL) ─────────────────────────────────
const fr=x=>x-Math.floor(x);
const lp=(a,b,t)=>a+(b-a)*t;
function h2(x,y){return fr(Math.sin(x*127.1+y*311.7)*43758.5453);}
function n2(x,y){
  const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
  const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
  return lp(lp(h2(ix,iy),h2(ix+1,iy),ux),lp(h2(ix,iy+1),h2(ix+1,iy+1),ux),uy);
}
function fbm(x,y){let v=0,a=.5,sx=0,sy=100;for(let i=0;i<6;i++){v+=a*n2(x+sx,y+sy);x*=2;y*=2;sx+=31.7;sy+=17.3;a*=.5;}return v;}
function getH(x,z){return fbm(x*.05,z*.05)*8+fbm(x*.2,z*.2)*2;}

// ── Terrain height matching the GPU exactly ───────────────────────────────
// PlaneGeometry(700,700,100,100) has vertices every 7 units in XZ.
// The GPU renders by linearly interpolating between those vertex heights.
// On concave terrain, getH() sampled between vertices returns a value
// LOWER than the interpolated mesh surface — causing camera clipping.
// Fix: bilinearly interpolate between the 4 surrounding mesh vertices,
// exactly replicating what the vertex shader produces.
// A 0.3-unit floor buffer ensures the camera (XR adds ~1.7 m head height
// on top of dolly.y) sits at least 2 m above the visible terrain surface.
const TERRAIN_GRID = 10.0;         // vertex spacing (700 / 70 segments)
const TERRAIN_FLOOR_BUFFER = 0.3;  // dolly offset → camera ≈ terrain + 2 m

function getTerrainMeshHeight(x, z) {
  // Snap to surrounding vertex grid
  const gx = Math.floor(x / TERRAIN_GRID) * TERRAIN_GRID;
  const gz = Math.floor(z / TERRAIN_GRID) * TERRAIN_GRID;
  const fx = (x - gx) / TERRAIN_GRID;   // 0..1 fractional position
  const fz = (z - gz) / TERRAIN_GRID;
  // Bilinear interpolation of the 4 surrounding vertex heights
  const h00 = getH(gx,          gz);
  const h10 = getH(gx + TERRAIN_GRID, gz);
  const h01 = getH(gx,          gz + TERRAIN_GRID);
  const h11 = getH(gx + TERRAIN_GRID, gz + TERRAIN_GRID);
  return h00*(1-fx)*(1-fz) + h10*fx*(1-fz) + h01*(1-fx)*fz + h11*fx*fz;
}

function sampleGround(x, z) {
  // Return the true mesh surface height + floor buffer so the camera
  // never clips through the rendered terrain.
  return getTerrainMeshHeight(x, z) + TERRAIN_FLOOR_BUFFER;
}

// ════════════════════════════════════════════════════════════════
//  GLSL SHADERS
// ════════════════════════════════════════════════════════════════

// ── Io Terrain ──────────────────────────────────────────────────
const ioV=`
varying vec2 vUv;varying float vH;varying vec3 vN,vPos;
void main(){
  vUv=uv;
  vH=position.y;       // height already baked into vertex positions on CPU
  vPos=position;
  vN=normalMatrix*normal; // normals computed by geo.computeVertexNormals() on CPU
  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;

const ioF=`
uniform float uTime;
varying vec2 vUv;varying float vH;varying vec3 vN,vPos;
float hh(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float nn(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(hh(i),hh(i+vec2(1,0)),f.x),mix(hh(i+vec2(0,1)),hh(i+vec2(1,1)),f.x),f.y);}
float fb(vec2 p){float v=0.,a=.5;vec2 s=vec2(0,100);for(int i=0;i<6;i++){v+=a*nn(p+s);p*=2.;s+=vec2(31.7,17.3);a*=.5;}return v;}
void main(){
  vec2 p=vPos.xz*.05;
  float n1=fb(p),n2=fb(p*3.+vec2(5.2,1.3)),n3=fb(p*9.+vec2(1.7,9.2)+uTime*.008),n4=fb(p*.5+vec2(3.1,7.4));
  vec3 sY=vec3(.92,.84,.10),sO=vec3(.88,.44,.05),sR=vec3(.72,.18,.06),sW=vec3(.94,.91,.82);
  vec3 bas=vec3(.16,.09,.04),basG=vec3(.28,.22,.15),lava=vec3(1.,.32,.01),lC=vec3(1.,.85,.15);
  vec3 col=mix(sY,sO,smoothstep(.3,.7,n1));
  col=mix(col,sR,smoothstep(.55,.75,n2)*.5);col=mix(col,bas,smoothstep(.6,.8,n2)*.7);
  col=mix(col,basG,smoothstep(.65,.85,n4)*.4);col=mix(col,sW,smoothstep(.78,.92,n1)*.9);
  float cal=smoothstep(3.5,-1.,vH);col=mix(col,bas,cal*.9);
  float crack=1.-smoothstep(0.,.07,abs(n3-.48));
  float lE=clamp(crack*(cal*1.5+.25),0.,1.);
  vec3 lCol=mix(lava,lC,smoothstep(.4,1.,lE));col=mix(col,lCol,lE);
  vec3 N=normalize(vN),L=normalize(vec3(.35,.85,.25));
  float diff=max(.18,dot(N,L));
  float sp=pow(max(0.,dot(reflect(-L,N),vec3(0.,0.,-1.))),12.)*.06;
  gl_FragColor=vec4(col*diff+sp+lCol*lE*.35,1.);}`;

// ── Jupiter ─────────────────────────────────────────────────────
const jupV=`varying vec2 vUv;varying vec3 vN;
void main(){vUv=uv;vN=normalMatrix*normal;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;

const jupF=`
uniform float uTime;varying vec2 vUv;varying vec3 vN;
float hh(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float nn(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(hh(i),hh(i+vec2(1,0)),f.x),mix(hh(i+vec2(0,1)),hh(i+vec2(1,1)),f.x),f.y);}
float fb(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*nn(p);p=p*2.+vec2(3.1,1.7);a*=.5;}return v;}
void main(){
  float t=uTime*.015;vec2 uv=vUv;
  float y=uv.y
    +fb(vec2(uv.x*5.+t,uv.y*2.))*.05
    +fb(vec2(uv.x*10.-t*.6,uv.y*4.))*.025
    +fb(vec2(uv.x*20.+t*.4,uv.y*8.))*.01;
  float b=y*10.;
  float s1=sin(b*3.14159)*.5+.5,s2=sin(b*6.28318+1.3)*.5+.5;
  float s3=sin(b*1.5708+.7)*.5+.5,s4=sin(b*9.42477-.4)*.5+.5;
  vec3 cr=vec3(.95,.89,.74),be=vec3(.82,.70,.52),o1=vec3(.78,.48,.22);
  vec3 o2=vec3(.68,.36,.14),ru=vec3(.55,.28,.12),db=vec3(.35,.18,.09),wh=vec3(.98,.95,.88);
  vec3 col=mix(cr,be,s1);
  col=mix(col,o1,s2*.65);col=mix(col,o2,s3*.5);
  col=mix(col,db,fb(vec2(uv.x*5.+t*.5,y*6.))*.55);
  col=mix(col,wh,fb(vec2(uv.x*3.-t*.3,y*4.+1.))*.3);
  col=mix(col,ru,s4*.35);
  col=mix(col,o1,fb(vec2(uv.x*20.+t*2.,y*15.))*.12);

  // ── GREAT RED SPOT ───────────────────────────────────────────────
  // Jupiter sits at world(−850,620,−1900). Player looks from origin.
  // Visible face maps to u≈0.30 on SphereGeometry UV.
  // GRS latitude ~23°S → v≈0.40.  Old u=0.62 was on the hidden back face.
  vec2 grsC=vec2(0.30,0.40);
  vec2 grsEll=(uv-grsC)*vec2(4.0,8.2);   // oval: wider in longitude
  float grsDist=length(grsEll);
  float grsOuter=smoothstep(1.00,0.00,grsDist);
  float grsRing=smoothstep(1.00,0.55,grsDist)-smoothstep(0.55,0.10,grsDist);
  float grsCore=smoothstep(0.40,0.00,grsDist);
  float swA=atan(grsEll.y,grsEll.x);
  float sw1=fb(grsEll*1.3+vec2(t*.55,swA*2.3));   // cyclonic swirl layer 1
  float sw2=fb(grsEll*2.6-vec2(t*.28,swA*3.1));   // cyclonic swirl layer 2
  vec3 grsDeep=vec3(0.48,0.09,0.03);   // dark reddish eye
  vec3 grsMid =vec3(0.94,0.34,0.08);   // orange-red main body
  vec3 grsEdge=vec3(0.68,0.14,0.05);   // crimson outer ring
  vec3 grsFil =vec3(0.98,0.54,0.16);   // bright ring filaments
  vec3 grsCol=mix(grsEdge,grsMid,smoothstep(0.,1.,sw1*1.8));
  grsCol=mix(grsCol,grsDeep,grsCore*.65);
  grsCol=mix(grsCol,grsFil,grsRing*sw2*1.6);
  col=mix(col,grsCol,grsOuter*.97);
  col+=vec3(0.12,0.04,0.01)*grsRing*(1.-sw1*.4)*grsOuter; // luminous halo

  // Oval BA companion storm
  vec2 sp2=(uv-vec2(0.21,0.56))*vec2(6.,14.);
  col=mix(col,vec3(.96,.86,.72),smoothstep(1.,.1,length(sp2))*.7);

  vec3 Nn=normalize(vN);float limb=dot(Nn,vec3(0.,0.,1.));
  col*=mix(.20,1.,pow(max(limb,0.),.5));
  col+=vec3(.18,.10,.04)*(1.-limb)*(1.-limb)*.8;
  gl_FragColor=vec4(col,1.);}`;

// ── Laser Bolt — rim/NdotV glow + travelling energy pulse ─────
const laserV=`
varying vec3 vN,vVD;varying vec2 vUv;
void main(){
  vUv=uv;vN=normalMatrix*normal;
  vec4 mv=modelViewMatrix*vec4(position,1.);vVD=-mv.xyz;
  gl_Position=projectionMatrix*mv;}`;

const laserF=`
uniform float uTime;uniform vec3 uColor;
varying vec3 vN,vVD;varying vec2 vUv;
void main(){
  vec3 N=normalize(vN),V=normalize(vVD);
  float NdV=max(0.,dot(N,V)),rim=1.-NdV;
  float along=vUv.y;
  float fade=smoothstep(0.,.13,along)*smoothstep(1.,.87,along);
  float gA=pow(rim,1.1)*2.8,gB=pow(rim,.45)*1.1;
  float core=pow(NdV,3.)*1.3;
  float pulse=pow(sin(along*22.-uTime*18.)*.5+.5,2.)*.75;
  float scan=sin(along*65.-uTime*4.)*.07+.93;
  vec3 col=uColor*gB+vec3(1.)*gA+vec3(1.)*core;
  col+=uColor*pulse*rim*1.3;col*=scan;
  float alpha=(gB*.55+gA*.55+core*.4+pulse*.25)*fade;
  gl_FragColor=vec4(col,clamp(alpha,0.,1.));}`;

// ════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════
function init(){
  const canvas=document.getElementById('c');

  renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;

  // ── WebXR ─────────────────────────────────────────────────────
  renderer.xr.enabled=true;
  // Quest 3 native res is managed by the runtime; 1.0 = full native eye buffer
  try{ renderer.xr.setFramebufferScaleFactor(1.0); }catch(e){}

  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(80,innerWidth/innerHeight,0.05,5000);
  clock=new THREE.Clock();

  // ── Player dolly ─────────────────────────────────────────────
  // Dolly moves through the world (locomotion).
  // The XR system offsets the camera from dolly by the physical head pose,
  // so dolly.y = terrain floor → camera appears at floor + head-height (~1.7 m).
  dolly=new THREE.Group();
  dolly.add(camera);
  scene.add(dolly);

  buildWorld();
  buildControllers();  // sets up event listeners; weapon/HUD attached on 'connected'
  buildWeaponModel();  // builds geometry; attached to rightGrip on connect
  buildWristHUD();     // builds canvas texture plane; attached to leftGrip on connect
  buildDamageFlash();
  setupXRButton();

  window.addEventListener('resize',()=>{
    renderer.setSize(innerWidth,innerHeight);
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
  });

  // Stop all audio when the page loses focus or is hidden
  // (e.g. Quest home button, browser tab switch, headset removal)
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden) stopAllAudio();
    else resumeAudioIfNeeded();
  });
  window.addEventListener('blur', stopAllAudio);
  window.addEventListener('focus', resumeAudioIfNeeded);

  renderer.setAnimationLoop(loop);
}

// ════════════════════════════════════════════════════════════════
//  WORLD
// ════════════════════════════════════════════════════════════════
function buildWorld(){
  buildStarfield();
  buildJupiter();
  buildTerrain();
  buildRocks();
  buildVolcanoes();
  // Lighting
  ambientLight=new THREE.AmbientLight(0x201510,0.8);scene.add(ambientLight);
  sunLight=new THREE.DirectionalLight(0xffe8cc,1.4);sunLight.position.set(100,300,-200);scene.add(sunLight);
  const jl=new THREE.DirectionalLight(0xcc6633,0.5);jl.position.set(-850,620,-1900);scene.add(jl);
}

function buildStarfield(){
  // Main field — 10 k stars (Quest 3 budget)
  const N=6000,p=new Float32Array(N*3),c=new Float32Array(N*3);
  const pal=[[1,.9,.8],[.65,.78,1],[1,.72,.55],[.92,.92,1],[1,1,.72],[.8,.95,1]];
  for(let i=0;i<N;i++){
    const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=2200+Math.random()*400;
    p[i*3]=r*Math.sin(ph)*Math.cos(th);p[i*3+1]=r*Math.sin(ph)*Math.sin(th);p[i*3+2]=r*Math.cos(ph);
    const cl=pal[Math.floor(Math.random()*pal.length)],b=.25+Math.random()*.75;
    c[i*3]=cl[0]*b;c[i*3+1]=cl[1]*b;c[i*3+2]=cl[2]*b;
  }
  const sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.BufferAttribute(p,3));sg.setAttribute('color',new THREE.BufferAttribute(c,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({size:1.8,sizeAttenuation:true,vertexColors:true,transparent:true,opacity:.92,depthWrite:false})));

  // Milky Way band — 5 k
  const MW=3000,ta=1.05,mp=new Float32Array(MW*3),mc=new Float32Array(MW*3);
  for(let i=0;i<MW;i++){
    const th=Math.random()*Math.PI*2,bw=Math.random()-.5;
    const ph=Math.PI/2+bw*.18*(1+2*Math.abs(bw)),r=1850+Math.random()*200;
    const x=r*Math.sin(ph)*Math.cos(th),y=r*Math.cos(ph),z=r*Math.sin(ph)*Math.sin(th);
    mp[i*3]=x;mp[i*3+1]=y*Math.cos(ta)-z*Math.sin(ta);mp[i*3+2]=y*Math.sin(ta)+z*Math.cos(ta);
    const t=Math.random(),br=.06+Math.random()*.22;
    const [rc,gc,bc]=t<.25?[.55,.65,1]:t<.55?[1,.88,.95]:t<.75?[1,.70,.45]:[.85,.90,1];
    mc[i*3]=rc*br;mc[i*3+1]=gc*br;mc[i*3+2]=bc*br;
  }
  const mwg=new THREE.BufferGeometry();mwg.setAttribute('position',new THREE.BufferAttribute(mp,3));mwg.setAttribute('color',new THREE.BufferAttribute(mc,3));
  scene.add(new THREE.Points(mwg,new THREE.PointsMaterial({size:1.4,vertexColors:true,transparent:true,opacity:.75,depthWrite:false,blending:THREE.AdditiveBlending})));

  // Nebula blobs — 80
  const NB=40,nbp=new Float32Array(NB*3),nbc=new Float32Array(NB*3);
  const npal=[[.4,.15,.7],[.1,.25,.8],[.7,.1,.3],[0,.45,.55],[.5,.3,.1]];
  for(let i=0;i<NB;i++){
    const th=Math.random()*Math.PI*2,ph=(Math.random()-.5)*.7+Math.PI/2,r=1650;
    nbp[i*3]=r*Math.sin(ph)*Math.cos(th);nbp[i*3+1]=r*Math.cos(ph)*.8;nbp[i*3+2]=r*Math.sin(ph)*Math.sin(th);
    const nc=npal[Math.floor(Math.random()*npal.length)],b=.04+Math.random()*.09;
    nbc[i*3]=nc[0]*b;nbc[i*3+1]=nc[1]*b;nbc[i*3+2]=nc[2]*b;
  }
  const nbg=new THREE.BufferGeometry();nbg.setAttribute('position',new THREE.BufferAttribute(nbp,3));nbg.setAttribute('color',new THREE.BufferAttribute(nbc,3));
  scene.add(new THREE.Points(nbg,new THREE.PointsMaterial({size:60,vertexColors:true,transparent:true,opacity:.5,depthWrite:false,blending:THREE.AdditiveBlending})));
}

function buildTerrain(){
  terrainU={uTime:{value:0}};

  // ── CPU vertex displacement ──────────────────────────────────────────
  // Displace all vertices using the same FBM as the old GLSL vertex shader.
  // Doing this on the CPU means:
  //  • The GPU renders exactly what the CPU geometry says (no shader-only displacement).
  //  • Raycaster.intersectObject() hits the true rendered surface — not a flat plane.
  //  • Player floor collision is 100% accurate with zero approximation error.
  // The fragment shader (coloring) is unchanged — it still uses vH, vPos, vN.
  const segs=70; // LOD: 9800 vs 20000 triangles (51% reduction), TERRAIN_GRID=10
  const geo=new THREE.PlaneGeometry(700,700,segs,segs);
  geo.rotateX(-Math.PI/2);  // lay flat in XZ plane

  // After rotateX, getX(i)/getZ(i) are the world XZ coords of each vertex
  const pos=geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), z=pos.getZ(i);
    pos.setY(i, getH(x,z));  // getH mirrors the GLSL hAt() exactly
  }
  pos.needsUpdate=true;
  geo.computeVertexNormals();  // smooth normals from actual triangle geometry

  terrainMesh=new THREE.Mesh(geo,new THREE.ShaderMaterial({
    uniforms:terrainU,
    vertexShader:ioV,
    fragmentShader:ioF
  }));
  scene.add(terrainMesh);
}

function buildRocks(){
  // ── LOD levels per rock ──────────────────────────────────────────
  // LOD0 (< 30 u): deformed IcosahedronGeometry  — ~40 triangles
  // LOD1 (30–70 u): BoxGeometry                  — 12 triangles
  // LOD2 (> 70 u):  invisible (sub-pixel at range)
  const rc=[0xc8a020,0xd46010,0x904010,0x504030,0xe0c060,0x806040,0x302010];
  for(let i=0;i<40;i++){
    const x=(Math.random()-.5)*500, z=(Math.random()-.5)*500;
    const h=getH(x,z), sz=.4+Math.random()**2*5;
    const col=rc[Math.floor(Math.random()*rc.length)];
    const mat=new THREE.MeshStandardMaterial({color:col,roughness:.85,metalness:.05});

    // LOD 0 — deformed icosahedron (full detail)
    const geo0=new THREE.IcosahedronGeometry(sz,0), pa=geo0.attributes.position;
    for(let v=0;v<pa.count;v++)pa.setXYZ(v,pa.getX(v)*(.65+Math.random()*.7),pa.getY(v)*(.65+Math.random()*.7),pa.getZ(v)*(.65+Math.random()*.7));
    geo0.computeVertexNormals();
    const m0=new THREE.Mesh(geo0,mat);

    // LOD 1 — plain box (12 triangles)
    const m1=new THREE.Mesh(new THREE.BoxGeometry(sz*1.1,sz*.9,sz*1.05),mat.clone());
    m1.visible=false;

    const grp=new THREE.Group();
    grp.add(m0,m1);
    grp.position.set(x,h+sz*.5,z);
    grp.rotation.set(Math.random()*6,Math.random()*6,Math.random()*6);
    scene.add(grp);
    rockGroups.push({grp,meshes:[m0,m1],lastLOD:-1});
  }
}

function buildVolcanoes(){
  // ── LOD levels per volcano ───────────────────────────────────────
  // LOD0 (< 100 u): ConeGeometry(r,h, 20 sides, 4 rows) — ~320 tris
  // LOD1 (100–200u): ConeGeometry(r,h, 10 sides, 2 rows) — ~80  tris
  // LOD2 (> 200 u):  ConeGeometry(r,h,  6 sides, 1 row)  — ~24  tris
  const volcMat=new THREE.MeshStandardMaterial({color:0x201008,roughness:.95});
  [{x:-340,z:-120,h:70,r:55},{x:160,z:80,h:40,r:32},{x:-200,z:200,h:55,r:42}].forEach(v=>{
    const base=getH(v.x,v.z);
    const cy=base+v.h/2;

    // Build LOD0 with vertex jitter (existing look)
    const geo0=new THREE.ConeGeometry(v.r,v.h,20,4,true),pa=geo0.attributes.position;
    for(let i=0;i<pa.count;i++){pa.setX(i,pa.getX(i)+(Math.random()-.5)*4);pa.setZ(i,pa.getZ(i)+(Math.random()-.5)*4);}
    geo0.computeVertexNormals();
    const m0=new THREE.Mesh(geo0,volcMat.clone());m0.position.set(v.x,cy,v.z);scene.add(m0);

    // LOD1 — 10-sided, 2 rings
    const m1=new THREE.Mesh(new THREE.ConeGeometry(v.r,v.h,10,2,true),volcMat.clone());
    m1.position.set(v.x,cy,v.z);m1.visible=false;scene.add(m1);

    // LOD2 — 6-sided, 1 ring
    const m2=new THREE.Mesh(new THREE.ConeGeometry(v.r,v.h,6,1,true),volcMat.clone());
    m2.position.set(v.x,cy,v.z);m2.visible=false;scene.add(m2);

    volcanoLODs.push({meshes:[m0,m1,m2],lastLOD:-1});

    const ll=new THREE.PointLight(0xff5500,6+Math.random()*4,70+v.r);ll.position.set(v.x,base+v.h+2,v.z);scene.add(ll);
    lavaLights.push({light:ll,phase:Math.random()*Math.PI*2,base:6+Math.random()*4});
    buildPlume(v.x,base+v.h,v.z);
    volcanoColliders.push({cx:v.x, cz:v.z, r:v.r, h:v.h, baseY:base});
  });
}

function buildPlume(ox,oy,oz){
  const N=120,geo=new THREE.BufferGeometry();
  const pos=new Float32Array(N*3),vel=[],life=new Float32Array(N).map(()=>Math.random());
  for(let i=0;i<N;i++){
    const a=Math.random()*Math.PI*2,r=Math.random()*3;
    pos[i*3]=ox+Math.cos(a)*r;pos[i*3+1]=oy;pos[i*3+2]=oz+Math.sin(a)*r;
    vel.push((Math.random()-.5)*3,4+Math.random()*8,(Math.random()-.5)*3);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({color:0xff5500,size:1.2,transparent:true,opacity:.75,blending:THREE.AdditiveBlending,depthWrite:false}));
  pts.userData={vel,life,ox,oy,oz,N};scene.add(pts);plumeList.push(pts);
}

function drawHUD(){
  if(!hudCtx||!hudTexture)return;
  const ctx=hudCtx,W=512,H=256;
  ctx.clearRect(0,0,W,H);

  // Panel
  ctx.fillStyle='rgba(0,8,18,0.92)';
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(4,4,W-8,H-8,14);ctx.fill();}
  else{ctx.fillRect(4,4,W-8,H-8);}

  ctx.strokeStyle='rgba(48,190,255,0.42)';ctx.lineWidth=2;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(4,4,W-8,H-8,14);ctx.stroke();}
  else{ctx.strokeRect(4,4,W-8,H-8);}

  const cd='rgba(48,190,255,0.48)',cb='rgba(48,190,255,0.90)';

  if(gameOverState){
    ctx.fillStyle='rgba(255,30,0,0.88)';ctx.font='bold 34px monospace';ctx.textAlign='center';
    ctx.fillText('MARINE DOWN',W/2,64);
    ctx.fillStyle='rgba(255,100,50,0.75)';ctx.font='bold 20px monospace';
    ctx.fillText(`SCORE  ${score}`,W/2,114);
    ctx.fillText(`KILLS  ${kills}`,W/2,144);
    ctx.fillText(`WAVES  ${wave}`,W/2,174);
    ctx.fillStyle='rgba(255,80,0,0.45)';ctx.font='13px monospace';
    ctx.fillText('PULL RIGHT TRIGGER TO REDEPLOY',W/2,220);
    hudTexture.needsUpdate=true;return;
  }

  // HEALTH bar
  ctx.fillStyle=cd;ctx.font='bold 16px monospace';ctx.textAlign='left';ctx.fillText('HEALTH',16,46);
  ctx.fillStyle='rgba(18,20,28,0.85)';ctx.fillRect(90,28,306,20);
  ctx.fillStyle=`hsl(${(health/maxHealth)*25},90%,50%)`;ctx.fillRect(90,28,306*(health/maxHealth),20);
  ctx.fillStyle=cb;ctx.font='bold 14px monospace';ctx.textAlign='right';ctx.fillText(Math.ceil(health),W-16,46);

  // SHIELD bar
  ctx.fillStyle=cd;ctx.font='bold 16px monospace';ctx.textAlign='left';ctx.fillText('SHIELD',16,80);
  ctx.fillStyle='rgba(18,20,28,0.85)';ctx.fillRect(90,62,306,20);
  ctx.fillStyle=`rgba(0,110,255,${0.3+0.7*(shield/maxShield)})`;ctx.fillRect(90,62,306*(shield/maxShield),20);
  ctx.fillStyle=cb;ctx.font='bold 14px monospace';ctx.textAlign='right';ctx.fillText(Math.ceil(shield),W-16,80);

  // Divider
  ctx.fillStyle='rgba(48,190,255,0.18)';ctx.fillRect(12,96,W-24,1);

  // WEAPON name + ammo
  const wDef=WEAPONS[currentWeapon];
  const wAmmo=weaponAmmoMap[currentWeapon];
  const ammoStr=wAmmo===Infinity?'∞':(wAmmo||0).toString();
  ctx.fillStyle=`#${wDef.pickupCol.toString(16).padStart(6,'0')}`;
  ctx.font='bold 13px monospace'; ctx.textAlign='left';
  ctx.fillText(wDef.name, 16, 128);
  ctx.font='bold 36px monospace';
  ctx.fillText(ammoStr, 16, 170);
  ctx.fillStyle='rgba(48,190,255,0.35)';
  ctx.font='11px monospace';
  ctx.fillText('WALK NEAR PICKUPS TO GRAB', 16, 210);

  // Wave / Score / Kills / Combo / Shield
  ctx.textAlign='right';ctx.font='bold 15px monospace';ctx.fillStyle=cd;
  ctx.fillText(`WAVE  ${wave}`,W-16,118);
  ctx.fillText(`SCORE ${score}`,W-16,140);
  ctx.fillText(`KILLS ${kills}`,W-16,162);
  ctx.fillText(`DRONES ${enemies.length}`,W-16,184);
  if(comboCount>1){
    ctx.fillStyle=`hsl(${40+comboCount*15},100%,65%)`;ctx.font='bold 13px monospace';
    ctx.fillText(`×${comboMult} COMBO`,W-16,204);
  }
  if(shieldActive){
    ctx.fillStyle='rgba(80,140,255,.9)';ctx.font='bold 11px monospace';
    ctx.fillText(`[SHIELD] ${shieldDur.toFixed(1)}s`,W-16,220);
  }else if(shieldRecharge>0){
    ctx.fillStyle='rgba(0,100,255,.4)';ctx.font='11px monospace';
    ctx.fillText(`shld rdy in ${Math.ceil(shieldRecharge)}s`,W-16,220);
  }
  // Boss health bar
  if(bossEnemy&&bossEnemy.userData){
    const bHP=bossEnemy.userData.hp/bossEnemy.userData.maxHp;
    ctx.fillStyle='rgba(255,0,0,.7)';ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillText('BOSS',W/2,232);
    ctx.fillStyle='rgba(40,0,0,.8)';ctx.fillRect(W/2-80,235,160,10);
    ctx.fillStyle=`hsl(${bHP*12},100%,50%)`;ctx.fillRect(W/2-80,235,160*bHP,10);
  }

  hudTexture.needsUpdate=true;
}

// ════════════════════════════════════════════════════════════════
//  CONTROLLERS  — handedness-aware assignment
// ════════════════════════════════════════════════════════════════
function buildControllers(){
  for(let i=0;i<2;i++){
    const ctrl=renderer.xr.getController(i);
    const grip=renderer.xr.getControllerGrip(i);
    dolly.add(ctrl,grip);

    ctrl.addEventListener('connected',e=>{
      const hand=e.data.handedness;
      if(hand==='right'){ rightCtrl=ctrl;rightGrip=grip;rightXRSource=e.data;onRightConnected();
        // Confirmation buzz — confirms haptics are alive the moment you pick up the controller
        setTimeout(()=>pulseSource(rightXRSource,1.0,200),200);
      }
      else              { leftCtrl=ctrl; leftGrip=grip; leftXRSource=e.data; onLeftConnected();  }
    });

    ctrl.addEventListener('selectstart',()=>{
      if(ctrl===rightCtrl){
        if(gameOverState){ restartGame(); return; }
        if(gameActive){
          triggerHeld=true;
          if(currentWeapon!=='flame') startCharge(); // flame uses hold-fire not charge
        }
      }
    });

    ctrl.addEventListener('selectend',()=>{
      if(ctrl===rightCtrl && gameActive && triggerHeld){
        triggerHeld=false;
        if(currentWeapon==='flame'){
          stopCharge(); chargeTime=0; // no charge for flame
        } else if(chargeTime>=CHARGE_MAX){
          stopCharge();
        } else if(chargeTime<0.25){
          stopCharge(); fireWeapon();
        } else {
          stopCharge();
        }
        chargeTime=0;
      }
    });
  }
}

// ── Charge FX (sphere + boids) ────────────────────────────────
// Attached directly to rightGrip as a sibling of weaponGroup so it
// survives weapon swaps. Position is updated each frame in updateCharge()
// to match the current weapon's tip in world space.
let chargeFXGroup=null;
function buildChargeFX(){
  if(chargeFXGroup){ rightGrip.remove(chargeFXGroup); chargeFXGroup=null; }

  chargeFXGroup=new THREE.Group();

  // Sphere
  chargeSphere=new THREE.Mesh(
    new THREE.SphereGeometry(1,12,8),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false})
  );
  chargeSphere.scale.setScalar(0.001);
  chargeFXGroup.add(chargeSphere);

  // Boids
  const BOIDS=40,bPos=new Float32Array(BOIDS*3);
  chargeBoidData=[];
  for(let i=0;i<BOIDS;i++){
    const th=Math.random()*Math.PI*2,ph=Math.random()*Math.PI,r=0.04+Math.random()*0.06;
    bPos[i*3]=Math.sin(ph)*Math.cos(th)*r;bPos[i*3+1]=Math.sin(ph)*Math.sin(th)*r;bPos[i*3+2]=Math.cos(ph)*r;
    chargeBoidData.push({th,ph,speed:1.2+Math.random()*2.2,axis:new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize(),r});
  }
  const bGeo=new THREE.BufferGeometry();bGeo.setAttribute('position',new THREE.BufferAttribute(bPos,3));
  chargeBoids=new THREE.Points(bGeo,new THREE.PointsMaterial({color:0xaaddff,size:0.022,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true}));
  chargeFXGroup.add(chargeBoids);

  rightGrip.add(chargeFXGroup);
}

// Returns the tip offset in rightGrip local space for the current weapon
// (after weaponGroup's scale 1.5× and position are applied)
// ── Sword blade tip marker ────────────────────────────────────────
// An invisible Object3D placed at the sword's blade tip in saber geometry
// space (0, 0.80, 0 — blade top). Used by getWeaponTipOffset().
let saberTip=null;

function getWeaponTipOffset(){
  // Read the actual world position of the appropriate tip object, then
  // convert to rightGrip local space so chargeFXGroup can be positioned there.
  if(!rightGrip) return new THREE.Vector3(0,0,0);

  let worldPos=new THREE.Vector3();

  if(currentWeapon==='saber'){
    if(saberTip){
      saberTip.getWorldPosition(worldPos);
    } else {
      // Fallback: approximate — grip origin + offset along grip -Z
      rightGrip.getWorldPosition(worldPos);
    }
  } else {
    // All guns: use muzzleSphere world position (already exactly at barrel tip)
    if(muzzleSphere) muzzleSphere.getWorldPosition(worldPos);
    else rightGrip.getWorldPosition(worldPos);
  }

  // Convert world → rightGrip local so chargeFXGroup.position is correct
  return rightGrip.worldToLocal(worldPos);
}

function enterVR(){
  setStatus('Requesting VR session…');
  navigator.xr.requestSession('immersive-vr',{
    requiredFeatures:['local-floor'],
    optionalFeatures:['bounded-floor','hand-tracking']
  }).then(session=>{

// ── Haptic feedback ───────────────────────────────────────────────
// Calls pulse() directly on the stored XRInputSource gamepad actuator.
// This is the only haptic API that works in WebXR on Meta Quest 3.
//
// Key facts that tripped up the previous implementation:
//  • vibrationActuator / playEffect are Web Gamepad API — NOT WebXR
//  • hapticActuators[0].pulse(intensity, durationMs) is the WebXR API
//  • XRInputSource refs from the 'connected' event are stable for the
//    session lifetime, so we store them and call directly — no lookup
//  • All call sites (selectstart, loop body) are inside the XR frame
//    so no queue is needed; pulse() is valid to call here directly
//
// intensity : 0.0 – 1.0
// duration  : milliseconds

function pulseSource(src, intensity, duration){
  if(!src||!src.gamepad)return;
  const acts=src.gamepad.hapticActuators;
  if(acts&&acts.length){
    acts[0].pulse(Math.min(1,Math.max(0,intensity)), duration);
  }
}

function haptic(hand, intensity, duration){
  if(hand==='right') pulseSource(rightXRSource, intensity, duration);
  else               pulseSource(leftXRSource,  intensity, duration);
}

// drainHaptics is no longer needed — kept as a no-op so loop() call is harmless
function drainHaptics(){}

function fireWeapon(){
  if(!rightGrip||fireCooldown>0||!gameActive)return;
  const def=WEAPONS[currentWeapon];
  if(def.ammo!==Infinity&&(weaponAmmoMap[currentWeapon]||0)<=0) return;
  fireCooldown=def.rate;
  if(def.ammo!==Infinity) weaponAmmoMap[currentWeapon]--;
  // Auto-switch to laser when this weapon is now empty
  if(def.ammo!==Infinity&&(weaponAmmoMap[currentWeapon]||0)<=0){
    setTimeout(()=>{ equipWeapon('laser'); speak('Switching to laser'); },150);
  }
  drawHUD();

  // Muzzle flash
  muzzleLight.intensity=7;mfTimer=.068;muzzleSphere.visible=true;
  kickZ=.05;kickRX=-.14;
  haptic('right',1.0,120);

  triggerMuzzleCone(currentWeapon);
  degradeWeapon();

  // Dispatch
  if(currentWeapon==='laser')   { playPlayerShot(); fireLaser(); }
  else if(currentWeapon==='shotgun') { playPlayerShot(); fireShotgun(); }
  else if(currentWeapon==='grenade'){ playPlayerShot(); fireGrenade(); }
  else if(currentWeapon==='saber')  { fireSaber(); }
  else if(currentWeapon==='scatter'){ playPlayerShot(); fireScatter(); }
  else if(currentWeapon==='rail')   { fireRail(); }
  else if(currentWeapon==='rocket') { playPlayerShot(); fireRocket(); }
  else if(currentWeapon==='dual')   { playPlayerShot(); fireDual(); }
  else if(currentWeapon==='flame')  { fireFlame(); }
  else if(currentWeapon==='cannon') { fireCannon(); }
}

    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(.060,.060,LEN,8,1,true),new THREE.ShaderMaterial({uniforms:u1,vertexShader:laserV,fragmentShader:laserF,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide})));
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(.030,.030,LEN*1.02,6,1,true),new THREE.ShaderMaterial({uniforms:u2,vertexShader:laserV,fragmentShader:laserF,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide})));

// ── Enemy type definitions ─────────────────────────────────────────
const ENEMY_TYPES={
  scout:{
    hp:1, speedBase:7.5, speedWave:.6, shootDelay:0.6, shootRand:0.8,
    boltSpeed:30, boltDmg:6, scale:0.70,
    bodyColor:0x002211, emissive:0x004422, emissiveInt:.6,
    eyeColor:0x00ff88, ringColor:0x003311, ringOpacity:.6,
    lightColor:0x00ff44, lightInt:1.8, rings:2,
    label:'SCOUT'
  },
  standard:{
    hp:3, speedBase:4.5, speedWave:.4, shootDelay:1.0, shootRand:1.5,
    boltSpeed:22, boltDmg:10, scale:1.0,
    bodyColor:0x110400, emissive:0x440800, emissiveInt:.4,
    eyeColor:0xff1100, ringColor:0x550200, ringOpacity:.55,
    lightColor:0xff2200, lightInt:1.5, rings:3,
    label:'DRONE'
  },
  heavy:{
    hp:8, speedBase:2.2, speedWave:.18, shootDelay:1.8, shootRand:1.0,
    boltSpeed:16, boltDmg:18, scale:1.85,
    bodyColor:0x220800, emissive:0x881100, emissiveInt:.8,
    eyeColor:0xff6600, ringColor:0x882200, ringOpacity:.75,
    lightColor:0xff4400, lightInt:2.8, rings:4,
    label:'HEAVY'
  }
};

// Weighted random type — scouts more common early, heavies ramp up with wave
function pickEnemyType(){
  const r=Math.random();
  const heavyChance=Math.min(.35, (wave-3)*.08);   // 0 until wave 3, then ramps
  const scoutChance=Math.min(.45, .15+wave*.05);
  if(r<heavyChance) return 'heavy';
  if(r<heavyChance+scoutChance) return 'scout';
  return 'standard';
}

function spawnEnemy(){
  const px=dolly.position.x,pz=dolly.position.z;

  // Only spawn within the player's forward hemisphere (dot product > 0).
  // Get camera forward on the XZ plane and keep re-rolling the angle until
  // the candidate position is in front of the player (within ~180° FOV).
  // Cap retries at 12 so we never stall if the camera points at a wall.
  const fwd=new THREE.Vector3(); camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize();
  let x,z,attempts=0;
  do {
    const a=Math.random()*Math.PI*2, d=35+Math.random()*55;
    x=px+Math.cos(a)*d; z=pz+Math.sin(a)*d;
    const dx=x-px, dz=z-pz;
    const len=Math.sqrt(dx*dx+dz*dz);
    // dot > 0.1 keeps spawns within ~84° either side of the look direction
    if(fwd.x*dx/len + fwd.z*dz/len > 0.1) break;
  } while(++attempts < 12);

  const h=getH(x,z);
  const type=pickEnemyType();
  const T=ENEMY_TYPES[type];
  const g=new THREE.Group();

  // Body — octahedron deformed by type scale
  const bSize=1.1*T.scale;
  const bGeo=new THREE.OctahedronGeometry(bSize,0),bp=bGeo.attributes.position;
  for(let i=0;i<bp.count;i++)bp.setXYZ(i,bp.getX(i)*(.8+Math.random()*.4),bp.getY(i)*(1.2+Math.random()*.4),bp.getZ(i)*(.8+Math.random()*.4));
  bGeo.computeVertexNormals();
  const body=new THREE.Mesh(bGeo,new THREE.MeshStandardMaterial({color:T.bodyColor,roughness:.25,metalness:.85,emissive:T.emissive,emissiveIntensity:T.emissiveInt}));
  g.add(body);

  // Sensor eye
  const eye=new THREE.Mesh(new THREE.SphereGeometry(.3*T.scale,6,4),new THREE.MeshBasicMaterial({color:T.eyeColor}));
  eye.position.z=.95*T.scale;g.add(eye);
  const eL=new THREE.PointLight(T.lightColor,T.lightInt,5*T.scale);eL.position.copy(eye.position);g.add(eL);

  // Heavy type gets an extra armour shell (no rings — too many faces)
  if(type==='heavy'){
    const shell=new THREE.Mesh(new THREE.IcosahedronGeometry(bSize*1.15,0),
      new THREE.MeshStandardMaterial({color:0x331100,roughness:.6,metalness:.9,transparent:true,opacity:.55}));
    g.add(shell);
  }

  const hoverH=type==='heavy'?2.5:3.5;
  g.position.set(x,h+hoverH,z);

  // ── LOD body meshes ─────────────────────────────────────────────
  // LOD0 = existing `body` (8-face deformed octahedron, already added)
  // LOD1 = sphere 6 segments — ~36 triangles, no rings/eye
  // LOD2 = sphere 4×3   — ~12 triangles
  // LOD3 = box          — 12 triangles, pure flat colour
  const lodMat=new THREE.MeshStandardMaterial({color:T.bodyColor,roughness:.35,metalness:.75,emissive:T.emissive,emissiveIntensity:T.emissiveInt*.6});
  const sz=1.1*T.scale;
  const lod1=new THREE.Mesh(new THREE.SphereGeometry(sz*.85,6,5), lodMat);
  const lod2=new THREE.Mesh(new THREE.SphereGeometry(sz*.85,4,3), lodMat.clone());
  const lod3=new THREE.Mesh(new THREE.BoxGeometry(sz*1.2,sz*1.2,sz*1.2), lodMat.clone());
  lod1.visible=false; lod2.visible=false; lod3.visible=false;
  g.add(lod1); g.add(lod2); g.add(lod3);

  g.userData={
    type, hp:T.hp, maxHp:T.hp,
    speed:T.speedBase+Math.random()*1.5+wave*T.speedWave,
    shootTimer:T.shootDelay+Math.random()*T.shootRand,
    shootDelay:T.shootDelay, shootRand:T.shootRand,
    boltSpeed:T.boltSpeed, boltDmg:T.boltDmg,
    hoverPhase:Math.random()*Math.PI*2, hoverH,
    eye,eL,body,isDying:false,
    lodBodies:[body,lod1,lod2,lod3], lastLOD:-1,
    baseLightInt:T.lightInt
  };
  scene.add(g);enemies.push(g);
  startEnemyHum(g);
  assignFlankAngles();
}

const _camWP=new THREE.Vector3();
const _toP=new THREE.Vector3(); // scratch — reused every enemy update, no per-frame alloc
function updateEnemies(dt){
  camera.getWorldPosition(_camWP);
  const dead=[];
  for(const e of enemies){
    const ud=e.userData;if(ud.isDying){dead.push(e);continue;}
    ud.hoverPhase+=dt*2.2;
    e.position.y=getH(e.position.x,e.position.z)+ud.hoverH+Math.sin(ud.hoverPhase)*.6;
    const toP=_toP.subVectors(_camWP,e.position),dist=toP.length();
    e.rotation.y=Math.atan2(toP.x,toP.z);

    // ── LOD switching — only triggers on level change ──────────────
    const newLOD=dist<25?0:dist<60?1:dist<120?2:3;
    if(newLOD!==ud.lastLOD){
      ud.lastLOD=newLOD;
      // Swap which body mesh is visible
      ud.lodBodies.forEach((b,i)=>{ b.visible=(i===newLOD); });
      // Eye: visible at LOD 0–2, hidden only at extreme distance
      if(ud.eye) ud.eye.visible=(newLOD<=2);
      // Light: full at 0, dim at 1, off at 2–3
      if(ud.eL) ud.eL.intensity=newLOD===0?ud.baseLightInt:newLOD===1?ud.baseLightInt*.35:0;
    }

    if(newLOD===0){
      ud.eL.intensity=(.8+.2*Math.sin(ud.hoverPhase*3))*ud.baseLightInt;
    }
    if(dist>10) updateEnemyAI(e,ud,toP,dist,dt);
    ud.shootTimer-=dt;
    if(ud.shootTimer<=0&&dist<70&&eBolts.length<7){
      const jitter=new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).multiplyScalar(.22);
      const d=new THREE.Vector3().subVectors(_camWP,e.position).normalize().add(jitter).normalize();
      spawnBolt(e.position.clone(),d,true,ud.boltSpeed,ud.boltDmg);
      ud.shootTimer=Math.max(.4,ud.shootDelay-wave*.08)+Math.random()*ud.shootRand;
    }
    if(ud.hp<=0){ud.isDying=true;dead.push(e);}
  }
  for(const e of dead){
    killExplosion(e.position.clone());scene.remove(e);
    playExplosionSound(e.position.clone());
    stopEnemyHum(e);
    enemies=enemies.filter(x=>x!==e);
    kills++;
    registerKill();
    triggerKillFlash(WEAPONS[currentWeapon]?.col??0xffffff);
    if(e===bossEnemy){bossEnemy=null;health=Math.min(maxHealth,health+40);speak('Boss defeated');drawHUD();}
    const typeScore={scout:50,standard:100,heavy:300,boss:1000};
    score+=(typeScore[e.userData.type]||100)*wave*comboMult;drawHUD();
  }
}

function killExplosion(pos){
  const N=40, geo=new THREE.BufferGeometry();
  const arr=new Float32Array(N*3), vels=[];
  for(let i=0;i<N;i++){
    arr[i*3  ]=pos.x+(Math.random()-.5)*1.5;
    arr[i*3+1]=pos.y+(Math.random()-.5)*1.5;
    arr[i*3+2]=pos.z+(Math.random()-.5)*1.5;
    vels.push((Math.random()-.5)*6, (Math.random()-.5)*6+2, (Math.random()-.5)*6);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(arr,3));
  const mat=new THREE.PointsMaterial({color:0xff4400,size:.8,transparent:true,opacity:1,blending:THREE.AdditiveBlending,depthWrite:false});
  const pts=new THREE.Points(geo,mat); scene.add(pts);
  const fl=new THREE.PointLight(0xff4400,15,25); fl.position.copy(pos); scene.add(fl);
  // Register in explosions list — updated inside loop() which is the real XR frame callback.
  // requestAnimationFrame is hijacked by the XR runtime and stalls, causing explosions to
  // freeze permanently and leak memory. This approach is XR-safe.
  explosions.push({geo,mat,pts,fl,vels,t:0,N});
}

// Called every frame from loop() — advances all active explosions and removes finished ones
function updateExplosions(dt){
  const done=[];
  for(const ex of explosions){
    ex.t+=dt*1.1;  // dt-based so speed is frame-rate independent
    const pa=ex.geo.attributes.position.array;
    for(let i=0;i<ex.N;i++){
      pa[i*3  ]+=ex.vels[i*3  ]*dt;
      pa[i*3+1]+=ex.vels[i*3+1]*dt - 2.5*dt; // gravity
      pa[i*3+2]+=ex.vels[i*3+2]*dt;
    }
    ex.geo.attributes.position.needsUpdate=true;
    const life=Math.max(0, 1-ex.t);
    ex.mat.opacity=life;
    ex.mat.size=0.8+ex.t*3;
    ex.fl.intensity=15*life;
    if(ex.t>=1) done.push(ex);
  }
  // Clean up finished explosions — dispose geometry and material to free GPU memory
  for(const ex of done){
    scene.remove(ex.pts); scene.remove(ex.fl);
    ex.geo.dispose(); ex.mat.dispose();
    explosions=explosions.filter(e=>e!==ex);
  }
}

// ── Bolt update ───────────────────────────────────────────────────
function updateBolts(dt){
  camera.getWorldPosition(_camWP);
  const sweep=(arr,isPlayer)=>{
    const rem=[];
    for(const p of arr){
      p.position.addScaledVector(p.userData.vel,dt);
      p.userData.age+=dt;
      for(const u of p.userData.unis)u.uTime.value+=dt;
      if(p.userData.age>3.5||p.position.y<getH(p.position.x,p.position.z)){rem.push(p);continue;}
      if(!isPlayer)updateBoltBuzz(p);  // move panner + apply Doppler shift every frame
      if(isPlayer){
        let hit=false;
        for(const e of enemies){
          if(p.position.distanceTo(e.position)<2.8){
            e.userData.hp--;
            e.userData.body.material.emissive.setHex(0xff2200);
            setTimeout(()=>{if(e.userData.body)e.userData.body.material.emissive.setHex(0x440800);},90);
            rem.push(p);hit=true;break;
          }
        }
        if(!hit&&p.userData.age>2.5)rem.push(p);
      }else{
        if(p.position.distanceTo(_camWP)<1.5){
          if(checkShieldBlock(p.position)){rem.push(p);} // bolt absorbed by shield
          else{takeDamage(p.userData.dmg||10);rem.push(p);}
        }
      }
    }
    rem.forEach(p=>{ if(!isPlayer)stopBoltBuzz(p); scene.remove(p); });
    return arr.filter(x=>!rem.includes(x));
  };
  pBolts=sweep(pBolts,true);eBolts=sweep(eBolts,false);
}

// ── Player locomotion from XR gamepad ─────────────────────────────
const _fwd=new THREE.Vector3(),_rgt=new THREE.Vector3();
function updatePlayer(dt){
  const session=renderer.xr.getSession();
  if(!session)return;

  let moveX=0,moveZ=0;

  for(const src of session.inputSources){
    if(!src.gamepad)continue;
    const gp=src.gamepad,ax=gp.axes;

    if(src.handedness==='left'){
      if(Math.abs(ax[2])>.15)moveX=ax[2];
      if(Math.abs(ax[3])>.15)moveZ=ax[3];
      leftGripHeld=gp.buttons[1]?.pressed??false;
      // X button (left controller, index 4): cycle weapons in order 1-10
      const xNow=gp.buttons[4]?.pressed??false;
      if(xNow&&!xWasPressed){
        currentWeaponIndex=(currentWeaponIndex+1)%WEAPONS_ORDER.length;
        const nextType=WEAPONS_ORDER[currentWeaponIndex];
        equipWeapon(nextType);
        speak(WEAPONS[nextType].name);
      }
      xWasPressed=xNow;
    }

    if(src.handedness==='right'){
      // Right thumbstick X: snap turn 45°
      if(snapCooldown<=0&&Math.abs(ax[2])>.65){
        dolly.rotation.y-=Math.sign(ax[2])*SENS_SNAP;
        snapCooldown=.38;
      }
      // A button (index 4): super jump
      const aNow=gp.buttons[4]?.pressed??false;
      if(aNow&&!aWasPressed&&isGrounded){
        playerVY=JUMP_VEL;
        isGrounded=false;
        haptic('right',1.0,120);haptic('left',0.8,100);
        drawHUD();
      }
      aWasPressed=aNow;

      // B button (index 5): 10-metre forward dash
      // Dash stops early if an enemy is within DASH_STOP_R metres ahead.
      const bNow=gp.buttons[5]?.pressed??false;
      if(bNow&&!bWasPressed&&!dashActive&&dashCooldown<=0&&gameActive){
        // Capture camera forward projected onto XZ at press time
        camera.getWorldDirection(_dashDir);
        _dashDir.y=0;
        if(_dashDir.lengthSq()<.0001)_dashDir.set(0,0,-1);
        _dashDir.normalize();
        dashActive=true;
        dashRemaining=DASH_DUR;
        dashCooldown=DASH_COOLDOWN;
        haptic('right',1.0,80);haptic('left',0.6,60);
        spawnLandingDust(new THREE.Vector3(dolly.position.x,dolly.position.y,dolly.position.z));
      }
      bWasPressed=bNow;
    }
  }
  if(snapCooldown>0)snapCooldown-=dt;

  // Head-directed locomotion — project camera look onto XZ plane
  camera.getWorldDirection(_fwd);_fwd.y=0;
  if(_fwd.lengthSq()<.0001)_fwd.set(0,0,-1);_fwd.normalize();
  _rgt.crossVectors(_fwd,new THREE.Vector3(0,1,0)).normalize();

  const spd=leftGripHeld?SPRINT:SPEED;
  dolly.position.addScaledVector(_fwd,-moveZ*spd*dt);
  dolly.position.addScaledVector(_rgt, moveX*spd*dt);
  updateFootsteps(dt,moveX,moveZ);
  // ── Dash tick ───────────────────────────────────────────────────
  dashCooldown=Math.max(0,dashCooldown-dt);
  if(dashActive){
    const step=Math.min(dashRemaining,dt)*DASH_SPEED;
    dolly.position.addScaledVector(_dashDir,step);
    dashRemaining-=dt;

    // Each frame, check every enemy within 2–3 m of the player.
    // Hit enemies are: knocked back 5 m away from the player and
    // dealt 20% of their max HP as damage. Each enemy can only be
    // struck once per dash (tracked in ud.dashHit).
    const dPos=dolly.position;
    for(const e of enemies){
      const ud=e.userData;
      if(ud.dashHit)continue; // already struck this dash
      const toE=new THREE.Vector3().subVectors(e.position,dPos);
      const dist=toE.length();
      if(dist<3.0){
        ud.dashHit=true;
        // 20% max HP damage
        ud.hp-=Math.ceil(ud.maxHp*.20);
        // Push back 5 m directly away from the player
        const pushDir=toE.lengthSq()>.001?toE.normalize():_dashDir.clone();
        e.position.addScaledVector(pushDir,5);
        // Clamp pushed enemy to terrain height
        e.position.y=getH(e.position.x,e.position.z)+ud.hoverH;
        // Brief visual flash on hit
        if(ud.body){
          ud.body.material.emissive.setHex(0xffffff);
          setTimeout(()=>{if(ud.body)ud.body.material.emissive.setHex(ud.body.material.emissive.getHex()&&0x440800);},120);
        }
        haptic('right',1.0,60);
      }
    }

    if(dashRemaining<=0){
      dashActive=false;dashRemaining=0;
      // Clear dashHit flags so enemies can be hit on next dash
      enemies.forEach(e=>{ e.userData.dashHit=false; });
      haptic('right',0.5,60);
    }
  }

  dolly.position.x=Math.max(-320,Math.min(320,dolly.position.x));
  dolly.position.z=Math.max(-320,Math.min(320,dolly.position.z));

  // ── Volcano collision ────────────────────────────────────────────────
  // Each volcano is a cone. At the player's current height above the base,
  // the cone radius = r_base × (1 − height_above_base / cone_height).
  // If the player's XZ is inside that radius we push them radially outward.
  const PLAYER_R=1.2; // player capsule radius in world units
  for(const vc of volcanoColliders){
    const dx=dolly.position.x-vc.cx, dz=dolly.position.z-vc.cz;
    const dist2d=Math.sqrt(dx*dx+dz*dz);
    const heightAboveBase=Math.max(0, dolly.position.y-vc.baseY);
    const coneR=vc.r*Math.max(0, 1-(heightAboveBase/vc.h));
    const minDist=coneR+PLAYER_R;
    if(dist2d<minDist&&dist2d>0.001){
      // Push player out to the cone surface along the XZ direction
      const nx=dx/dist2d, nz=dz/dist2d;
      dolly.position.x=vc.cx+nx*minDist;
      dolly.position.z=vc.cz+nz*minDist;
    }
  }

  // ── Floor collision via raycaster ───────────────────────────────────
  // Terrain vertices are now displaced on the CPU (not the GPU shader),
  // so intersectObject() hits the exact rendered surface every time.
  // Ray fires straight down from 60 units above dolly — always above terrain.
  floorRay.set(
    new THREE.Vector3(dolly.position.x, dolly.position.y+60, dolly.position.z),
    new THREE.Vector3(0,-1,0)
  );
  const hits=floorRay.intersectObject(terrainMesh,false);
  if(hits.length>0){
    const groundY=hits[0].point.y;  // exact surface Y from real mesh triangles
    if(!isGrounded){
      playerVY-=IO_GRAVITY*dt;
      dolly.position.y+=playerVY*dt;
      if(dolly.position.y<=groundY){
        dolly.position.y=groundY;
        playerVY=0;isGrounded=true;
        haptic('right',0.6,80);haptic('left',0.5,70);
        spawnLandingDust(new THREE.Vector3(dolly.position.x,groundY,dolly.position.z));
        drawHUD();
      }
    }else{
      // Smooth follow — lerp snaps up slopes without jarring jumps
      dolly.position.y=THREE.MathUtils.lerp(dolly.position.y,groundY,Math.min(1,dt*20));
    }
  }

  // Shield passive regen
  if(shield<maxShield){
    shieldRegen+=dt;
    if(shieldRegen>4){shield=Math.min(maxShield,shield+8*dt);}
  }
}

// ── Weapon animation (recoil spring, muzzle flash, energy pulse) ──
function updateWeapon(dt,now){
  if(!weaponGroup)return;
  if(mfTimer>0){mfTimer=Math.max(0,mfTimer-dt);muzzleLight.intensity=mfTimer>0?7:0;muzzleSphere.visible=mfTimer>0;}
  kickZ*=Math.pow(.01,dt);kickRX*=Math.pow(.01,dt);
  weaponGroup.position.z=-0.135+kickZ;
  weaponGroup.rotation.x=WEAPON_PITCH+kickRX;
  const pulse=.8+.2*Math.sin(now*4.5);
  for(const m of energyCells)m.material.emissiveIntensity=2.6*pulse;
}

// ── Damage ────────────────────────────────────────────────────────
// ── GOD MODE — set true for testing, false for release ───────────
const GOD_MODE = true;

function takeDamage(dmg){
  if(GOD_MODE)return; // infinite health
  if(!gameActive)return;
  if(shield>0){const ab=Math.min(shield,dmg*.7);shield-=ab;dmg-=ab;shieldRegen=0;}
  health-=dmg;health=Math.max(0,health);healthRegen=0;drawHUD();
  // Damage shake — intensity and duration scale with how hard you were hit
  haptic('right', 1.0, Math.min(600, 200+dmg*18));  // full-power impact shake
  haptic('left',  1.0, Math.min(500, 180+dmg*15));
  // Brief red flash inside the VR view
  damageSphere.material.opacity=Math.min(.5,dmg/25);
  setTimeout(()=>damageSphere.material.opacity=0,220);
  if(health<=0)triggerGameOver();
}

function triggerGameOver(){
  gameActive=false;gameOverState=true;
  // Stop super blast charge immediately — if the player dies while holding
  // the trigger, chargeOsc is still live and will resume when AudioContext
  // unuspends. Disconnect and null it here before suspending.
  triggerHeld=false;chargeTime=0;stopCharge();
  if(chargeSphere)chargeSphere.material.opacity=0;
  if(chargeBoids) chargeBoids.material.opacity=0;
  damageSphere.material.opacity=0;
  damageSphere.material.color.setHex(0xff0000);
  stopAllAudio();
  window.speechSynthesis?.cancel();
  setTimeout(showGameOverBanner, 400); // brief delay so VR frame settles
  saveScore(score,wave,kills).then(()=>drawGameOverHUD());
  enemies.forEach(e=>scene.remove(e));
  pBolts.forEach(p=>scene.remove(p));
  eBolts.forEach(p=>{stopBoltBuzz(p);scene.remove(p);});
  enemies=[];pBolts=[];eBolts=[];
  drawHUD();
}

function updatePlumes(dt){
  for(const pts of plumeList){
    const ud=pts.userData,pa=pts.geometry.attributes.position.array;
    for(let i=0;i<ud.N;i++){
      ud.life[i]+=dt*.25;
      if(ud.life[i]>1){ud.life[i]=0;const a=Math.random()*Math.PI*2,r=Math.random()*3;pa[i*3]=ud.ox+Math.cos(a)*r;pa[i*3+1]=ud.oy;pa[i*3+2]=ud.oz+Math.sin(a)*r;ud.vel[i*3]=(Math.random()-.5)*3;ud.vel[i*3+1]=4+Math.random()*8;ud.vel[i*3+2]=(Math.random()-.5)*3;}
      else{pa[i*3]+=ud.vel[i*3]*dt;pa[i*3+1]+=ud.vel[i*3+1]*dt;pa[i*3+2]+=ud.vel[i*3+2]*dt;ud.vel[i*3+1]-=2.5*dt;}
    }
    pts.geometry.attributes.position.needsUpdate=true;
  }
}

function updateLava(){
  for(const ll of lavaLights){ll.phase+=.05;ll.light.intensity=ll.base*(.8+.2*Math.sin(ll.phase)+.1*Math.sin(ll.phase*3.7+1.2));}
}

// ── Wave escalation ────────────────────────────────────────────────
function updateWaves(now){
  if(!gameActive||upgradePhase)return;
  const maxE=Math.min(12, 3+wave*2), spawnI=Math.max(.8,3.5-wave*.25);
  if(enemies.length<maxE&&now-lastSpawn>spawnI){spawnEnemy();lastSpawn=now;}
  if(score>=waveThresh&&wave<12){
    wave++;waveThresh=score+500*wave;
    showWaveBanner(wave);drawHUD();
    // Boss every 5th wave
    if(wave%5===0&&!bossEnemy) setTimeout(spawnBoss,1500);
    // Pending upgrade: show cards when all enemies cleared
    pendingUpgrade=true;
    speak('Wave '+wave);
  }
  // Show upgrade cards when pending and battlefield is clear
  if(pendingUpgrade&&!upgradePhase&&enemies.length===0) showUpgradeCards();
}

// ════════════════════════════════════════════════════════════════
//  AUDIO  — Web Audio API, fully procedural (no external files)
//
//  AudioContext is created on the first VR entry (requires a user
//  gesture). The listener pose is updated every frame so enemy shots
//  are correctly spatialised in 3-D as you move and rotate your head.
//
//  Player shot : bright sawtooth sweep 1100→280 Hz + harmonic + click
//  Enemy shot  : deep square-wave buzz 520→90 Hz, HRTF-panned to the
//                firing drone's world position for full 3-D audio
// ════════════════════════════════════════════════════════════════
let audioCtx=null;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

function getAudio(){
  if(!audioCtx)return null;
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}

// ── Listener tracking — called every frame ─────────────────────
// Keeps the Web Audio spatial origin locked to the VR camera so
// left/right/front/back panning is always relative to the headset.
const _aPos=new THREE.Vector3(),_aQ=new THREE.Quaternion();
const _aFwd=new THREE.Vector3(),_aUp=new THREE.Vector3();
function updateAudioListener(){
  const ctx=getAudio();if(!ctx)return;
  camera.getWorldPosition(_aPos);
  camera.getWorldQuaternion(_aQ);
  _aFwd.set(0,0,-1).applyQuaternion(_aQ);
  _aUp.set(0,1,0).applyQuaternion(_aQ);
  const l=ctx.listener;
  if(l.positionX){
    l.positionX.value=_aPos.x;l.positionY.value=_aPos.y;l.positionZ.value=_aPos.z;
    l.forwardX.value=_aFwd.x; l.forwardY.value=_aFwd.y; l.forwardZ.value=_aFwd.z;
    l.upX.value=_aUp.x;       l.upY.value=_aUp.y;       l.upZ.value=_aUp.z;
  }else{
    l.setPosition(_aPos.x,_aPos.y,_aPos.z);
    l.setOrientation(_aFwd.x,_aFwd.y,_aFwd.z,_aUp.x,_aUp.y,_aUp.z);
  }
}

function setPannerPos(pan,v){
  if(pan.positionX){pan.positionX.value=v.x;pan.positionY.value=v.y;pan.positionZ.value=v.z;}
  else pan.setPosition(v.x,v.y,v.z);
}

// ── Enemy death explosions — 5 distinct 3D procedural sounds ──────
// Each variant is synthesised with Web Audio API (no files).
// A HRTF PannerNode places the sound at the drone's world position.
// One is chosen at random on every kill.

function _makeExplosionPanner(worldPos){
  const ctx=getAudio(); if(!ctx) return null;
  const pan=ctx.createPanner();
  pan.panningModel='HRTF'; pan.distanceModel='inverse';
  pan.refDistance=6; pan.maxDistance=120; pan.rolloffFactor=1.3;
  setPannerPos(pan, worldPos);
  pan.connect(ctx.destination);
  return {ctx, pan};
}

// 3. Boom + rumble — mid explosion with long low-frequency decay
function _explode3(worldPos){
  const r=_makeExplosionPanner(worldPos); if(!r) return;
  const {ctx,pan}=r, t=ctx.currentTime;
  // Two oscillator layers for body
  [55,110].forEach((freq,i)=>{
    const o=ctx.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(freq,t);
    o.frequency.exponentialRampToValueAtTime(freq*0.25,t+0.6);
    const g=ctx.createGain(); g.gain.setValueAtTime(0.5-i*0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
    o.connect(g); g.connect(pan); o.start(t); o.stop(t+0.85);
  });
  // Broadband noise rumble
  const nb=ctx.createBuffer(1,ctx.sampleRate*1.4,ctx.sampleRate);
  const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource(); ns.buffer=nb;
  const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=180; bp.Q.value=0.8;
  const ng=ctx.createGain(); ng.gain.setValueAtTime(0.6,t); ng.gain.exponentialRampToValueAtTime(0.001,t+1.4);
  ns.connect(bp); bp.connect(ng); ng.connect(pan); ns.start(t); ns.stop(t+1.45);
}

function playExplosionSound(worldPos){ _explode3(worldPos); }
// Three layers: sawtooth sweep for body, sine harmonic for brightness,
// high-passed noise burst for the initial crack on trigger pull.
function playPlayerShot(){
  const ctx=getAudio();if(!ctx)return;
  const t=ctx.currentTime;
  const master=ctx.createGain();master.gain.value=0.85;master.connect(ctx.destination);

  // Sawtooth body: 1100 → 280 Hz
  const o1=ctx.createOscillator();o1.type='sawtooth';
  o1.frequency.setValueAtTime(1100,t);
  o1.frequency.exponentialRampToValueAtTime(280,t+0.11);
  const g1=ctx.createGain();
  g1.gain.setValueAtTime(0,t);g1.gain.linearRampToValueAtTime(0.22,t+0.005);
  g1.gain.exponentialRampToValueAtTime(0.001,t+0.13);
  o1.connect(g1);g1.connect(master);o1.start(t);o1.stop(t+0.15);

  // Sine harmonic: 2200 → 560 Hz (adds sparkle)
  const o2=ctx.createOscillator();o2.type='sine';
  o2.frequency.setValueAtTime(2200,t);
  o2.frequency.exponentialRampToValueAtTime(560,t+0.09);
  const g2=ctx.createGain();g2.gain.setValueAtTime(0.10,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.09);
  o2.connect(g2);g2.connect(master);o2.start(t);o2.stop(t+0.10);

  // High-pass noise crack on attack
  const nb=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*0.04),ctx.sampleRate);
  const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource();ns.buffer=nb;
  const nf=ctx.createBiquadFilter();nf.type='highpass';nf.frequency.value=4500;
  const ng=ctx.createGain();ng.gain.setValueAtTime(0.09,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.04);
  ns.connect(nf);nf.connect(ng);ng.connect(master);ns.start(t);ns.stop(t+0.05);
}

// ── Enemy bolt: continuous 3D buzz with manual Doppler ─────────
// Each bolt gets its own PannerNode updated every frame and two
// detuned sawtooth oscillators whose pitch is shifted by:
//   f_obs = f₀ · c / (c − v_radial)
// where v_radial = component of bolt velocity toward the camera,
// giving a rising whine on approach and a falling growl on pass.
const BUZZ_C = 55;
const BUZZ_F0 = 150;  // slightly higher than 95 Hz — audible growl with Doppler range

function createBoltBuzz(bolt){
  const ctx=getAudio();if(!ctx)return;

  // 3-D panner placed at bolt spawn position
  const pan=ctx.createPanner();
  pan.panningModel='HRTF';pan.distanceModel='inverse';
  pan.refDistance=4;pan.maxDistance=90;pan.rolloffFactor=1.4;
  setPannerPos(pan,bolt.position);pan.connect(ctx.destination);

  // Master gain — fade in so the onset isn't a click
  const master=ctx.createGain();
  master.gain.setValueAtTime(0,ctx.currentTime);
  master.gain.linearRampToValueAtTime(0.75,ctx.currentTime+0.04);
  master.connect(pan);

  // LFO tremolo at 30 Hz — the "buzzing" texture character
  const lfo=ctx.createOscillator();lfo.type='sine';lfo.frequency.value=10; // lowered from 30 Hz
  const lfoAmt=ctx.createGain();lfoAmt.gain.value=0.18;
  lfo.connect(lfoAmt);lfoAmt.connect(master.gain);

  // Oscillator 1 — main sawtooth
  const o1=ctx.createOscillator();o1.type='sawtooth';o1.frequency.value=BUZZ_F0;
  const g1=ctx.createGain();g1.gain.value=0.45;o1.connect(g1);g1.connect(master);

  // Oscillator 2 — 1.2% detune produces a beating effect
  const o2=ctx.createOscillator();o2.type='sawtooth';o2.frequency.value=BUZZ_F0*1.012;
  const g2=ctx.createGain();g2.gain.value=0.30;o2.connect(g2);g2.connect(master);

  o1.start();o2.start();lfo.start();
  bolt.userData.audio={o1,o2,lfo,lfoAmt,master,pan,active:true};
}

// Called every frame while the bolt is live — moves the panner and
// applies the Doppler frequency shift. _camWP is already updated by
// updateBolts before this is called so no extra getWorldPosition needed.
function updateBoltBuzz(bolt){
  const aud=bolt.userData.audio;if(!aud||!aud.active)return;
  const ctx=getAudio();if(!ctx)return;

  setPannerPos(aud.pan,bolt.position);

  // Radial velocity: positive = bolt moving toward camera
  const dx=_camWP.x-bolt.position.x,dy=_camWP.y-bolt.position.y,dz=_camWP.z-bolt.position.z;
  const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
  if(dist<0.1)return;
  const vRad=(bolt.userData.vel.x*dx+bolt.userData.vel.y*dy+bolt.userData.vel.z*dz)/dist;
  // Clamp denominator so ratio never goes infinite when bolt nearly matches c
  const denom=Math.max(BUZZ_C*0.1, BUZZ_C-vRad);
  const ratio=Math.min(2.5,Math.max(0.25, BUZZ_C/denom));
  const now=ctx.currentTime;
  // setTargetAtTime smooths the shift — avoids zipper noise each frame
  aud.o1.frequency.setTargetAtTime(BUZZ_F0*ratio,       now,0.022);
  aud.o2.frequency.setTargetAtTime(BUZZ_F0*1.012*ratio, now,0.022);
}

// Called once when the bolt is removed — fades out then disconnects
function stopBoltBuzz(bolt){
  const aud=bolt.userData.audio;if(!aud||!aud.active)return;
  aud.active=false;
  const ctx=getAudio();if(!ctx)return;
  aud.master.gain.setTargetAtTime(0,ctx.currentTime,0.04);
  setTimeout(()=>{
    try{aud.o1.stop();aud.o2.stop();aud.lfo.stop();}catch(e){}
    try{aud.pan.disconnect();}catch(e){}
  },200);
}
// Square sweep for menace + sawtooth buzz for alien texture.
// HRTF panner placed at the drone's world position; listener is
// updated each frame in updateAudioListener() so panning is correct
// as the player moves. Volume rolls off with inverse distance law.
function playEnemyShot(worldPos){
  const ctx=getAudio();if(!ctx)return;
  const t=ctx.currentTime;

  const pan=ctx.createPanner();
  pan.panningModel='HRTF';
  pan.distanceModel='inverse';
  pan.refDistance=8;
  pan.maxDistance=150;
  pan.rolloffFactor=1.2;
  setPannerPos(pan,worldPos);
  pan.connect(ctx.destination);

  const master=ctx.createGain();master.gain.value=0.80;master.connect(pan);

  // Square sweep: 180 → 35 Hz (lowered from 520→90 — sub-bass thud)
  const o1=ctx.createOscillator();o1.type='square';
  o1.frequency.setValueAtTime(180,t);
  o1.frequency.exponentialRampToValueAtTime(35,t+0.20);
  const g1=ctx.createGain();g1.gain.setValueAtTime(0.35,t);g1.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  o1.connect(g1);g1.connect(master);o1.start(t);o1.stop(t+0.25);

  // Sawtooth buzz: 90 → 18 Hz (lowered from 260→45 — deep rumble)
  const o2=ctx.createOscillator();o2.type='sawtooth';
  o2.frequency.setValueAtTime(90,t);
  o2.frequency.exponentialRampToValueAtTime(18,t+0.18);
  const g2=ctx.createGain();g2.gain.setValueAtTime(0.18,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  o2.connect(g2);g2.connect(master);o2.start(t);o2.stop(t+0.22);
}


// ════════════════════════════════════════════════════════════════
//  AMBIENT VOLCANO RUMBLE  — 3D looping low-frequency drone
//  One PannerNode per volcano, positioned at its world location.
//  Starts after AudioContext is created (on VR entry).
// ════════════════════════════════════════════════════════════════
const VOLCANO_POSITIONS=[
  {x:-340,z:-120,h:70},{x:160,z:80,h:40},{x:-200,z:200,h:55}
];
let volcanoNodes=[];  // so we can stop them on audio suspend

function startVolcanoAmbience(){
  const ctx=getAudio();if(!ctx)return;
  if(volcanoNodes.length)return; // already running

  VOLCANO_POSITIONS.forEach(v=>{
    const worldY=getH(v.x,v.z)+v.h;
    const pan=ctx.createPanner();
    pan.panningModel='HRTF'; pan.distanceModel='inverse';
    pan.refDistance=18; pan.maxDistance=300; pan.rolloffFactor=1.1;
    setPannerPos(pan,{x:v.x,y:worldY,z:v.z});
    pan.connect(ctx.destination);

    // Sub-bass rumble oscillator
    const o1=ctx.createOscillator();o1.type='sine';o1.frequency.value=28+Math.random()*8;
    const g1=ctx.createGain();g1.gain.value=0.55;
    o1.connect(g1);g1.connect(pan);

    // Irregular crackle LFO
    const lfo=ctx.createOscillator();lfo.type='sine';
    lfo.frequency.value=0.18+Math.random()*0.12;
    const lfoG=ctx.createGain();lfoG.gain.value=0.22;
    lfo.connect(lfoG);lfoG.connect(g1.gain);

    // Band-pass noise for hiss/steam
    const nb=ctx.createBuffer(1,ctx.sampleRate*4,ctx.sampleRate);
    const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
    const ns=ctx.createBufferSource();ns.buffer=nb;ns.loop=true;
    const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=90;bp.Q.value=0.6;
    const ng=ctx.createGain();ng.gain.value=0.30;
    ns.connect(bp);bp.connect(ng);ng.connect(pan);

    o1.start();lfo.start();ns.start();
    volcanoNodes.push({o1,lfo,ns,pan,g1,ng});
  });
}

function stopVolcanoAmbience(){
  volcanoNodes.forEach(n=>{
    try{n.o1.stop();n.lfo.stop();n.ns.stop();}catch(e){}
    try{n.pan.disconnect();}catch(e){}
  });
  volcanoNodes=[];
}


// ════════════════════════════════════════════════════════════════
//  LANDING DUST  — particle burst when super jump lands
// ════════════════════════════════════════════════════════════════
let dustParticles=[];

function spawnLandingDust(pos){
  const N=60,geo=new THREE.BufferGeometry();
  const arr=new Float32Array(N*3),vels=[];
  for(let i=0;i<N;i++){
    arr[i*3]=pos.x+(Math.random()-.5)*.8;
    arr[i*3+1]=pos.y+.1;
    arr[i*3+2]=pos.z+(Math.random()-.5)*.8;
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*4.5,vy=.5+Math.random()*2.5;
    vels.push(Math.cos(a)*sp, vy, Math.sin(a)*sp);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(arr,3));
  const mat=new THREE.PointsMaterial({
    color:0xc8a020,size:.35,transparent:true,opacity:.85,
    blending:THREE.AdditiveBlending,depthWrite:false
  });
  const pts=new THREE.Points(geo,mat);
  scene.add(pts);
  dustParticles.push({geo,mat,pts,vels,t:0,N});
}

function updateDust(dt){
  const done=[];
  for(const d of dustParticles){
    d.t+=dt;
    const pa=d.geo.attributes.position.array;
    for(let i=0;i<d.N;i++){
      pa[i*3  ]+=d.vels[i*3  ]*dt;
      pa[i*3+1]+=d.vels[i*3+1]*dt; d.vels[i*3+1]-=4*dt; // gravity drag
      pa[i*3+2]+=d.vels[i*3+2]*dt;
    }
    d.geo.attributes.position.needsUpdate=true;
    d.mat.opacity=Math.max(0,.85*(1-d.t/1.2));
    d.mat.size=.35+d.t*.4;
    if(d.t>=1.2)done.push(d);
  }
  for(const d of done){
    scene.remove(d.pts);d.geo.dispose();d.mat.dispose();
    dustParticles=dustParticles.filter(x=>x!==d);
  }
}

//  SCORE LEADERBOARD  — persistent via window.storage API
// ════════════════════════════════════════════════════════════════
const LB_KEY='io_leaderboard';
const LB_MAX=10;

async function saveScore(finalScore,finalWave,finalKills){
  try{
    let lb=[];
    try{ const r=await window.storage.get(LB_KEY);if(r)lb=JSON.parse(r.value); }catch(e){}
    lb.push({score:finalScore,wave:finalWave,kills:finalKills,date:new Date().toLocaleDateString()});
    lb.sort((a,b)=>b.score-a.score);
    lb=lb.slice(0,LB_MAX);
    await window.storage.set(LB_KEY,JSON.stringify(lb));
  }catch(e){}
}

async function loadLeaderboard(){
  try{
    const r=await window.storage.get(LB_KEY);
    return r?JSON.parse(r.value):[];
  }catch(e){return [];}
}

// Draw leaderboard into the game-over wrist HUD
async function drawGameOverHUD(){
  const lb=await loadLeaderboard();
  if(!hudCtx||!hudTexture)return;
  const ctx=hudCtx,W=512,H=256;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='rgba(0,8,18,0.94)';
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(4,4,W-8,H-8,14);ctx.fill();}
  else ctx.fillRect(4,4,W-8,H-8);
  ctx.strokeStyle='rgba(255,30,0,0.45)';ctx.lineWidth=2;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(4,4,W-8,H-8,14);ctx.stroke();}
  else ctx.strokeRect(4,4,W-8,H-8);

  // Title
  ctx.fillStyle='rgba(255,30,0,0.90)';ctx.font='bold 22px monospace';ctx.textAlign='center';
  ctx.fillText('MARINE DOWN',W/2,36);
  ctx.fillStyle='rgba(255,100,50,0.70)';ctx.font='bold 14px monospace';
  ctx.fillText(`SCORE ${score}  ·  KILLS ${kills}  ·  WAVE ${wave}`,W/2,60);
  ctx.fillStyle='rgba(255,80,0,0.40)';ctx.font='11px monospace';
  ctx.fillText('PULL RIGHT TRIGGER TO REDEPLOY',W/2,80);

  // Leaderboard
  ctx.fillStyle='rgba(48,190,255,0.55)';ctx.font='bold 12px monospace';ctx.textAlign='left';
  ctx.fillText('── TOP SCORES ──────────────────',14,104);
  lb.slice(0,6).forEach((e,i)=>{
    const isMe=(e.score===score&&e.wave===wave&&e.kills===kills);
    ctx.fillStyle=isMe?'rgba(255,200,50,0.95)':'rgba(48,190,255,0.75)';
    ctx.font=isMe?'bold 12px monospace':'12px monospace';
    ctx.textAlign='left';  ctx.fillText(`${i+1}. ${e.score.toLocaleString()}`,14,122+i*22);
    ctx.textAlign='right'; ctx.fillText(`W${e.wave} K${e.kills}  ${e.date}`,W-14,122+i*22);
  });
  hudTexture.needsUpdate=true;
}

// ── Weapon geometry builder ───────────────────────────────────────
function buildWeaponGeometry(type, parent){
  const mk=(g,m,x=0,y=0,z=0,rx=0,ry=0,rz=0)=>{
    const ms=new THREE.Mesh(g,m);ms.position.set(x,y,z);
    if(rx||ry||rz)ms.rotation.set(rx,ry,rz);parent.add(ms);return ms;};
  const mat=(col,rough=.3,metal=.8,emCol=null,emInt=0)=>{
    const m=new THREE.MeshStandardMaterial({color:col,roughness:rough,metalness:metal});
    if(emCol){m.emissive=new THREE.Color(emCol);m.emissiveIntensity=emInt;}return m;};
  const glow=(col,op=.4)=>new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false});

  if(type==='shotgun'){
    // Wide flat receiver + 5 barrels
    mk(new THREE.BoxGeometry(.24,.07,.28),mat(0x1a0a00,.5,.9),0,0,0);
    mk(new THREE.BoxGeometry(.22,.04,.10),mat(0x0a0500,.4,.7),0,-.055,.09);
    for(let i=-2;i<=2;i++) mk(new THREE.CylinderGeometry(.012,.012,.22,6),mat(0x220800,.2,.95),i*.04,.035,-.22,Math.PI/2);
    mk(new THREE.BoxGeometry(.06,.08,.055),mat(0x0c0a08,.8,.1),0,-.07,.04);
    mk(new THREE.TorusGeometry(.025,.005,4,12,Math.PI),mat(0x1a0800),0,-.04,.005,Math.PI/2);
    parent.add(new THREE.PointLight(new THREE.Color(WEAPONS.shotgun.pickupCol),1.5,5));
  }
  else if(type==='grenade'){
    // Fat barrel + drum mag + body
    mk(new THREE.CylinderGeometry(.04,.04,.30,10),mat(0x283a1a,.7,.6),0,.01,-.18,Math.PI/2);
    mk(new THREE.CylinderGeometry(.055,.04,.10,10),mat(0x1e2e12,.6,.5),0,.01,-.10,Math.PI/2);
    mk(new THREE.BoxGeometry(.10,.07,.18),mat(0x243218,.6,.5));
    mk(new THREE.CylinderGeometry(.04,.04,.07,16),mat(0x1a2610,.5,.4),0,-.055,.02,0,0,Math.PI/6);// drum
    mk(new THREE.BoxGeometry(.03,.065,.04),mat(0x111a09,.9,.1),0,-.065,.06);// grip
    const l=new THREE.PointLight(new THREE.Color(WEAPONS.grenade.pickupCol),1.5,5);parent.add(l);
  }
  else if(type==='saber'){
    // Volt Saber — Light Saber × Zelda Master Sword hybrid

    // the Quest 3 controller grip orientation. Handle sits at the grip.
    const sg=new THREE.Group(); sg.rotation.x=Math.PI*1.5; parent.add(sg);
    const smk=(g,m,x=0,y=0,z=0,rx=0,ry=0,rz=0)=>{
      const ms=new THREE.Mesh(g,m);ms.position.set(x,y,z);
      if(rx||ry||rz)ms.rotation.set(rx,ry,rz);sg.add(ms);return ms;};
    // Glowing blade (long, thin, emissive white-cyan)
    smk(new THREE.CylinderGeometry(.018,.022,.70,8),new THREE.MeshStandardMaterial({color:0xaaffff,emissive:0x44ffff,emissiveIntensity:4.5,roughness:0,metalness:.1}),0,.45,0);
    smk(new THREE.CylinderGeometry(.024,.016,.70,8),glow(0x00ffff,.5),0,.45,0);// outer glow
    // Master Sword crossguard
    smk(new THREE.BoxGeometry(.18,.025,.030),mat(0xccaa22,.2,.95,0xaacc44,1),0,.09,0);
    smk(new THREE.BoxGeometry(.025,.025,.055),mat(0xccaa22,.2,.95,0xaacc44,1),-.09,.09,.015);
    smk(new THREE.BoxGeometry(.025,.025,.055),mat(0xccaa22,.2,.95,0xaacc44,1), .09,.09,.015);
    // Handle
    smk(new THREE.CylinderGeometry(.018,.022,.16,8),mat(0x442200,.8,.2),0,-.005,0);
    for(let i=0;i<5;i++) smk(new THREE.TorusGeometry(.022,.004,5,12),mat(0xccaa22,.2,.9),0,-.01+i*.028,0,Math.PI/2);
    // Triforce pommel gem
    smk(new THREE.OctahedronGeometry(.028),new THREE.MeshStandardMaterial({color:0xffdd00,emissive:0xffaa00,emissiveIntensity:3}),0,-.09,0);
    const l=new THREE.PointLight(new THREE.Color(0x44ffff),3,8);l.position.set(0,.45,0);sg.add(l);

    const dirs=[[0,0,-1],[0,0,1],[1,0,0],[-1,0,0],[0,1,0],[0,-1,0],[.7,.7,0],[.7,-.7,0]];
