<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IO: FIRST CONTACT</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#000; overflow:hidden; }
canvas { display:block; width:100vw; height:100vh; }

#ui { position:fixed; inset:0; pointer-events:none; font-family:'Courier New',monospace; }

/* Crosshair */
#xhair {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:20px; height:20px; transition:opacity 0.06s;
}
#xhair::before,#xhair::after {
  content:''; position:absolute;
  background:rgba(60,210,255,0.85);
  box-shadow:0 0 5px rgba(60,210,255,0.9);
}
#xhair::before { width:2px; height:100%; left:50%; top:0; transform:translateX(-50%); }
#xhair::after  { height:2px; width:100%; top:50%; left:0; transform:translateY(-50%); }
.xdot { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:3px; height:3px; border-radius:50%; background:rgba(60,210,255,0.9); }

/* Hit marker */
#hit-marker {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  width:20px; height:20px; opacity:0; transition:opacity 0.04s;
}
#hit-marker::before,#hit-marker::after { content:''; position:absolute; background:#ff5522; }
#hit-marker::before { width:2px; height:100%; left:50%; top:0; transform:translateX(-50%); }
#hit-marker::after  { height:2px; width:100%; top:50%; left:0; transform:translateY(-50%); }

/* Ammo - bottom right */
#ammo-panel {
  position:absolute; bottom:34px; right:38px;
  display:flex; flex-direction:column; align-items:flex-end; gap:4px;
}
#ammo-num {
  font-size:44px; font-weight:700; letter-spacing:-.02em;
  color:rgba(55,205,255,0.92);
  text-shadow:0 0 20px rgba(55,205,255,0.7),0 0 44px rgba(55,205,255,0.3);
  line-height:1;
}
#ammo-lbl { font-size:9px; letter-spacing:0.22em; color:rgba(55,205,255,0.38); }
#ammo-bar { width:110px; height:3px; background:rgba(55,205,255,0.1); border:1px solid rgba(55,205,255,0.18); }
#ammo-fill { height:100%; background:linear-gradient(90deg,#003344,#00ccff); transition:width .1s; }

/* Vitals - bottom left */
#vitals { position:absolute; bottom:34px; left:38px; display:flex; flex-direction:column; gap:9px; }
.vrow { display:flex; align-items:center; gap:10px; }
.vlbl { font-size:9px; letter-spacing:.18em; width:44px; color:rgba(55,205,255,0.38); }
.vbar { width:128px; height:5px; background:rgba(255,255,255,0.05); border:1px solid rgba(55,205,255,0.12); overflow:hidden; }
.vfill { height:100%; }
#hp-fill { background:linear-gradient(90deg,#cc2200,#ff6600); }
#sh-fill { background:linear-gradient(90deg,#004488,#00aaff); }

/* Top HUD */
#score-box { position:absolute; top:20px; right:28px; text-align:right; line-height:1.85; color:rgba(55,205,255,0.72); font-size:12px; letter-spacing:.1em; text-shadow:0 0 8px rgba(55,205,255,0.35); }
#wave-box  { position:absolute; top:20px; left:28px;  line-height:1.85; color:rgba(55,205,255,0.72); font-size:12px; letter-spacing:.1em; text-shadow:0 0 8px rgba(55,205,255,0.35); }
#kill-feed { position:absolute; top:90px; right:28px; font-size:11px; letter-spacing:.06em; text-align:right; text-shadow:0 0 8px currentColor; }
#reload-ind {
  position:absolute; bottom:28%; left:50%; transform:translateX(-50%);
  color:rgba(55,205,255,0.6); font-size:10px; letter-spacing:.22em; display:none; text-align:center;
}
.rl-bar { width:100px; height:2px; background:rgba(55,205,255,0.12); margin:5px auto 0; overflow:hidden; }
.rl-fill { height:100%; background:rgba(55,205,255,0.65); animation:rlAnim 1.8s linear forwards; }
@keyframes rlAnim{from{width:0}to{width:100%}}

/* Damage vignette */
#dmg { position:fixed; inset:0; pointer-events:none; z-index:20; transition:background .12s; }

/* Pointer-lock overlay (shown when unlocked in-game) */
#lock-overlay {
  position:fixed; inset:0; z-index:60;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.62); pointer-events:all; cursor:pointer;
}
#lock-overlay .licon { font-size:2.4rem; margin-bottom:1rem; opacity:.55; animation:lp 1.8s ease-in-out infinite; }
@keyframes lp{0%,100%{opacity:.3}50%{opacity:.8}}
#lock-overlay .ltxt { font-family:'Courier New',monospace; font-size:11px; letter-spacing:.26em; color:rgba(55,205,255,0.6); text-transform:uppercase; }
#lock-overlay .ltxt2 { font-family:'Courier New',monospace; font-size:9px; letter-spacing:.18em; color:rgba(55,205,255,0.28); margin-top:.6rem; }

/* Screens */
.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:all; z-index:80; }
#start-screen { background:radial-gradient(ellipse at 50% 60%,rgba(8,4,2,.97) 0%,#000 100%); }
.iotitle { font-family:'Courier New',monospace; font-size:clamp(3rem,9vw,8rem); color:#ff6600; letter-spacing:.5em; text-shadow:0 0 40px #ff4400,0 0 100px #ff2200,0 0 200px #aa1100; animation:tp 3s ease-in-out infinite; }
@keyframes tp{0%,100%{text-shadow:0 0 40px #ff4400,0 0 100px #ff2200,0 0 200px #aa1100;}50%{text-shadow:0 0 60px #ff6600,0 0 140px #ff3300,0 0 280px #cc2200;}}
.tagline { font-family:'Courier New',monospace; color:rgba(255,160,50,.45); font-size:.78rem; letter-spacing:.35em; margin:.6rem 0 3rem; }
.scanline { width:300px; height:1px; background:linear-gradient(90deg,transparent,rgba(255,102,0,.6),transparent); margin-bottom:3rem; animation:sc 2s ease-in-out infinite; }
@keyframes sc{0%,100%{opacity:.3}50%{opacity:1}}
.btn { font-family:'Courier New',monospace; font-size:.88rem; letter-spacing:.25em; color:#ff6600; background:none; border:1px solid rgba(255,102,0,.5); padding:13px 42px; cursor:pointer; text-transform:uppercase; transition:all .2s; outline:none; }
.btn:hover { background:rgba(255,102,0,.1); box-shadow:0 0 22px rgba(255,102,0,.4); border-color:#ff6600; }
.ctable { margin-top:2.5rem; display:grid; grid-template-columns:auto auto; gap:.35rem 2.2rem; color:rgba(255,160,50,.3); font-size:.68rem; letter-spacing:.1em; }
.ck { color:rgba(255,160,50,.55); }
#dead-screen { background:radial-gradient(ellipse at center,rgba(18,2,2,.97) 0%,#000 100%); display:none; }
#dead-screen h2 { font-family:'Courier New',monospace; font-size:clamp(2rem,5vw,3.5rem); color:#ff1100; letter-spacing:.3em; text-shadow:0 0 30px #ff0000,0 0 70px #880000; margin-bottom:1rem; animation:fl .14s steps(1) infinite; }
@keyframes fl{50%{opacity:.8}}
#dead-stats { font-family:'Courier New',monospace; color:rgba(255,90,50,.65); font-size:.95rem; letter-spacing:.08em; margin-bottom:2.5rem; line-height:2.1; text-align:center; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dmg"></div>

<div id="ui">
  <div id="xhair"><div class="xdot"></div></div>
  <div id="hit-marker"></div>
  <div id="ammo-panel">
    <div id="ammo-num">100</div>
    <div id="ammo-lbl">PLASMA CHARGE</div>

  </div>

    <div class="vrow"><span class="vlbl">HULL</span><div class="vbar"><div class="vfill" id="hp-fill" style="width:100%"></div></div></div>
    <div class="vrow"><span class="vlbl">SHIELD</span><div class="vbar"><div class="vfill" id="sh-fill" style="width:100%"></div></div></div>
  </div>
  <div id="score-box"><div>KILLS &nbsp;<span id="kills">0</span></div><div>SCORE &nbsp;<span id="score">0</span></div></div>

<div id="lock-overlay" onclick="reqLock()">
  <div class="licon">⊕</div>
  <div class="ltxt">Click to lock cursor &amp; resume</div>

</div>

<div class="screen" id="start-screen">
  <div class="iotitle">IO</div>
  <div class="tagline">FIRST CONTACT &nbsp;·&nbsp; JUPITER SYSTEM &nbsp;·&nbsp; 2184 CE</div>
  <div class="scanline"></div>

    <span class="ck">WASD</span><span>Move</span>

    <span class="ck">R</span><span>Reload</span>
    <span class="ck">ESC</span><span>Release mouse</span>
  </div>

  <h2>MARINE DOWN</h2>
  <div id="dead-stats"></div>
  <button class="btn" onclick="restartGame()">REDEPLOY</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// ════════════════════════════════════════════════════════════════════
//  IO : FIRST CONTACT  —  3D FPS on Jupiter's Moon
//  • Procedural Io terrain + Jupiter GLSL shaders + Milky Way sky
//  • Hand-built 3D plasma rifle (first-person weapon model)
//  • GLSL rim-glow laser bolt shader with energy pulse animation
//  • Pointer Lock API: click=lock mouse,  ESC=release
// ════════════════════════════════════════════════════════════════════

// ── Renderer / Scenes / Cameras ─────────────────────────────────────
let renderer, scene, camera, weaponScene, weaponCamera, weaponGroup, clock;
let terrainU, jupU;
let energyCells=[], muzzleLight, muzzleSphere;

// ── Game State ───────────────────────────────────────────────────────
let gameActive=false;
let health=100, maxHealth=100, shield=100, maxShield=100, ammo=100, maxAmmo=100;
let score=0, kills=0, wave=1, lastSpawn=0, waveThresh=500, shieldRegen=0;
let enemies=[], pBolts=[], eBolts=[];

// ── Controls ─────────────────────────────────────────────────────────
const keys={};
let yaw=0, pitch=0, isLocked=false;
let swayX=0, swayY=0, bobPhase=0, kickZ=0, kickRX=0, mfTimer=0;
let reloading=false, cooldown=0;
const SPEED=14, SPRINT=22, SENS=0.0018;

// ── Noise (JS, mirrors GLSL below) ───────────────────────────────────
const fr=x=>x-Math.floor(x);
const mx=(a,b,t)=>a+(b-a)*t;
function h2(x,y){return fr(Math.sin(x*127.1+y*311.7)*43758.5453);}
function n2(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);return mx(mx(h2(ix,iy),h2(ix+1,iy),ux),mx(h2(ix,iy+1),h2(ix+1,iy+1),ux),uy);}
function fbm(x,y,o=6){let v=0,a=.5,sx=0,sy=100;for(let i=0;i<o;i++){v+=a*n2(x+sx,y+sy);x*=2;y*=2;sx+=31.7;sy+=17.3;a*=.5;}return v;}
function getH(x,z){return fbm(x*.05,z*.05)*8+fbm(x*.2,z*.2)*2;}

// ════════════════════ GLSL SHADERS ══════════════════════════════════

// ── Io Terrain ───────────────────────────────────────────────────────
const ioV=`
uniform float uTime;
varying vec2 vUv;varying float vH;varying vec3 vN,vPos;
float hh(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float nn(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(hh(i),hh(i+vec2(1,0)),f.x),mix(hh(i+vec2(0,1)),hh(i+vec2(1,1)),f.x),f.y);}
float fb(vec2 p){float v=0.,a=.5;vec2 s=vec2(0,100);for(int i=0;i<6;i++){v+=a*nn(p+s);p*=2.;s+=vec2(31.7,17.3);a*=.5;}return v;}
float hAt(vec2 xz){return fb(xz*.05)*8.+fb(xz*.2)*2.;}
void main(){
  vUv=uv;vec3 pos=position;float h=hAt(pos.xz);pos.y+=h;vH=h;vPos=pos;
  float e=.8,hx=hAt(pos.xz+vec2(e,0.)),hz=hAt(pos.xz+vec2(0.,e));
  vN=normalMatrix*normalize(cross(vec3(0.,hz-h,e),vec3(e,hx-h,0.)));
  gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.);}`;

const ioF=`
uniform float uTime;
varying vec2 vUv;varying float vH;varying vec3 vN,vPos;
float hh(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float nn(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(hh(i),hh(i+vec2(1,0)),f.x),mix(hh(i+vec2(0,1)),hh(i+vec2(1,1)),f.x),f.y);}
float fb(vec2 p){float v=0.,a=.5;vec2 s=vec2(0,100);for(int i=0;i<6;i++){v+=a*nn(p+s);p*=2.;s+=vec2(31.7,17.3);a*=.5;}return v;}
void main(){
  vec2 p=vPos.xz*.05;
  float n1=fb(p),n2=fb(p*3.+vec2(5.2,1.3)),n3=fb(p*9.+vec2(1.7,9.2)+uTime*.008),n4=fb(p*.5+vec2(3.1,7.4));
  vec3 sY=vec3(.92,.84,.10),sO=vec3(.88,.44,.05),sR=vec3(.72,.18,.06),sW=vec3(.94,.91,.82),
       bas=vec3(.16,.09,.04),basG=vec3(.28,.22,.15),lava=vec3(1.,.32,.01),lC=vec3(1.,.85,.15);
  vec3 col=mix(sY,sO,smoothstep(.3,.7,n1));
  col=mix(col,sR,smoothstep(.55,.75,n2)*.5);col=mix(col,bas,smoothstep(.6,.8,n2)*.7);
  col=mix(col,basG,smoothstep(.65,.85,n4)*.4);col=mix(col,sW,smoothstep(.78,.92,n1)*.9);
  float cal=smoothstep(3.5,-1.,vH);col=mix(col,bas,cal*.9);
  float crack=1.-smoothstep(0.,.07,abs(n3-.48));
  float lE=clamp(crack*(cal*1.5+.25),0.,1.);
  vec3 lCol=mix(lava,lC,smoothstep(.4,1.,lE));col=mix(col,lCol,lE);
  vec3 N=normalize(vN),L=normalize(vec3(.35,.85,.25));
  float diff=max(.18,dot(N,L)),sp=pow(max(0.,dot(reflect(-L,N),vec3(0.,0.,-1.))),12.)*.06;
  gl_FragColor=vec4(col*diff+sp+lCol*lE*.35,1.);}`;

// ── Jupiter ───────────────────────────────────────────────────────────
const jupV=`varying vec2 vUv;varying vec3 vN;void main(){vUv=uv;vN=normalMatrix*normal;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;
const jupF=`
uniform float uTime;varying vec2 vUv;varying vec3 vN;
float hh(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float nn(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(hh(i),hh(i+vec2(1,0)),f.x),mix(hh(i+vec2(0,1)),hh(i+vec2(1,1)),f.x),f.y);}
float fb(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*nn(p);p=p*2.+vec2(3.1,1.7);a*=.5;}return v;}
void main(){
  float t=uTime*.015;vec2 uv=vUv;
  float y=uv.y+fb(vec2(uv.x*5.+t,uv.y*2.))*.05+fb(vec2(uv.x*10.-t*.6,uv.y*4.))*.025+fb(vec2(uv.x*20.+t*.4,uv.y*8.))*.01;
  float b=y*10.,s1=sin(b*3.14159)*.5+.5,s2=sin(b*6.28318+1.3)*.5+.5,s3=sin(b*1.5708+.7)*.5+.5,s4=sin(b*9.42477-.4)*.5+.5;
  vec3 cr=vec3(.95,.89,.74),be=vec3(.82,.70,.52),o1=vec3(.78,.48,.22),o2=vec3(.68,.36,.14),ru=vec3(.55,.28,.12),db=vec3(.35,.18,.09),wh=vec3(.98,.95,.88);
  vec3 col=mix(cr,be,s1);col=mix(col,o1,s2*.65);col=mix(col,o2,s3*.5);
  col=mix(col,db,fb(vec2(uv.x*5.+t*.5,y*6.))*.55);col=mix(col,wh,fb(vec2(uv.x*3.-t*.3,y*4.+1.))*.3);col=mix(col,ru,s4*.35);
  col=mix(col,o1,fb(vec2(uv.x*20.+t*2.,y*15.))*.12);
  vec2 gd=(uv-vec2(.62,.44))*vec2(4.5,9.);float gD=length(gd),gB=smoothstep(1.,.2,gD),gS=fb(gd*1.5+vec2(t*.5,atan(gd.y,gd.x)*1.5))*gB;
  col=mix(col,mix(vec3(.70,.22,.08),vec3(.92,.44,.18),gS*1.5),gB*.9);
  vec2 sp2=(uv-vec2(.35,.56))*vec2(6.,14.);col=mix(col,vec3(.96,.86,.72),smoothstep(1.,.1,length(sp2))*.7);
  vec3 Nn=normalize(vN);float limb=dot(Nn,vec3(0.,0.,1.));
  col*=mix(.20,1.,pow(max(limb,0.),.5));col+=vec3(.18,.10,.04)*(1.-limb)*(1.-limb)*.8;
  gl_FragColor=vec4(col,1.);}`;

// ── Laser Bolt (rim-based glow, energy pulse) ─────────────────────────
const laserV=`
varying vec3 vN,vVD;varying vec2 vUv;
void main(){
  vUv=uv;vN=normalMatrix*normal;
  vec4 mv=modelViewMatrix*vec4(position,1.);vVD=-mv.xyz;
  gl_Position=projectionMatrix*mv;}`;

const laserF=`
uniform float uTime;uniform vec3 uColor;
varying vec3 vN,vVD;varying vec2 vUv;
void main(){
  vec3 N=normalize(vN),V=normalize(vVD);
  float NdV=max(0.,dot(N,V));
  float rim=1.-NdV;

  // Tip/tail taper — smooth fade at both ends
  float along=vUv.y;
  float fade=smoothstep(0.,.13,along)*smoothstep(1.,.87,along);

  // Rim glow layers (tube glow = bright at silhouette)
  float gA=pow(rim,1.1)*2.8;
  float gB=pow(rim,.45)*1.1;
  // Central brightness (facing viewer = core of beam)
  float core=pow(NdV,3.)*1.3;

  // Travelling energy pulse along bolt length
  float pulse=pow(sin(along*22.-uTime*18.)*.5+.5,2.)*.75;

  // Fine scanlines for energy texture
  float scan=sin(along*65.-uTime*4.)*.07+.93;

  vec3 white=vec3(1.);
  vec3 col=uColor*gB + white*gA + white*core;
  col+=uColor*pulse*rim*1.3;
  col*=scan;

  float alpha=(gB*.55+gA*.55+core*.4+pulse*.25)*fade;
  gl_FragColor=vec4(col,clamp(alpha,0.,1.));}`;

// ════════════════════════════════════════════════════════════════════

function init(){
  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;
  renderer.autoClear=false; // manual clear — needed for dual-pass weapon render

  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,.1,5000);
  camera.position.set(0,4,0);
  camera.rotation.order='YXZ';
  clock=new THREE.Clock();

  buildWorld();
  buildWeapon();
  setupControls();

  window.addEventListener('resize',()=>{
    renderer.setSize(innerWidth,innerHeight);
    camera.aspect=weaponCamera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    weaponCamera.updateProjectionMatrix();
  });
  renderer.setAnimationLoop(loop);
}

// ── World ────────────────────────────────────────────────────────────
let lavaLights=[],plumeList=[];

function buildWorld(){
  buildStars();
  buildJupiter();
  buildTerrain();
  buildRocks();
  buildVolcanoes();
  scene.add(new THREE.AmbientLight(0x201510,.7));
  const sun=new THREE.DirectionalLight(0xffe8cc,1.4);sun.position.set(100,300,-200);scene.add(sun);
  const jl=new THREE.DirectionalLight(0xcc6633,.5);jl.position.set(-850,620,-1900);scene.add(jl);
}

function buildStars(){
  // Main field
  const N=18000,p=new Float32Array(N*3),c=new Float32Array(N*3);
  const pal=[[1,.9,.8],[.65,.78,1],[1,.72,.55],[.92,.92,1],[1,1,.72],[.8,.95,1]];
  for(let i=0;i<N;i++){
    const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=2200+Math.random()*400;
    p[i*3]=r*Math.sin(ph)*Math.cos(th);p[i*3+1]=r*Math.sin(ph)*Math.sin(th);p[i*3+2]=r*Math.cos(ph);
    const cl=pal[Math.floor(Math.random()*pal.length)],b=.25+Math.random()*.75;
    c[i*3]=cl[0]*b;c[i*3+1]=cl[1]*b;c[i*3+2]=cl[2]*b;
  }
  const sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.BufferAttribute(p,3));sg.setAttribute('color',new THREE.BufferAttribute(c,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({size:1.4,sizeAttenuation:true,vertexColors:true,transparent:true,opacity:.92,depthWrite:false})));

  // Milky Way band
  const MW=12000,ta=1.05,mp=new Float32Array(MW*3),mc=new Float32Array(MW*3);
  for(let i=0;i<MW;i++){
    const th=Math.random()*Math.PI*2,bw=Math.random()-.5,ph=Math.PI/2+bw*.18*(1+2*Math.abs(bw)),r=1850+Math.random()*200;
    const x=r*Math.sin(ph)*Math.cos(th),y=r*Math.cos(ph),z=r*Math.sin(ph)*Math.sin(th);
    mp[i*3]=x;mp[i*3+1]=y*Math.cos(ta)-z*Math.sin(ta);mp[i*3+2]=y*Math.sin(ta)+z*Math.cos(ta);
    const t=Math.random(),br=.06+Math.random()*.22;
    const [rc,gc,bc]=t<.25?[.55,.65,1]:t<.55?[1,.88,.95]:t<.75?[1,.70,.45]:[.85,.90,1];
    mc[i*3]=rc*br;mc[i*3+1]=gc*br;mc[i*3+2]=bc*br;
  }
  const mwg=new THREE.BufferGeometry();mwg.setAttribute('position',new THREE.BufferAttribute(mp,3));mwg.setAttribute('color',new THREE.BufferAttribute(mc,3));
  scene.add(new THREE.Points(mwg,new THREE.PointsMaterial({size:1.2,vertexColors:true,transparent:true,opacity:.75,depthWrite:false,blending:THREE.AdditiveBlending})));

  // Nebula clouds
  const NB=180,nbp=new Float32Array(NB*3),nbc=new Float32Array(NB*3);
  const nbcl=[[.4,.15,.7],[.1,.25,.8],[.7,.1,.3],[0,.45,.55],[.5,.3,.1]];
  for(let i=0;i<NB;i++){
    const th=Math.random()*Math.PI*2,ph=(Math.random()-.5)*.7+Math.PI/2,r=1650;
    nbp[i*3]=r*Math.sin(ph)*Math.cos(th);nbp[i*3+1]=r*Math.cos(ph)*.8;nbp[i*3+2]=r*Math.sin(ph)*Math.sin(th);
    const nc=nbcl[Math.floor(Math.random()*nbcl.length)],b=.04+Math.random()*.09;
    nbc[i*3]=nc[0]*b;nbc[i*3+1]=nc[1]*b;nbc[i*3+2]=nc[2]*b;
  }
  const nbg=new THREE.BufferGeometry();nbg.setAttribute('position',new THREE.BufferAttribute(nbp,3));nbg.setAttribute('color',new THREE.BufferAttribute(nbc,3));
  scene.add(new THREE.Points(nbg,new THREE.PointsMaterial({size:60,vertexColors:true,transparent:true,opacity:.5,depthWrite:false,blending:THREE.AdditiveBlending})));
}

// ════════════════ 3D WEAPON MODEL ════════════════════════════════════
// Renders in its own scene/camera (dual-pass: world first, weapon on top with cleared depth)
// The weapon camera stays at identity — weapon is always fixed in screen space (bottom-right)
function buildWeapon(){
  weaponScene=new THREE.Scene();
  weaponCamera=new THREE.PerspectiveCamera(62,innerWidth/innerHeight,.01,50);
  weaponScene.add(weaponCamera);

  // Independent weapon lighting
  weaponScene.add(new THREE.AmbientLight(0x283040,1.9));
  const kl=new THREE.DirectionalLight(0xaaddff,3.2);kl.position.set(-1,2.5,1.5);weaponScene.add(kl);
  const fl=new THREE.DirectionalLight(0xff5522,.9);fl.position.set(3,-1,1);weaponScene.add(fl);
  const rl=new THREE.DirectionalLight(0x1144aa,.6);rl.position.set(-2,.5,-2);weaponScene.add(rl);

  weaponGroup=new THREE.Group();

  // ── Shared materials ──────────────────────────────────────
  const mD=()=>new THREE.MeshStandardMaterial({color:0x121418,roughness:.24,metalness:.93});
  const mM=()=>new THREE.MeshStandardMaterial({color:0x1e2228,roughness:.35,metalness:.88});
  const mA=()=>new THREE.MeshStandardMaterial({color:0x1a2535,roughness:.16,metalness:.96});
  const mG=()=>new THREE.MeshStandardMaterial({color:0x0c0f12,roughness:.76,metalness:.18});
  const mLns=new THREE.MeshStandardMaterial({color:0x001030,roughness:0,metalness:.3,emissive:0x001844,emissiveIntensity:.7});
  const mCell=new THREE.MeshStandardMaterial({color:0x00ccff,roughness:.04,metalness:0,emissive:0x00aaff,emissiveIntensity:2.6,transparent:true,opacity:.88});
  const mGlw=new THREE.MeshBasicMaterial({color:0x22ddff,transparent:true,opacity:.12});
  const mBlk=new THREE.MeshBasicMaterial({color:0x000000});

  const mk=(geo,mat,x=0,y=0,z=0,rx=0,ry=0,rz=0)=>{const m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);if(rx||ry||rz)m.rotation.set(rx,ry,rz);return m;};

  // ─── RECEIVER ─────────────────────────────────────────────
  weaponGroup.add(mk(new THREE.BoxGeometry(.082,.060,.30),mD()));           // main frame
  // Side panels (detail plates)
  [-1,1].forEach(s=>weaponGroup.add(mk(new THREE.BoxGeometry(.004,.054,.28),mM(),s*.043,0,0)));
  weaponGroup.add(mk(new THREE.BoxGeometry(.058,.010,.28),mM(),0,.035,0));  // top rail
  // Rail slots
  for(let i=0;i<6;i++) weaponGroup.add(mk(new THREE.BoxGeometry(.060,.006,.012),new THREE.MeshStandardMaterial({color:0x080a0c,roughness:.8,metalness:.5}),0,.034,-.11+i*.044));
  weaponGroup.add(mk(new THREE.BoxGeometry(.072,.022,.18),mM(),0,-.041,-.04)); // lower handguard
  // Ejection port
  weaponGroup.add(mk(new THREE.BoxGeometry(.006,.030,.055),mBlk,-.043,0,-.025));
  // Front sight post
  weaponGroup.add(mk(new THREE.BoxGeometry(.004,.018,.004),mM(),0,.047,-.14));

  // ─── BARREL ASSEMBLY ──────────────────────────────────────
  weaponGroup.add(mk(new THREE.CylinderGeometry(.022,.022,.20,6),mD(),0,.002,-.215,Math.PI/2,0,0)); // shroud (hex)
  weaponGroup.add(mk(new THREE.CylinderGeometry(.010,.011,.42,10),mM(),0,.002,-.32,Math.PI/2,0,0)); // barrel
  weaponGroup.add(mk(new THREE.CylinderGeometry(.020,.016,.038,12),mA(),0,.002,-.462,Math.PI/2,0,0)); // muzzle device
  // Compensator cuts
  for(let i=0;i<3;i++) weaponGroup.add(mk(new THREE.BoxGeometry(.042,.011,.006),mD(),0,.010+i*.012,-.448));
  // Bore hole
  weaponGroup.add(mk(new THREE.CylinderGeometry(.007,.007,.05,8),mBlk,0,.002,-.478,Math.PI/2,0,0));
  // Flash hider ring glow
  weaponGroup.add(mk(new THREE.TorusGeometry(.021,.003,8,20),mGlw,0,.002,-.482,Math.PI/2,0,0));
  // Barrel cooling fins
  for(let i=0;i<5;i++) weaponGroup.add(mk(new THREE.CylinderGeometry(.024,.024,.003,6),mM(),0,.002,-.16-i*.028,Math.PI/2,0,0));

  // ─── ENERGY MAGAZINE / CELL ───────────────────────────────
  const cellMain=mk(new THREE.BoxGeometry(.042,.038,.13),mCell,0,-.052,.018);
  weaponGroup.add(cellMain); energyCells.push(cellMain);
  // Energy window fins
  for(let i=0;i<4;i++){
    const fin=mk(new THREE.BoxGeometry(.044,.004,.008),new THREE.MeshStandardMaterial({color:0x00aaff,roughness:.08,emissive:0x00aaff,emissiveIntensity:1.6}),0,-.037+i*.014,.07);
    weaponGroup.add(fin); energyCells.push(fin);
  }
  weaponGroup.add(mk(new THREE.BoxGeometry(.048,.044,.136),mGlw,0,-.052,.018)); // halo
  // Magazine release button
  weaponGroup.add(mk(new THREE.BoxGeometry(.005,.014,.008),mA(),.042,-.050,.038));

  // ─── PISTOL GRIP ──────────────────────────────────────────
  const grp=mk(new THREE.BoxGeometry(.052,.090,.050),mG(),0,-.072,.085);
  grp.rotation.x=.22; weaponGroup.add(grp);
  // Finger grooves
  for(let i=0;i<4;i++) weaponGroup.add(mk(new THREE.BoxGeometry(.054,.008,.014),new THREE.MeshStandardMaterial({color:0x181c20,roughness:.9}),0,-.045-i*.018,.072));
  // Trigger guard (torus arc)
  const tg=mk(new THREE.TorusGeometry(.022,.004,6,14,Math.PI),mM(),0,-.038,.055);tg.rotation.z=Math.PI/2;weaponGroup.add(tg);
  // Trigger
  weaponGroup.add(mk(new THREE.BoxGeometry(.004,.024,.010),mA(),0,-.040,.050));

  // ─── SCOPE ────────────────────────────────────────────────
  weaponGroup.add(mk(new THREE.BoxGeometry(.030,.016,.092),mM(),0,.052,.015));              // mount
  weaponGroup.add(mk(new THREE.CylinderGeometry(.016,.016,.090,12),mD(),0,.068,.015,Math.PI/2,0,0)); // tube
  // Elevation/windage turrets
  weaponGroup.add(mk(new THREE.CylinderGeometry(.006,.006,.016,8),mM(),0,.086,.015));
  weaponGroup.add(mk(new THREE.CylinderGeometry(.006,.006,.016,8),mM(),.024,.068,.015,0,0,Math.PI/2));
  // Objective lens (front)
  weaponGroup.add(mk(new THREE.CylinderGeometry(.015,.015,.004,12),mLns,0,.068,-.03,Math.PI/2,0,0));
  // Eyepiece lens (rear)
  weaponGroup.add(mk(new THREE.CylinderGeometry(.013,.013,.004,12),mLns,0,.068,.062,Math.PI/2,0,0));
  // Inner lens glow
  weaponGroup.add(mk(new THREE.CylinderGeometry(.010,.010,.002,12),new THREE.MeshBasicMaterial({color:0x001a33}),0,.068,-.029,Math.PI/2,0,0));

  // ─── STOCK ────────────────────────────────────────────────
  weaponGroup.add(mk(new THREE.BoxGeometry(.064,.038,.16),mD(),0,-.008,.192));
  weaponGroup.add(mk(new THREE.BoxGeometry(.058,.026,.085),mM(),0,.020,.190)); // cheek rest
  weaponGroup.add(mk(new THREE.BoxGeometry(.062,.042,.010),mG(),0,-.002,.272)); // butt pad
  weaponGroup.add(mk(new THREE.CylinderGeometry(.005,.005,.020,6),mM(),.030,0,.268,0,0,Math.PI/2)); // sling point
  // Stock skeleton cutouts
  [-1,1].forEach(s=>weaponGroup.add(mk(new THREE.BoxGeometry(.004,.018,.055),mBlk,s*.031,-.004,.215)));

  // ─── MUZZLE FLASH ─────────────────────────────────────────
  muzzleLight=new THREE.PointLight(0x88eeff,0,5);
  muzzleLight.position.set(0,.002,-.50);
  weaponGroup.add(muzzleLight);

  muzzleSphere=new THREE.Mesh(new THREE.SphereGeometry(.026,8,8),new THREE.MeshBasicMaterial({color:0xaaeeff}));
  muzzleSphere.position.set(0,.002,-.488);muzzleSphere.visible=false;
  weaponGroup.add(muzzleSphere);

  // ─── Place weapon in view ──────────────────────────────────
  // x=right, y=down, z=toward screen  (bottom-right first-person position)
  weaponGroup.position.set(.24,-.21,-.42);
  weaponGroup.rotation.y=.038; // slight inward tilt for natural hold
  weaponCamera.add(weaponGroup);
}

// ── Controls ─────────────────────────────────────────────────────────
function setupControls(){
  document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='KeyR'&&gameActive)startReload();});
  document.addEventListener('keyup',  e=>{keys[e.code]=false;});

  // Pointer Lock change handler
  document.addEventListener('pointerlockchange',()=>{
    isLocked=(document.pointerLockElement===renderer.domElement);
    if(gameActive){
      document.getElementById('lock-overlay').style.display=isLocked?'none':'flex';
    }
  });

  // Mouse look (only when pointer is locked)
  document.addEventListener('mousemove',e=>{
    if(!isLocked||!gameActive)return;
    const dx=e.movementX*SENS, dy=e.movementY*SENS;
    yaw  -=dx;
    pitch-=dy;
    pitch =Math.max(-1.15,Math.min(1.15,pitch));
    // Weapon inertia sway (trails camera look)
    swayX+=dx*.13;
    swayY+=dy*.11;
  });

  // Click: lock pointer OR fire
  document.addEventListener('mousedown',e=>{
    if(!gameActive)return;
    if(!isLocked){reqLock();return;}
    if(e.button===0)fireWeapon();
  });
}

function reqLock(){
  renderer.domElement.requestPointerLock();
}

// ── Fire ─────────────────────────────────────────────────────────────
function fireWeapon(){
  if(cooldown>0||reloading||ammo<=0||!gameActive)return;
  ammo--;cooldown=0.11;
  updateHUD();

  // Kick & flash
  kickZ=0.040; kickRX=-0.10;
  muzzleLight.intensity=7; mfTimer=0.068;
  muzzleSphere.visible=true;

  // Crosshair flare
  const xh=document.getElementById('xhair');xh.style.opacity='.15';setTimeout(()=>xh.style.opacity='1',65);

  // Muzzle world position (approximate from camera offset)
  const fwd=new THREE.Vector3(),right=new THREE.Vector3(),up=new THREE.Vector3();
  camera.getWorldDirection(fwd);
  right.crossVectors(fwd,new THREE.Vector3(0,1,0)).normalize();
  up.crossVectors(right,fwd);
  const muzzleWP=camera.position.clone()
    .addScaledVector(right, .20)
    .addScaledVector(up,   -.10)
    .addScaledVector(fwd,   .55);

  spawnBolt(muzzleWP,fwd.clone(),false);
  if(ammo===0)setTimeout(startReload,300);
}

function spawnBolt(startPos,dirVec,isEnemy){
  const LEN=1.5;
  const grp=new THREE.Group();
  grp.position.copy(startPos);

  const dir=dirVec.clone().normalize();
  // Orient cylinder Y-axis to travel direction
  grp.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);

  if(isEnemy){
    // Enemy bolt: red/orange
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(.008,.008,LEN,6),new THREE.MeshBasicMaterial({color:0xff2200})));
    const u={uTime:{value:0},uColor:{value:new THREE.Color(.9,.12,0)}};
    const glw=new THREE.Mesh(new THREE.CylinderGeometry(.055,.055,LEN,14,1,true),new THREE.ShaderMaterial({uniforms:u,vertexShader:laserV,fragmentShader:laserF,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide}));
    grp.add(glw);
    const pl=new THREE.PointLight(0xff2200,3.5,10);grp.add(pl);
    grp.userData={vel:dir.clone().multiplyScalar(22),age:0,unis:[u],isEnemy:true};
    scene.add(grp);eBolts.push(grp);
  }else{
    // Player bolt: cyan layers
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(.010,.010,LEN,8),new THREE.MeshBasicMaterial({color:0xffffff})));
    const u1={uTime:{value:0},uColor:{value:new THREE.Color(0,.67,1)}};
    const u2={uTime:{value:0},uColor:{value:new THREE.Color(.27,.8,1)}};
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(.060,.060,LEN,16,1,true),new THREE.ShaderMaterial({uniforms:u1,vertexShader:laserV,fragmentShader:laserF,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide})));
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(.030,.030,LEN*1.02,12,1,true),new THREE.ShaderMaterial({uniforms:u2,vertexShader:laserV,fragmentShader:laserF,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide})));
    const pl=new THREE.PointLight(0x22aaff,4,12);grp.add(pl);
    grp.userData={vel:dir.clone().multiplyScalar(95),age:0,unis:[u1,u2],isEnemy:false};
    scene.add(grp);pBolts.push(grp);
  }
}

function startReload(){
  if(reloading||ammo===maxAmmo)return;
  reloading=true;
  const ri=document.getElementById('reload-ind');
  ri.style.display='block';
  const bar=document.getElementById('rl-fill');
  bar.style.animation='none';bar.offsetHeight;bar.style.animation='rlAnim 1.8s linear forwards';
  setTimeout(()=>{ammo=maxAmmo;reloading=false;ri.style.display='none';updateHUD();},1800);
}

// ── Enemies ───────────────────────────────────────────────────────────
function spawnEnemy(){
  const a=Math.random()*Math.PI*2,d=35+Math.random()*55;
  const x=camera.position.x+Math.cos(a)*d,z=camera.position.z+Math.sin(a)*d,h=getH(x,z);
  const g=new THREE.Group();
  const bGeo=new THREE.OctahedronGeometry(1.1,1),bp=bGeo.attributes.position;
  for(let i=0;i<bp.count;i++)bp.setXYZ(i,bp.getX(i)*(.8+Math.random()*.4),bp.getY(i)*(1.2+Math.random()*.4),bp.getZ(i)*(.8+Math.random()*.4));
  bGeo.computeVertexNormals();
  const body=new THREE.Mesh(bGeo,new THREE.MeshStandardMaterial({color:0x110400,roughness:.25,metalness:.85,emissive:0x440800,emissiveIntensity:.4}));g.add(body);
  const eye=new THREE.Mesh(new THREE.SphereGeometry(.3,10,10),new THREE.MeshBasicMaterial({color:0xff1100}));eye.position.z=.95;g.add(eye);
  const eL=new THREE.PointLight(0xff2200,1.5,5);eL.position.copy(eye.position);g.add(eL);
  const rings=[];for(let i=0;i<3;i++){const r=new THREE.Mesh(new THREE.TorusGeometry(1.4+i*.35,.055,6,24),new THREE.MeshBasicMaterial({color:0x550200,transparent:true,opacity:.55}));r.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);g.add(r);rings.push(r);}
  g.position.set(x,h+3.5,z);
  g.userData={hp:3,maxHp:3,speed:4.5+Math.random()*2.5+wave*.4,shootTimer:1+Math.random()*2,hoverPhase:Math.random()*Math.PI*2,rings,eye,eL,body,isDying:false};
  scene.add(g);enemies.push(g);
}

function updateEnemies(dt){
  const dead=[];
  for(const e of enemies){
    const ud=e.userData;if(ud.isDying){dead.push(e);continue;}
    ud.hoverPhase+=dt*2.2;
    e.position.y=getH(e.position.x,e.position.z)+3.5+Math.sin(ud.hoverPhase)*.6;
    const toP=new THREE.Vector3().subVectors(camera.position,e.position),dist=toP.length();
    e.rotation.y=Math.atan2(toP.x,toP.z);
    if(dist>10)e.position.addScaledVector(toP.clone().normalize(),ud.speed*dt);
    for(const r of ud.rings){r.rotation.x+=dt*1.2;r.rotation.y+=dt*.8;}
    ud.eL.intensity=(.8+.2*Math.sin(ud.hoverPhase*3))*1.8;
    ud.shootTimer-=dt;
    if(ud.shootTimer<=0&&dist<70){spawnBolt(e.position.clone(),new THREE.Vector3().subVectors(camera.position,e.position).normalize().addScaledVector(new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5),.22).normalize(),true);ud.shootTimer=Math.max(.5,2.5-wave*.15)+Math.random()*1.5;}
    if(ud.hp<=0){ud.isDying=true;dead.push(e);}
  }
  for(const e of dead){
    killExplosion(e.position.clone());scene.remove(e);
    enemies=enemies.filter(x=>x!==e);kills++;score+=100*wave;showKillFeed();updateHUD();
  }
}

function killExplosion(pos){
  const N=50,geo=new THREE.BufferGeometry(),arr=new Float32Array(N*3),vels=[];
  for(let i=0;i<N;i++){arr[i*3]=pos.x+(Math.random()-.5)*1.5;arr[i*3+1]=pos.y+(Math.random()-.5)*1.5;arr[i*3+2]=pos.z+(Math.random()-.5)*1.5;vels.push((Math.random()-.5)*6,(Math.random()-.5)*6+2,(Math.random()-.5)*6);}
  geo.setAttribute('position',new THREE.BufferAttribute(arr,3));
  const mat=new THREE.PointsMaterial({color:0xff4400,size:.8,transparent:true,opacity:1,blending:THREE.AdditiveBlending,depthWrite:false});
  const pts=new THREE.Points(geo,mat);scene.add(pts);
  const fl=new THREE.PointLight(0xff4400,15,25);fl.position.copy(pos);scene.add(fl);
  let t=0;const tick=()=>{t+=.04;const pa=geo.attributes.position.array;for(let i=0;i<N;i++){pa[i*3]+=vels[i*3]*.04;pa[i*3+1]+=vels[i*3+1]*.04-.05;pa[i*3+2]+=vels[i*3+2]*.04;}geo.attributes.position.needsUpdate=true;mat.opacity=1-t;mat.size=.8+t*3;fl.intensity=15*(1-t);if(t<1)requestAnimationFrame(tick);else{scene.remove(pts);scene.remove(fl);}};requestAnimationFrame(tick);
}

// ── Bolt Update ────────────────────────────────────────────────────────
function updateBolts(dt){
  const cleanup=(arr,isPlayer)=>{
    const rem=[];
    for(const p of arr){
      p.position.addScaledVector(p.userData.vel,dt);
      p.userData.age+=dt;
      for(const u of p.userData.unis)u.uTime.value+=dt;
      if(p.userData.age>3||p.position.y<getH(p.position.x,p.position.z)){rem.push(p);continue;}
      if(isPlayer){
        let hit=false;
        for(const e of enemies){
          if(p.position.distanceTo(e.position)<2.8){
            e.userData.hp--;
            e.userData.body.material.emissive.setHex(0xff2200);setTimeout(()=>{if(e.userData.body)e.userData.body.material.emissive.setHex(0x440800);},90);
            const hm=document.getElementById('hit-marker');hm.style.opacity='1';setTimeout(()=>hm.style.opacity='0',120);
            rem.push(p);hit=true;break;
          }
        }
        if(!hit&&p.userData.age>2.5)rem.push(p);
      }else{
        if(p.position.distanceTo(camera.position)<1.5){takeDamage(8+Math.floor(Math.random()*8));rem.push(p);}
      }
    }
    rem.forEach(p=>scene.remove(p));
    return arr.filter(p=>!rem.includes(p));
  };
  pBolts=cleanup(pBolts,true);
  eBolts=cleanup(eBolts,false);
}

// ── Plumes ─────────────────────────────────────────────────────────────
function updatePlumes(dt){
  for(const pts of plumeList){
    const ud=pts.userData,pa=pts.geometry.attributes.position.array;
    for(let i=0;i<ud.N;i++){
      ud.life[i]+=dt*.25;
      if(ud.life[i]>1){ud.life[i]=0;const a=Math.random()*Math.PI*2,r=Math.random()*3;pa[i*3]=ud.ox+Math.cos(a)*r;pa[i*3+1]=ud.oy;pa[i*3+2]=ud.oz+Math.sin(a)*r;ud.vel[i*3]=(Math.random()-.5)*3;ud.vel[i*3+1]=4+Math.random()*8;ud.vel[i*3+2]=(Math.random()-.5)*3;}
      else{pa[i*3]+=ud.vel[i*3]*dt;pa[i*3+1]+=ud.vel[i*3+1]*dt;pa[i*3+2]+=ud.vel[i*3+2]*dt;ud.vel[i*3+1]-=2.5*dt;}
    }
    pts.geometry.attributes.position.needsUpdate=true;
    pts.material.opacity=.6+.15*Math.sin(Date.now()*.003);
  }
}

// ── Player ─────────────────────────────────────────────────────────────
function updatePlayer(dt){
  const d=new THREE.Vector3();
  if(keys['KeyW']||keys['ArrowUp'])   d.z-=1;
  if(keys['KeyS']||keys['ArrowDown']) d.z+=1;
  if(keys['KeyA']||keys['ArrowLeft']) d.x-=1;
  if(keys['KeyD']||keys['ArrowRight'])d.x+=1;
  if(d.lengthSq()>0)d.normalize();
  const spd=(keys['ShiftLeft']||keys['ShiftRight'])?SPRINT:SPEED;
  d.multiplyScalar(spd*dt).applyEuler(new THREE.Euler(0,yaw,0));
  camera.position.x=Math.max(-320,Math.min(320,camera.position.x+d.x));
  camera.position.z=Math.max(-320,Math.min(320,camera.position.z+d.z));
  camera.position.y=getH(camera.position.x,camera.position.z)+1.75;
  camera.rotation.y=yaw; camera.rotation.x=pitch;
  cooldown=Math.max(0,cooldown-dt);
  if(shield<maxShield){shieldRegen+=dt;if(shieldRegen>4){shield=Math.min(maxShield,shield+8*dt);updateHUD();}}
}

// ── Weapon Animation ────────────────────────────────────────────────────
function updateWeapon(dt,now){
  if(!gameActive)return;

  // Walk/sprint bob
  const mv=keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD'];
  const sp=keys['ShiftLeft']||keys['ShiftRight'];
  const bf=sp?13:mv?9:2, bax=sp?.014:mv?.008:.003, bay=sp?.010:mv?.006:.002;
  bobPhase+=bf*dt;
  const bX=Math.sin(bobPhase)*bax, bY=Math.abs(Math.sin(bobPhase*.5))*bay;

  // Mouse-look inertia sway
  const ms=.06;
  swayX=Math.max(-ms,Math.min(ms,swayX*Math.pow(.04,dt)));
  swayY=Math.max(-ms,Math.min(ms,swayY*Math.pow(.04,dt)));

  // Idle breathing
  const iX=Math.sin(now*.65)*.004, iY=Math.cos(now*.9)*.003;

  // Recoil kick springs
  kickZ*=Math.pow(.015,dt); kickRX*=Math.pow(.015,dt);

  weaponGroup.position.set(.24+bX+swayX+iX, -.21-bY+swayY+iY, -.42+kickZ);
  weaponGroup.rotation.x=kickRX;

  // Muzzle flash decay
  if(mfTimer>0){
    mfTimer=Math.max(0,mfTimer-dt);
    muzzleLight.intensity=mfTimer>0?7:0;
    if(muzzleSphere)muzzleSphere.visible=mfTimer>0;
  }

  // Energy cell pulse glow
  const pulse=.8+.2*Math.sin(now*4.5);
  for(const m of energyCells)m.material.emissiveIntensity=2.6*pulse;
}

// ── Damage ──────────────────────────────────────────────────────────────
function takeDamage(dmg){
  if(!gameActive)return;
  if(shield>0){const abs=Math.min(shield,dmg*.7);shield-=abs;dmg-=abs;shieldRegen=0;updateHUD();}
  health-=dmg;health=Math.max(0,health);updateHUD();
  const dv=document.getElementById('dmg');
  dv.style.background=`radial-gradient(ellipse at center,transparent 55%,rgba(255,0,0,${Math.min(.5,dmg/40)}) 100%)`;
  setTimeout(()=>dv.style.background='',200);
  if(health<=0)gameOver();
}

// ── HUD ─────────────────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('hp-fill').style.width=(health/maxHealth*100)+'%';
  document.getElementById('sh-fill').style.width=(shield/maxShield*100)+'%';
  document.getElementById('ammo-num').textContent=ammo;
  document.getElementById('ammo-fill').style.width=(ammo/maxAmmo*100)+'%';
  document.getElementById('kills').textContent=kills;
  document.getElementById('score').textContent=score;
  document.getElementById('wave').textContent=wave;
  document.getElementById('ecnt').textContent=enemies.length;
}

let kfT;
function showKillFeed(){
  const kf=document.getElementById('kill-feed');
  kf.style.color='#ff5522';kf.textContent=`► DRONE ELIMINATED  +${100*wave}`;
  clearTimeout(kfT);kfT=setTimeout(()=>kf.textContent='',2200);
}

// ── Waves ────────────────────────────────────────────────────────────────
function updateWaves(now){
  if(!gameActive)return;
  if(enemies.length<3+wave*2&&now-lastSpawn>Math.max(.8,3.5-wave*.25)){spawnEnemy();lastSpawn=now;}
  if(score>=waveThresh&&wave<12){
    wave++;waveThresh=score+500*wave;updateHUD();
    const kf=document.getElementById('kill-feed');kf.style.color='#ffaa00';kf.textContent=`◉ WAVE ${wave} INCOMING`;
    clearTimeout(kfT);kfT=setTimeout(()=>{kf.textContent='';kf.style.color='#ff5522';},2500);
  }
}

function updateLava(){for(const ll of lavaLights){ll.phase+=.05;ll.light.intensity=ll.base*(.8+.2*Math.sin(ll.phase)+.1*Math.sin(ll.phase*3.7+1.2));}}

// ── Game State ────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('start-screen').style.display='none';
  gameActive=true;
  health=maxHealth;shield=maxShield;ammo=maxAmmo;
  score=0;kills=0;wave=1;lastSpawn=0;waveThresh=500;shieldRegen=0;
  for(let i=0;i<3;i++)setTimeout(spawnEnemy,i*600);
  reqLock();updateHUD();
}

function restartGame(){
  enemies.forEach(e=>scene.remove(e));pBolts.forEach(p=>scene.remove(p));eBolts.forEach(p=>scene.remove(p));
  enemies=[];pBolts=[];eBolts=[];
  camera.position.set(0,getH(0,0)+1.75,0);yaw=0;pitch=0;
  document.getElementById('dead-screen').style.display='none';
  startGame();
}

function gameOver(){
  gameActive=false;
  document.exitPointerLock();
  document.getElementById('lock-overlay').style.display='none';
  document.getElementById('dead-stats').innerHTML=`FINAL SCORE &nbsp; ${score}<br>KILLS &nbsp; ${kills}<br>WAVES SURVIVED &nbsp; ${wave}`;
  document.getElementById('dead-screen').style.display='flex';
}

// ── Render Loop ───────────────────────────────────────────────────────────
function loop(){
  const dt=Math.min(clock.getDelta(),.05);
  const now=clock.elapsedTime;

  terrainU.uTime.value=now;
  jupU.uTime.value=now;
  updateLava();
  updatePlumes(dt);

  if(gameActive){
    updatePlayer(dt);
    updateEnemies(dt);
    updateBolts(dt);
    updateWaves(now);
    updateWeapon(dt,now);
  }

  // ── Two-pass render ─────────────────────────────────────
  // Pass 1: Clear all buffers, render world
  renderer.clear();
  renderer.render(scene,camera);

  // Pass 2: Clear ONLY the depth buffer, render weapon scene on top.
  //         weaponCamera stays at identity so the weapon is screen-space fixed (bottom-right).
  //         No depth fight with terrain; weapon always appears in front.
  renderer.clearDepth();
  renderer.render(weaponScene,weaponCamera);
}

init();
</script>
