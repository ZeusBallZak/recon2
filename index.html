    const l=new THREE.PointLight(new THREE.Color(WEAPONS.rail.pickupCol),2,6);parent.add(l);
  }
  else if(type==='rocket'){
    // Large launcher tube + grip + sight
    mk(new THREE.CylinderGeometry(.06,.06,.38,12),mat(0x1a0800,.5,.7),0,.01,-.12,Math.PI/2);// tube
    mk(new THREE.CylinderGeometry(.066,.066,.02,12),mat(0x330a00,.4,.6),0,.01,.06,Math.PI/2);// front ring
    mk(new THREE.BoxGeometry(.09,.08,.18),mat(0x120600,.6,.5),0,-.02,.01);// body
    mk(new THREE.BoxGeometry(.025,.10,.035),mat(0x0e0500,.8,.2),0,-.08,.04);// grip
    mk(new THREE.BoxGeometry(.06,.02,.06),mat(0x1a0800,.4,.8),0,.06,.01);// sight bar
    mk(new THREE.CylinderGeometry(.006,.006,.02,5),mat(0x330a00,.3,.9),0,.075,.01,Math.PI/2);// sight
    const l=new THREE.PointLight(new THREE.Color(WEAPONS.rocket.pickupCol),2.5,7);parent.add(l);
  }
  else if(type==='dual'){
    // Two compact pistols side by side
    [-1,1].forEach(s=>{
      const ox=s*.065;
      mk(new THREE.BoxGeometry(.06,.05,.14),mat(0x1a1500,.3,.9),ox,0,0);
      mk(new THREE.CylinderGeometry(.010,.010,.14,6),mat(0x0e0c00,.2,.95),ox,.02,-.10,Math.PI/2);
      mk(new THREE.BoxGeometry(.025,.07,.04),mat(0x0e0c00,.8,.2),ox,-.055,.035);
      const l=new THREE.PointLight(new THREE.Color(WEAPONS.dual.pickupCol),1,4);l.position.set(ox,0,0);parent.add(l);
    });
  }
  else if(type==='flame'){
    // Round tank + bent nozzle tube
    mk(new THREE.CylinderGeometry(.075,.075,.20,12),mat(0x3a2800,.6,.6),-.04,.01,.02);// tank
    mk(new THREE.CylinderGeometry(.055,.055,.20,12),mat(0x2a1e00,.5,.5), .04,.01,.02);// tank2
    mk(new THREE.BoxGeometry(.12,.04,.06),mat(0x1e1400,.5,.5),0,.05,-.06);// connector
    mk(new THREE.CylinderGeometry(.018,.022,.18,8),mat(0x221000,.3,.7),.04,.01,-.16,Math.PI/2);// nozzle tube
    mk(new THREE.ConeGeometry(.028,.04,8),mat(0xff6600,.4,.3,0xff4400,3),.04,.01,-.26,Math.PI/2);// nozzle tip
    mk(new THREE.BoxGeometry(.025,.085,.04),mat(0x0e0a00,.8,.2),0,-.06,.02);// grip
    const l=new THREE.PointLight(new THREE.Color(WEAPONS.flame.pickupCol),2,6);l.position.set(0,0,-.22);parent.add(l);
  }
  else if(type==='cannon'){
    // Massive squat cylinder + 4 fins + dark glow
    mk(new THREE.CylinderGeometry(.09,.12,.22,14),mat(0x06020c,.4,.6,.440066,2),0,0,0,Math.PI/2);// barrel
    for(let i=0;i<4;i++){
      const fin=new THREE.Mesh(new THREE.BoxGeometry(.04,.18,.008),mat(0x0c0818,.3,.7));
      fin.position.set(Math.cos(i*Math.PI/2)*.1,Math.sin(i*Math.PI/2)*.1,-.04);parent.add(fin);
    }
    mk(new THREE.BoxGeometry(.12,.10,.18),mat(0x08040f,.5,.5));// body
    mk(new THREE.BoxGeometry(.04,.09,.05),mat(0x060210,.8,.2),0,-.09,.04);// grip
    mk(new THREE.SphereGeometry(.026,8,6),new THREE.MeshStandardMaterial({color:0xaaaaff,emissive:0x6666ff,emissiveIntensity:4}),0,0,.12);// muzzle gem
    const l=new THREE.PointLight(new THREE.Color(WEAPONS.cannon.pickupCol),3,8);parent.add(l);
  }
}

// ── Equip weapon: swap geometry on rightGrip weaponGroup ─────────
function equipWeapon(type){
  currentWeapon=type;
  currentWeaponIndex=WEAPONS_ORDER.indexOf(type);
  if(type!=='saber') saberTip=null; // cleared; will be set when saber geometry is built
  const def=WEAPONS[type];
  if(weaponAmmoMap[type]===undefined) weaponAmmoMap[type]=def.ammo;
  // Partial refill on pickup if already owned
  else if(def.ammo!==Infinity) weaponAmmoMap[type]=Math.min(def.ammo, (weaponAmmoMap[type]||0)+def.ammo);

  if(!weaponGroup)return;
  // Clear current geometry
  while(weaponGroup.children.length) weaponGroup.remove(weaponGroup.children[0]);
  energyCells=[];

  if(type==='laser'){
    // Rebuild the original laser rifle
    buildWeaponModel();
    // Re-attach to rightGrip
    if(rightGrip){ rightGrip.remove(weaponGroup); rightGrip.add(weaponGroup); }
  } else {
    buildWeaponGeometry(type, weaponGroup);
    // Re-add muzzle flash nodes
    weaponGroup.add(muzzleLight);
    weaponGroup.add(muzzleSphere);
    weaponGroup.scale.setScalar(1.5);
    weaponGroup.position.set(.01,.108,-.135);
    weaponGroup.rotation.x=WEAPON_PITCH;
  }
  drawHUD();
}

const PICKUP_TYPES=['shotgun','grenade','saber','scatter','rail','rocket','dual','flame','cannon'];
// Ordered weapon list for X-button cycling (laser is index 0)
const WEAPONS_ORDER=['laser','shotgun','grenade','saber','scatter','rail','rocket','dual','flame','cannon'];
let currentWeaponIndex=0;

function buildPickupMesh(type){
  const g=new THREE.Group();
  buildWeaponGeometry(type, g);
  g.scale.setScalar(1.1); // doubled from 0.55
  // Ground ring (weapon colour)
  const ring=new THREE.Mesh(new THREE.TorusGeometry(.30,.025,6,32),
    new THREE.MeshBasicMaterial({color:WEAPONS[type].pickupCol,transparent:true,opacity:.5,blending:THREE.AdditiveBlending,depthWrite:false}));
  ring.rotation.x=Math.PI/2; ring.position.y=-.45; g.add(ring);
  // Green inner glow sphere
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.55,10,8),
    new THREE.MeshBasicMaterial({color:0x00ff44,transparent:true,opacity:.13,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide})));
  // Green outer halo
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.80,8,6),
    new THREE.MeshBasicMaterial({color:0x00cc33,transparent:true,opacity:.05,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide})));
  // Green point light tinting the ground beneath
  const pl=new THREE.PointLight(0x00ff44,2.5,8);g.add(pl);
  // Vertical beam pillar rising upward
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,4,6),
    new THREE.MeshBasicMaterial({color:0x00ff44,transparent:true,opacity:.18,blending:THREE.AdditiveBlending,depthWrite:false})));
  return g;
}

function spawnPickup(type, x, z){
  if(!terrainMesh) return;
  floorRay.set(new THREE.Vector3(x,80,z),new THREE.Vector3(0,-1,0));
  const hits=floorRay.intersectObject(terrainMesh,false);
  const groundY=hits.length?hits[0].point.y:getH(x,z);
  const mesh=buildPickupMesh(type);
  mesh.position.set(x, groundY+1.0, z); // 1 m above ground
  scene.add(mesh);
  pickups.push({type, mesh, age:0});
}

function spawnInitialPickups(){
  const positions=[
    {x:60,z:-60},{x:-70,z:50},{x:100,z:120},{x:-120,z:-80},{x:50,z:150},
    {x:-160,z:40},{x:130,z:-110},{x:-80,z:130},{x:30,z:-140},{x:-140,z:-140}
  ];
  PICKUP_TYPES.forEach((t,i)=>spawnPickup(t, positions[i].x, positions[i].z));
}

function updatePickups(dt){
  const t=clock.elapsedTime;
  const camPos=new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
  const rem=[];
  for(const p of pickups){
    p.age+=dt;
    p.mesh.rotation.y+=dt*(Math.PI/2); // 90° per second
    p.mesh.position.y+=Math.sin(t*2+p.age)*0.0008;// gentle bob
    // Proximity pickup: 2.5 units from camera world pos
    if(camPos.distanceTo(p.mesh.position)<2.5){
      equipWeapon(p.type);
      playPickupSound(p.type);
      haptic('right',.8,120);
      scene.remove(p.mesh);
      rem.push(p);
      // Respawn same weapon type at new location after 25s
      const px=(Math.random()-.5)*280, pz=(Math.random()-.5)*280;
      setTimeout(()=>{ if(gameActive)spawnPickup(p.type,px,pz); },25000);
    }
  }
  pickups=pickups.filter(x=>!rem.includes(x));
}

// ── Pickup sound — quick rising tone ─────────────────────────────
function playPickupSound(type){
  const ctx=getAudio(); if(!ctx) return;
  const t=ctx.currentTime;
  const o=ctx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(600,t+.18);
  const g=ctx.createGain(); g.gain.setValueAtTime(.4,t); g.gain.exponentialRampToValueAtTime(.001,t+.22);
  o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+.25);
}

// ── Saber swing sound ─────────────────────────────────────────────
function playSwingSound(){
  const ctx=getAudio(); if(!ctx) return;
  const t=ctx.currentTime;
  const o=ctx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(380,t); o.frequency.exponentialRampToValueAtTime(80,t+.22);
  const g=ctx.createGain(); g.gain.setValueAtTime(.35,t); g.gain.exponentialRampToValueAtTime(.001,t+.25);
  const o2=ctx.createOscillator(); o2.type='sawtooth';
  o2.frequency.setValueAtTime(760,t); o2.frequency.exponentialRampToValueAtTime(160,t+.18);
  const g2=ctx.createGain(); g2.gain.setValueAtTime(.12,t); g2.gain.exponentialRampToValueAtTime(.001,t+.20);
  o.connect(g); o2.connect(g2); g.connect(ctx.destination); g2.connect(ctx.destination);
  o.start(t); o2.start(t); o.stop(t+.28); o2.stop(t+.22);
}

// ── Rail fire sound — electric crack ────────────────────────────
function playRailSound(){
  const ctx=getAudio(); if(!ctx) return;
  const t=ctx.currentTime;
  const nb=ctx.createBuffer(1,ctx.sampleRate*.1,ctx.sampleRate);
  const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource(); ns.buffer=nb;
  const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2000;
  const g=ctx.createGain(); g.gain.setValueAtTime(.6,t); g.gain.exponentialRampToValueAtTime(.001,t+.1);
  ns.connect(hp); hp.connect(g); g.connect(ctx.destination); ns.start(t); ns.stop(t+.12);
  const o=ctx.createOscillator(); o.type='square';
  o.frequency.setValueAtTime(800,t); o.frequency.exponentialRampToValueAtTime(80,t+.08);
  const g2=ctx.createGain(); g2.gain.setValueAtTime(.4,t); g2.gain.exponentialRampToValueAtTime(.001,t+.1);
  o.connect(g2); g2.connect(ctx.destination); o.start(t); o.stop(t+.1);
}

// ── Cannon fire sound — deep thud ────────────────────────────────
function playCannonSound(){

// ── Flame fire sound — hiss burst ────────────────────────────────
function playFlameSound(){

  const t=ctx.currentTime;
  const nb=ctx.createBuffer(1,ctx.sampleRate*.15,ctx.sampleRate);
  const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource(); ns.buffer=nb;

function fireFlame(){
  flameCooldown=WEAPONS.flame.rate;
  playFlameSound();
  const {mPos,bDir}=getBarrelData();
  const headPos=new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
  // Spawn flame particles
  for(let i=0;i<8;i++){
    const sp=new THREE.Vector3((Math.random()-.5)*.6,(Math.random()-.5)*.3,(Math.random()-.5)*.6);
    const pDir=bDir.clone().add(sp).normalize();
    const flameGrp=new THREE.Group();
    flameGrp.position.copy(mPos);
    const fm=new THREE.Mesh(new THREE.SphereGeometry(.05+Math.random()*.04,5,4),
      new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(.08+Math.random()*.06,.95,.6),transparent:true,opacity:.8,blending:THREE.AdditiveBlending,depthWrite:false}));
    flameGrp.add(fm);

      t+=.05;
      flameGrp.position.addScaledVector(vel,.05);
      fm.material.opacity=Math.max(0,.8*(1-t/.7));
      fm.scale.setScalar(1+t*2);
      if(t<.7)requestAnimationFrame(tick);
      else scene.remove(flameGrp);

  for(const e of enemies){
    const toE=new THREE.Vector3().subVectors(e.position,headPos);
    const dist=toE.length();
    if(dist<12&&toE.clone().normalize().dot(bDir)>.6){

// ── Grenade & rocket & cannon update ─────────────────────────────
// ════════════════════════════════════════════════════════════════
//  SWORD SLASH WAVES  — velocity-driven crescent energy projectiles
//
//  Research sources:
//   • Zelda Skyward Sword / BotW: swing velocity threshold → crescent wave
//   • One Piece Pirate Warriors: blade arc projected as flying thin disc
//   • VR rhythm games: tip delta position per frame → speed + direction
//
//  Implementation: track rightGrip world position each frame, compute
//  velocity vector, fire a crescent TorusGeometry arc projectile when
//  swing speed exceeds SLASH_SPEED_THRESHOLD m/s. Projectile travels
//  in the exact swing direction, expands slightly, fades, hits enemies.
// ════════════════════════════════════════════════════════════════

function spawnSlashWave(origin, dir){
  const grp=new THREE.Group(); grp.position.copy(origin);
  grp.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,-1), dir.clone().normalize());

  // Core crescent arc (white)
  const coreMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.95,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
  grp.add(new THREE.Mesh(new THREE.TorusGeometry(.38,.028,6,28,Math.PI*1.6),coreMat));

  // Outer cyan glow
  const glowMat=new THREE.MeshBasicMaterial({color:0x44ffff,transparent:true,opacity:.55,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
  grp.add(new THREE.Mesh(new THREE.TorusGeometry(.44,.055,5,24,Math.PI*1.65),glowMat));

  // Inner secondary crescent (slightly rotated for depth layering)
  const innerMat=new THREE.MeshBasicMaterial({color:0xaaffff,transparent:true,opacity:.7,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
  const inner=new THREE.Mesh(new THREE.TorusGeometry(.28,.018,5,22,Math.PI*1.4),innerMat);
  inner.rotation.z=.18; grp.add(inner);

  const pl=new THREE.PointLight(0x44ffff,4,7); grp.add(pl);
  scene.add(grp);
  slashWaves.push({grp,coreMat,glowMat,innerMat,pl,vel:dir.clone().normalize().multiplyScalar(45),age:0,maxAge:1.8});
}

function updateSlashDetection(dt){
  if(currentWeapon!=='saber'||!rightGrip||!gameActive){gripPosInitialised=false;return;}
  slashCooldown=Math.max(0,slashCooldown-dt);

  // Convert grip world position into dolly-local space.
  // This cancels out thumbstick locomotion so only genuine physical
  // wrist/arm movement contributes to the velocity measurement.
  const gripWorld=new THREE.Vector3();
  rightGrip.getWorldPosition(gripWorld);
  const gripLocal=dolly.worldToLocal(gripWorld.clone());

  _currGripPos.copy(gripLocal);
  if(!gripPosInitialised){_prevGripPos.copy(_currGripPos);gripPosInitialised=true;return;}

  const vx=(_currGripPos.x-_prevGripPos.x)/dt;
  const vy=(_currGripPos.y-_prevGripPos.y)/dt;
  const vz=(_currGripPos.z-_prevGripPos.z)/dt;
  const speed=Math.sqrt(vx*vx+vy*vy+vz*vz);

  if(speed>SLASH_SPEED_THRESHOLD&&slashCooldown<=0){
    slashCooldown=SLASH_COOLDOWN;
    // Convert the local velocity direction back to world space for the projectile
    const localDir=new THREE.Vector3(vx,vy,vz).normalize();
    const worldDir=localDir.applyQuaternion(dolly.quaternion);
    const origin=new THREE.Vector3();
    if(saberTip) saberTip.getWorldPosition(origin);
    else rightGrip.getWorldPosition(origin);
    spawnSlashWave(origin, worldDir);
    playSwingSound();
    haptic('right',0.7,35);
    spawnSaberTrail();
  }
  _prevGripPos.copy(_currGripPos);
}

function updateSlashWaves(dt){
  const done=[];
  for(const sw of slashWaves){
    sw.age+=dt;
    sw.grp.position.addScaledVector(sw.vel,dt);
    const life=Math.max(0,1-sw.age/sw.maxAge);
    sw.coreMat.opacity=life*.95; sw.glowMat.opacity=life*.55; sw.innerMat.opacity=life*.7;
    sw.pl.intensity=life*4;
    const s=1+sw.age*.6; sw.grp.scale.setScalar(s);
    for(const e of enemies){
      if(sw.grp.position.distanceTo(e.position)<1.8+sw.age*.3){
        e.userData.hp=0; // 100% — instant kill
        triggerKillFlash(0x44ffff);
      }
    }
    if(sw.age>=sw.maxAge) done.push(sw);
  }
  done.forEach(sw=>{scene.remove(sw.grp);slashWaves=slashWaves.filter(x=>x!==sw);});
}

function updateProjectiles(dt){
  // Grenades — gravity arc, explode on terrain
  const gDone=[];
  for(const g of grenadeProjs){
    g.age+=dt; g.vel.y-=9.8*dt;
    g.mesh.position.addScaledVector(g.vel,dt);
    g.mesh.rotation.x+=dt*8;
    // Mid-flight enemy collision — detonate immediately on direct hit
    let hitEnemy=false;
    for(const e of enemies){
      if(g.mesh.position.distanceTo(e.position)<2.2){hitEnemy=true;break;}
    }
    if(hitEnemy||g.mesh.position.y<=getH(g.mesh.position.x,g.mesh.position.z)||g.age>5){
      const pos=g.mesh.position.clone();
      for(const e of enemies){if(e.position.distanceTo(pos)<12)e.userData.hp-=18;}
      killExplosion(pos); playExplosionSound(pos); spawnCrater(pos);
      gDone.push(g);
    }
  }
  gDone.forEach(g=>{scene.remove(g.mesh);grenadeProjs=grenadeProjs.filter(x=>x!==g);});

  // Rockets — home toward nearest enemy, area damage on hit
  const rDone=[];
  for(const r of rocketProjs){
    r.age+=dt;
    let nearest=null,nearDist=Infinity;
    for(const e of enemies){const d=r.grp.position.distanceTo(e.position);if(d<nearDist){nearDist=d;nearest=e;}}
    if(nearest){
      const toE=new THREE.Vector3().subVectors(nearest.position,r.grp.position).normalize();
      r.vel.lerp(toE.multiplyScalar(18),dt*2.2); r.vel.setLength(18);
    }
    r.grp.position.addScaledVector(r.vel.clone().normalize(),18*dt);
    if(r.vel.lengthSq()>.01){r.grp.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,-1),r.vel.clone().normalize());}
    let hit=false;
    for(const e of enemies){
      if(r.grp.position.distanceTo(e.position)<2.5){
        const pos=r.grp.position.clone();
        for(const e2 of enemies){if(e2.position.distanceTo(pos)<10)e2.userData.hp-=25;}
        killExplosion(pos); playExplosionSound(pos); hit=true; break;
      }
    }
    if(hit||r.grp.position.y<getH(r.grp.position.x,r.grp.position.z)||r.age>7){
      if(!hit)killExplosion(r.grp.position.clone());
      rDone.push(r);
    }
  }
  rDone.forEach(r=>{scene.remove(r.grp);rocketProjs=rocketProjs.filter(x=>x!==r);});

  // Cannon balls — slow massive, area destroy on hit
  const cDone=[];
  for(const c of cannonProjs){
    c.age+=dt;
    c.mesh.position.addScaledVector(c.vel,dt);
    c.mesh.rotation.x+=dt*3;
    let hit=false;
    for(const e of enemies){
      if(c.mesh.position.distanceTo(e.position)<3){
        const pos=c.mesh.position.clone();
        for(const e2 of enemies){if(e2.position.distanceTo(pos)<14)e2.userData.hp-=99;}
        killExplosion(pos); playExplosionSound(pos); spawnCrater(pos);
        // Second bigger explosion ring for cannon drama
        setTimeout(()=>killExplosion(pos.clone().add(new THREE.Vector3(Math.random()*4-2,0,Math.random()*4-2))),120);
        hit=true; break;
      }
    }
    if(hit||c.mesh.position.y<getH(c.mesh.position.x,c.mesh.position.z)||c.age>8){
      if(!hit)killExplosion(c.mesh.position.clone());
      cDone.push(c);
    }
  }
  cDone.forEach(c=>{scene.remove(c.mesh);cannonProjs=cannonProjs.filter(x=>x!==c);});
}

// ════════════════════════════════════════════════════════════════
//  ROCK & VOLCANO LOD UPDATES
// ════════════════════════════════════════════════════════════════

// Use dolly XZ as the distance reference — camera always sits above dolly.
// Both rocks and volcanoes are static so we only need dolly.position.
const _lodRef=new THREE.Vector3();

function updateRockLODs(){
  _lodRef.set(dolly.position.x, 0, dolly.position.z);
  for(const rk of rockGroups){
    const wp=rk.grp.position;
    const dist=Math.sqrt((wp.x-_lodRef.x)**2+(wp.z-_lodRef.z)**2);
    const lod=dist<30?0:dist<70?1:2;
    if(lod===rk.lastLOD)continue;
    rk.lastLOD=lod;
    // LOD2 = both meshes invisible (rock sub-pixel at that range)
    rk.meshes[0].visible=(lod===0);
    rk.meshes[1].visible=(lod===1);
    // group itself hidden at LOD2
    rk.grp.visible=(lod<2);
  }
}

function updateVolcanoLODs(){
  _lodRef.set(dolly.position.x, 0, dolly.position.z);
  for(const vl of volcanoLODs){
    const wp=vl.meshes[0].position;
    const dist=Math.sqrt((wp.x-_lodRef.x)**2+(wp.z-_lodRef.z)**2);
    const lod=dist<100?0:dist<200?1:2;
    if(lod===vl.lastLOD)continue;
    vl.lastLOD=lod;
    vl.meshes.forEach((m,i)=>{ m.visible=(i===lod); });
  }
}

//  WAVE ANNOUNCEMENT BILLBOARD
//  Canvas-texture plane that floats in front of the player,
//  fades in → holds → fades out, then disposes itself.

// ── Game Over Billboard ───────────────────────────────────────────
// Same floating canvas-texture architecture as the wave banner but
// rendered in crimson with full stats, and stays visible until restart.
function showGameOverBanner(){
  if(gameOverBillboard){ scene.remove(gameOverBillboard); gameOverBillboard=null; }

  const W=640, H=320;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');

  // Background
  c.clearRect(0,0,W,H);
  c.fillStyle='rgba(12,0,0,0.94)';
  if(c.roundRect){ c.beginPath();c.roundRect(8,8,W-16,H-16,20);c.fill(); }
  else c.fillRect(8,8,W-16,H-16);

  // Crimson glow border
  c.strokeStyle='rgba(220,20,20,0.70)'; c.lineWidth=2.5;
  if(c.roundRect){ c.beginPath();c.roundRect(8,8,W-16,H-16,20);c.stroke(); }
  else c.strokeRect(8,8,W-16,H-16);

  // Inner dim border
  c.strokeStyle='rgba(180,0,0,0.25)'; c.lineWidth=1;
  if(c.roundRect){ c.beginPath();c.roundRect(18,18,W-36,H-36,14);c.stroke(); }

  // "GAME OVER" — large glowing red
  c.fillStyle='#ff1a1a';
  c.shadowColor='#cc0000'; c.shadowBlur=40;
  c.font='bold 100px monospace';
  c.textAlign='center';
  c.fillText('GAME OVER', W/2, 118);
  c.shadowBlur=0;

  // Scanline divider
  c.strokeStyle='rgba(200,20,20,0.35)'; c.lineWidth=1;
  c.beginPath(); c.moveTo(50,138); c.lineTo(W-50,138); c.stroke();

  // Stats row

  // Instruction
  c.font='14px monospace'; c.fillStyle='rgba(220,60,60,0.50)';
  c.fillText('PULL RIGHT TRIGGER TO REDEPLOY', W/2, 228);

  const tex=new THREE.CanvasTexture(cv);
  const mat=new THREE.MeshBasicMaterial({
    map:tex, transparent:true, opacity:0,
    side:THREE.DoubleSide, depthWrite:false
  });
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(4.0,2.0), mat);
  mesh.userData={age:0, phase:'in'};  // phases: 'in' → 'hold' (stays, no auto-fade)

  const fwd=new THREE.Vector3();
  camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize();
  const camPos=new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
  mesh.position.copy(camPos).addScaledVector(fwd, 7);
  mesh.position.y=camPos.y+0.3;
  mesh.lookAt(camPos);

  scene.add(mesh);

}

function updateGameOverBanner(dt){
  if(!gameOverBillboard) return;
  const ud=gameOverBillboard.userData;
  ud.age+=dt;
  if(ud.phase==='in'){
    gameOverBillboard.material.opacity=Math.min(1, ud.age/0.6);
    if(ud.age>=0.6){ ud.phase='hold'; }
  }
  // 'hold' phase: stays at full opacity until removed by restartGame
}

function clearGameOverBanner(){
  if(!gameOverBillboard) return;
  scene.remove(gameOverBillboard);
  gameOverBillboard.material.map.dispose();
  gameOverBillboard.material.dispose();
  gameOverBillboard.geometry.dispose();
  gameOverBillboard=null;
}

function showWaveBanner(waveNum){
  // Remove any existing banner immediately
  if(waveBillboard){ scene.remove(waveBillboard); waveBillboard=null; }

  // ── Canvas texture ──────────────────────────────────────────
  const W=512, H=192;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');

  // Background panel
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='rgba(0,6,18,0.82)';
  if(ctx.roundRect){ ctx.beginPath();ctx.roundRect(8,8,W-16,H-16,18);ctx.fill(); }
  else { ctx.fillRect(8,8,W-16,H-16); }

  // Outer glow border
  ctx.strokeStyle='rgba(255,120,0,0.55)'; ctx.lineWidth=2;
  if(ctx.roundRect){ ctx.beginPath();ctx.roundRect(8,8,W-16,H-16,18);ctx.stroke(); }
  else { ctx.strokeRect(8,8,W-16,H-16); }

  // "WAVE" label
  ctx.fillStyle='rgba(255,160,50,0.60)';
  ctx.font='bold 28px monospace';
  ctx.textAlign='center';
  ctx.fillText('WAVE', W/2, 58);

  // Wave number — large, glowing orange
  ctx.fillStyle='#ff6600';
  ctx.shadowColor='#ff4400'; ctx.shadowBlur=28;
  ctx.font='bold 96px monospace';
  ctx.fillText(waveNum, W/2, 148);
  ctx.shadowBlur=0;

  // Scanline accent under the number
  ctx.strokeStyle='rgba(255,102,0,0.30)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(60,162); ctx.lineTo(W-60,162); ctx.stroke();

  const tex=new THREE.CanvasTexture(cv);
  const mat=new THREE.MeshBasicMaterial({
    map:tex, transparent:true, opacity:0,
    side:THREE.DoubleSide, depthWrite:false
  });
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(3.2,1.2), mat);
  mesh.userData={ age:0, phase:'in' };  // phases: 'in' | 'hold' | 'out'

  // Position 8 m ahead of camera at eye level, always facing player
  const fwd=new THREE.Vector3();
  camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize();
  const camPos=new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
  mesh.position.copy(camPos).addScaledVector(fwd, 8);
  mesh.position.y=camPos.y+0.2; // slight upward offset from eye centre
  mesh.lookAt(camPos); // face the player

  scene.add(mesh);
  waveBillboard=mesh;
}

function updateWaveBanner(dt){
  if(!waveBillboard) return;
  const ud=waveBillboard.userData;
  ud.age+=dt;

  const FADE_IN=0.5, HOLD=2.2, FADE_OUT=1.0;

  if(ud.phase==='in'){
    waveBillboard.material.opacity=Math.min(1, ud.age/FADE_IN);
    if(ud.age>=FADE_IN){ ud.phase='hold'; ud.age=0; }
  } else if(ud.phase==='hold'){
    waveBillboard.material.opacity=1;
    if(ud.age>=HOLD){ ud.phase='out'; ud.age=0; }
  } else {
    waveBillboard.material.opacity=Math.max(0, 1-ud.age/FADE_OUT);
    if(ud.age>=FADE_OUT){
      // Dispose and remove
      waveBillboard.material.map.dispose();
      waveBillboard.material.dispose();
      waveBillboard.geometry.dispose();
      scene.remove(waveBillboard);
      waveBillboard=null;
    }
  }
}


// ════════════════════════════════════════════════════════════════
//  SUPER BLAST SYSTEM
//  Hold right trigger 10 s → screen-clearing circular shockwave
// ════════════════════════════════════════════════════════════════

// ── Charge audio — oscillator sweeps 60 → 1200 Hz over 10 s ──
function startCharge(){
  const ctx=getAudio(); if(!ctx) return;
  stopCharge(); // clear any leftover nodes
  chargeOsc=ctx.createOscillator(); chargeOsc.type='sawtooth';
  chargeOsc.frequency.setValueAtTime(40, ctx.currentTime);
  chargeOsc.frequency.linearRampToValueAtTime(320, ctx.currentTime+CHARGE_MAX);
  chargeGain=ctx.createGain();
  chargeGain.gain.setValueAtTime(0.0, ctx.currentTime);
  chargeGain.gain.linearRampToValueAtTime(0.55, ctx.currentTime+0.3);
  chargeOsc.connect(chargeGain); chargeGain.connect(ctx.destination);
  chargeOsc.start();
}

function stopCharge(){
  if(chargeGain){ try{ chargeGain.disconnect(); }catch(e){} chargeGain=null; }
  if(chargeOsc){  try{ chargeOsc.stop(); }catch(e){} chargeOsc=null; }
}

// ── Discharge boom sound ──────────────────────────────────────
function playBlastSound(){
  const ctx=getAudio(); if(!ctx) return;
  const t=ctx.currentTime;
  // Massive sub-bass impact
  const o1=ctx.createOscillator(); o1.type='sine';
  o1.frequency.setValueAtTime(55,t); o1.frequency.exponentialRampToValueAtTime(14,t+1.8);
  const g1=ctx.createGain(); g1.gain.setValueAtTime(1.4,t); g1.gain.exponentialRampToValueAtTime(0.001,t+2.0);
  o1.connect(g1); g1.connect(ctx.destination); o1.start(t); o1.stop(t+2.1);
  // Mid crunch
  const o2=ctx.createOscillator(); o2.type='square';
  o2.frequency.setValueAtTime(180,t); o2.frequency.exponentialRampToValueAtTime(22,t+1.0);
  const g2=ctx.createGain(); g2.gain.setValueAtTime(0.9,t); g2.gain.exponentialRampToValueAtTime(0.001,t+1.2);
  o2.connect(g2); g2.connect(ctx.destination); o2.start(t); o2.stop(t+1.3);
  // Wide noise rumble
  const nb=ctx.createBuffer(1,ctx.sampleRate*2.5,ctx.sampleRate);
  const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource(); ns.buffer=nb;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=400;
  const ng=ctx.createGain(); ng.gain.setValueAtTime(0.8,t); ng.gain.exponentialRampToValueAtTime(0.001,t+2.5);
  ns.connect(lp); lp.connect(ng); ng.connect(ctx.destination); ns.start(t); ns.stop(t+2.6);
}

// ── Visual shockwave ring ──────────────────────────────────────
function spawnShockwave(origin){
  // 3 staggered rings for layered effect
  [0, 0.08, 0.18].forEach(delay=>{
    const mat=new THREE.MeshBasicMaterial({
      color:0x44ddff, transparent:true, opacity:0.85,
      side:THREE.DoubleSide, depthWrite:false,
      blending:THREE.AdditiveBlending
    });
    const mesh=new THREE.Mesh(new THREE.TorusGeometry(0.5,0.18,8,48), mat);
    mesh.position.copy(origin);
    mesh.position.y+=1.2; // roughly gun height
    mesh.rotation.x=Math.PI/2; // flat horizontal ring
    scene.add(mesh);
    shockwaves.push({mesh, mat, age:-delay, maxAge:2.2, maxR:280});
  });

  // Central flash sphere
  const fm=new THREE.Mesh(
    new THREE.SphereGeometry(1,12,8),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:1,blending:THREE.AdditiveBlending,depthWrite:false})
  );
  fm.position.copy(origin); fm.position.y+=1.2; scene.add(fm);
  shockwaves.push({mesh:fm, mat:fm.material, age:0, maxAge:0.35, maxR:0, isFlash:true});

  // Screen-fill point light burst
  const bl=new THREE.PointLight(0x44ddff,25,60); bl.position.copy(origin); bl.position.y+=1.2; scene.add(bl);
  shockwaves.push({mesh:bl, mat:null, age:0, maxAge:0.5, maxR:0, isLight:true, light:bl});
}

// ── Kill all enemies in shockwave radius ──────────────────────
function shockwaveKillAll(origin){
  // Kill every enemy regardless of distance — it's a screen-clearing super
  const dead=[...enemies];
  for(const e of dead){
    killExplosion(e.position.clone());
    playExplosionSound(e.position.clone());
    scene.remove(e);
    kills++; score+=200*wave;
  }
  enemies=[];
  if(dead.length>0) drawHUD();
  haptic('right',1.0,600); haptic('left',1.0,500);
}

// ── Fire the super blast ──────────────────────────────────────
function fireBlast(){
  stopCharge();
  const origin=new THREE.Vector3(); dolly.getWorldPosition(origin);
  spawnShockwave(origin);
  shockwaveKillAll(origin);
  playBlastSound();
  chargeTime=0; triggerHeld=false;
  // Brief weapon cooldown so you can't immediately fire after blast
  fireCooldown=1.5;
}

// ── Update shockwave rings each frame ────────────────────────
function updateShockwaves(dt){
  const done=[];
  for(const sw of shockwaves){
    sw.age+=dt;
    if(sw.age<0) continue; // delayed ring — not spawned yet
    const p=Math.min(1, sw.age/sw.maxAge);

    if(sw.isFlash){
      sw.mat.opacity=1-p;
      const s=1+p*6; sw.mesh.scale.setScalar(s);
    } else if(sw.isLight){
      sw.light.intensity=25*(1-p);
    } else {
      // Expand ring radius, fade out
      const r=0.5+p*sw.maxR;
      sw.mesh.scale.setScalar(r);
      sw.mat.opacity=(1-p)*0.85;
      sw.mesh.material.linewidth=Math.max(0.5,(1-p)*3);
    }

    if(sw.age>=sw.maxAge) done.push(sw);
  }
  for(const sw of done){
    scene.remove(sw.mesh);
    if(sw.mat) sw.mat.dispose();
    if(sw.mesh.geometry) sw.mesh.geometry.dispose();
    shockwaves=shockwaves.filter(x=>x!==sw);
  }
}

// ── Update charge each frame — auto-fire at CHARGE_MAX s ─────────
function updateCharge(dt){
  // Keep charge FX group positioned at the current weapon's tip every frame
  if(chargeFXGroup&&rightGrip){
    const tip=getWeaponTipOffset();
    chargeFXGroup.position.copy(tip);
  }
  // Flamethrower: triggerHeld drives continuous fire, no charge mechanic
  if(currentWeapon==='flame'){
    if(chargeSphere) chargeSphere.material.opacity=0;
    if(chargeBoids)  chargeBoids.material.opacity=0;
    if(triggerHeld&&gameActive){
      flameCooldown-=dt;
      if(flameCooldown<=0) fireWeapon();
    }
    return;
  }
  if(!triggerHeld||!gameActive){
    // Hide charge VFX when not charging
    if(chargeSphere) chargeSphere.material.opacity=0;
    if(chargeBoids)  chargeBoids.material.opacity=0;
    return;
  }
  chargeTime+=dt;
  const t=Math.min(chargeTime/CHARGE_MAX, 1.0); // 0→1

  // ── Energy sphere: grows from invisible pinpoint to ~6 cm radius ──
  if(chargeSphere){
    const r=0.001+t*0.12;                    // 0.001 → 0.121 — doubled from 0.06
    chargeSphere.scale.setScalar(r);
    // Flicker faster near full charge
    const flicker=0.7+0.3*Math.sin(Date.now()*0.006*(1+t*8));
    chargeSphere.material.opacity=(0.3+t*0.7)*flicker;
    // Shift colour cyan → white as charge fills
    chargeSphere.material.color.setHSL(0.55*(1-t), 1.0, 0.5+t*0.5);
  }

  // ── Boid particles: orbit + flock toward sphere, grow in number/size ──
  if(chargeBoids&&chargeBoidData.length){
    const pa=chargeBoids.geometry.attributes.position.array;
    const orbitR=0.012+t*0.11;              // doubled from 0.055 — boids orbit the larger sphere
    const now=Date.now()*0.001;
    for(let i=0;i<chargeBoidData.length;i++){
      const b=chargeBoidData[i];
      b.th+=b.speed*dt*(1+t*3);             // orbit faster at full charge
      // Rotate position around boid's unique axis
      const q=new THREE.Quaternion().setFromAxisAngle(b.axis, b.th);
      const v=new THREE.Vector3(orbitR,0,0).applyQuaternion(q);
      // Add small random jitter for organic feel
      const jitter=0.004*(1-t*0.5);
      pa[i*3  ]=v.x+(Math.random()-.5)*jitter;
      pa[i*3+1]=v.y+(Math.random()-.5)*jitter;
      pa[i*3+2]=v.z+(Math.random()-.5)*jitter;
    }
    chargeBoids.geometry.attributes.position.needsUpdate=true;
    chargeBoids.material.opacity=t*0.9;
    chargeBoids.material.size=0.018+t*0.028;  // particles grow
    chargeBoids.material.color.setHSL(0.55*(1-t), 1.0, 0.7+t*0.3);
  }

  // Weapon energy cells shift cyan → white
  if(weaponGroup){
    const pulse=0.8+0.2*Math.sin(Date.now()*0.02*(1+t*6));
    const col=new THREE.Color().setHSL(0.55-t*0.55, 1, 0.5+t*0.4);
    for(const m of energyCells){
      m.material.emissive=col;
      m.material.emissiveIntensity=(2.6+t*12)*pulse;
    }
  }

  // Blue inner glow on damage sphere repurposed as charge atmosphere
  damageSphere.material.color.setHex(0x0088ff);
  damageSphere.material.opacity=t*0.18;

  // Growing haptic rumble every ~250 ms
  if(Math.floor(chargeTime*4)!==Math.floor((chargeTime-dt)*4)){
    haptic('right', 0.15+t*0.85, 45);
  }

  if(chargeTime>=CHARGE_MAX){
    // Hide charge VFX before blast
    if(chargeSphere) chargeSphere.material.opacity=0;
    if(chargeBoids)  chargeBoids.material.opacity=0;
    damageSphere.material.opacity=0;
    damageSphere.material.color.setHex(0xff0000);
    fireBlast();
  }
}

//  COMBO MULTIPLIER

function registerKill(){
  comboCount++;
  comboTimer=3.0;
  comboMult=Math.min(4,comboCount);
  drawHUD();
}
function updateCombo(dt){
  if(comboCount>0){
    comboTimer-=dt;
    if(comboTimer<=0){comboCount=0;comboMult=1;drawHUD();}
  }
}

// ════════════════════════════════════════════════════════════════
//  DAY / NIGHT CYCLE  — sun orbits every 10 minutes
// ════════════════════════════════════════════════════════════════
function updateDayNight(dt){
  if(!sunLight)return;
  dayNightAngle+=dt*(Math.PI*2/DAY_NIGHT_PERIOD);
  const t=dayNightAngle;
  // Sun arcs from east (+X) over the south (-Z) to west (-X)
  sunLight.position.set(Math.cos(t)*400, Math.sin(t)*350+50, -200);
  const night=Math.max(0,-Math.sin(t)); // 0=day, 1=night
  const day=Math.max(0,Math.sin(t));
  sunLight.intensity=1.4*Math.max(0.05,day);
  sunLight.color.setHSL(.1-.03*night, .7+.3*day, .9);
  if(ambientLight){
    const ambI=0.80*day+0.18*night;
    ambientLight.intensity=ambI;
    ambientLight.color.setHSL(.05+.5*night,.4,.5); // warm day → cool/purple night
  }
}

function updateSaberTrails(dt){

// ════════════════════════════════════════════════════════════════
//  PLAYER ENERGY SHIELD  — left thumbstick click (button 3)
//  Projects a dome that blocks bolts from the front 180°.
// ════════════════════════════════════════════════════════════════
function buildShieldMesh(){
  const geo=new THREE.SphereGeometry(.65,12,8,0,Math.PI*2,0,Math.PI/2);// hemisphere
  const mat=new THREE.MeshBasicMaterial({color:0x0066ff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
  shieldMesh=new THREE.Mesh(geo,mat);
  shieldMesh.position.set(0,1.5,.4);// slightly in front at eye height on dolly
  dolly.add(shieldMesh);
}
function activateShield(){
  if(shieldActive||shieldRecharge>0)return;
  shieldActive=true;shieldDur=SHIELD_DUR;
  haptic('left',1.0,100);haptic('right',.4,60);
  speak('Shield active');
}
function updateShield(dt){
  if(shieldRecharge>0)shieldRecharge=Math.max(0,shieldRecharge-dt);
  if(!shieldActive){if(shieldMesh)shieldMesh.material.opacity=0;return;}
  shieldDur-=dt;
  if(shieldMesh){
    // Orient dome toward camera look direction
    const fwd=new THREE.Vector3();camera.getWorldDirection(fwd);fwd.y=0;fwd.normalize();
    shieldMesh.rotation.y=Math.atan2(fwd.x,fwd.z)+Math.PI;
    const pulse=.25+.08*Math.sin(Date.now()*.012);
    shieldMesh.material.opacity=shieldDur>0?pulse:0;
  }
  if(shieldDur<=0){shieldActive=false;shieldRecharge=SHIELD_RECHARGE;haptic('left',.6,150);}
}
// Returns true if bolt should be blocked
function checkShieldBlock(boltPos){
  if(!shieldActive)return false;
  const cp=new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
  const dist=boltPos.distanceTo(cp);
  if(dist>.8)return false;
  // Check if bolt is in front hemisphere
  const fwd=new THREE.Vector3();camera.getWorldDirection(fwd);
  const toBolt=new THREE.Vector3().subVectors(boltPos,cp).normalize();
  return fwd.dot(toBolt)>.0; // front 180°
}

// ════════════════════════════════════════════════════════════════
//  ENEMY AI UPGRADES
//  Scout: circles player when close.  Heavy: charge ram.
//  Standard: loose flanking spread to avoid clustering.
// ════════════════════════════════════════════════════════════════
let _flankAngles={};// enemyId → assigned flank offset angle
function assignFlankAngles(){
  // Called on spawn; assigns each enemy a flank offset so they spread out
  enemies.forEach((e,i)=>{
    if(!_flankAngles[e.uuid])_flankAngles[e.uuid]=(i/(enemies.length||1))*Math.PI*2;
  });
}
function updateEnemyAI(e,ud,toPlayer,dist,dt){
  const type=ud.type;
  if(type==='scout'){
    // Circle around player when close, retreat when player looks at them
    if(dist<22){
      const angle=_flankAngles[e.uuid]||0;
      _flankAngles[e.uuid]=(angle||0)+dt*1.8; // orbit speed
      const cx=_camWP.x+Math.cos(_flankAngles[e.uuid])*18;
      const cz=_camWP.z+Math.sin(_flankAngles[e.uuid])*18;
      const orbitDir=new THREE.Vector3(cx-e.position.x,0,cz-e.position.z).normalize();
      e.position.addScaledVector(orbitDir,ud.speed*dt);
      return;
    }
  }
  if(type==='heavy'){
    // Charge ram: when <25 units, occasionally charge forward
    if(!ud.chargeCool)ud.chargeCool=0;
    ud.chargeCool-=dt;
    if(dist<25&&ud.chargeCool<=0&&Math.random()<.008){
      ud.charging=true;ud.chargeCool=6+Math.random()*4;ud.chargeTimer=.55;
    }
    if(ud.charging){
      ud.chargeTimer-=dt;
      e.position.addScaledVector(toPlayer.clone().normalize(),ud.speed*3.5*dt);
      if(ud.chargeTimer<=0)ud.charging=false;
      // Ram damage
      if(dist<2.2){takeDamage(22);ud.charging=false;}
      return;
    }
  }
  // Standard + fallback: slight flank drift
  const flankAngle=_flankAngles[e.uuid]||0;
  const flankDir=new THREE.Vector3(Math.cos(flankAngle),0,Math.sin(flankAngle))
    .multiplyScalar(.28).add(toPlayer.clone().normalize());
  if(dist>10)e.position.addScaledVector(flankDir.normalize(),ud.speed*dt);
}

// ════════════════════════════════════════════════════════════════
//  BOSS WAVE  — every 5th wave; massive drone with phases
// ════════════════════════════════════════════════════════════════
function spawnBoss(){
  const px=dolly.position.x,pz=dolly.position.z;
  const g=new THREE.Group();
  const scale=3.0;
  const bGeo=new THREE.OctahedronGeometry(1.1*scale,1); // detail=1 for boss
  const body=new THREE.Mesh(bGeo,new THREE.MeshStandardMaterial({color:0x220000,roughness:.2,metalness:.9,emissive:0x880000,emissiveIntensity:.8}));
  g.add(body);
  const eye=new THREE.Mesh(new THREE.SphereGeometry(.5*scale,8,6),new THREE.MeshBasicMaterial({color:0xff0000}));
  eye.position.z=1.5*scale;g.add(eye);
  const eL=new THREE.PointLight(0xff2200,5,20);eL.position.copy(eye.position);g.add(eL);
  const lod1=new THREE.Mesh(new THREE.SphereGeometry(1.1*scale,6,5),body.material.clone());lod1.visible=false;g.add(lod1);
  const lod2=new THREE.Mesh(new THREE.SphereGeometry(1.1*scale,4,3),body.material.clone());lod2.visible=false;g.add(lod2);
  const bh=getH(px-40,pz-40);
  g.position.set(px-40,bh+8,pz-40);
  g.userData={type:'boss',hp:50,maxHp:50,speed:2.5,shootTimer:.8,shootDelay:.8,shootRand:.5,
    boltSpeed:18,boltDmg:20,hoverPhase:0,hoverH:8,eye,eL,body,isDying:false,
    lodBodies:[body,lod1,lod2],lastLOD:-1,baseLightInt:5,chargeCool:0,charging:false,chargeTimer:0};
  scene.add(g);enemies.push(g);bossEnemy=g;
  speak('Boss drone incoming');
  drawHUD();
}

// ════════════════════════════════════════════════════════════════
//  WEAPON DEGRADATION
// ════════════════════════════════════════════════════════════════
function degradeWeapon(){
  const def=WEAPONS[currentWeapon];
  if(def.ammo===Infinity)return; // laser never degrades
  if(!weaponCondition[currentWeapon])weaponCondition[currentWeapon]=100;
  weaponCondition[currentWeapon]=Math.max(0,weaponCondition[currentWeapon]-1.2);
  const c=weaponCondition[currentWeapon];
  // Dim weapon glow with condition
  if(muzzleLight)muzzleLight.distance=5*(c/100);
  // Revert to laser when fully degraded
  if(c<=0){speak('Weapon degraded, reverting to laser');equipWeapon('laser');}
}
function getConditionMult(){
  const c=weaponCondition[currentWeapon]??100;
  return c>50?1.0:c>20?.7:.45; // damage multiplier
}

// ════════════════════════════════════════════════════════════════
//  WAVE UPGRADE CARDS  — 3 floating planes, touch to select
// ════════════════════════════════════════════════════════════════
const UPGRADES=[
  {id:'dash_cd',  label:'DASH RECHARGE',  desc:'Dash cooldown -0.5s',   fn:()=>{DASH_COOLDOWN_VAL=Math.max(.5,DASH_COOLDOWN_VAL-.5);}},
  {id:'shield_d', label:'SHIELD UPGRADE', desc:'Shield lasts +1s',      fn:()=>{SHIELD_DUR_VAL+=1;}},
  {id:'health_r', label:'COMBAT STIMS',   desc:'Health regen +2/s',      fn:()=>{healthRegenRate+=2;}},
  {id:'combo',    label:'COMBO MASTER',   desc:'Max combo ×6',           fn:()=>{maxCombo=6;}},
  {id:'blast_cd', label:'SUPER CHARGE',   desc:'Blast charges 1s faster',fn:()=>{CHARGE_MAX_VAL=Math.max(3,CHARGE_MAX_VAL-1);}},
  {id:'speed',    label:'SPRINT BOOST',   desc:'Sprint speed +1',        fn:()=>{SPRINT_VAL+=1;}},
  {id:'shield_r', label:'SHIELD REGEN',   desc:'Shield recharge -2s',    fn:()=>{SHIELD_RECHARGE_VAL=Math.max(3,SHIELD_RECHARGE_VAL-2);}},
  {id:'restore',  label:'FIELD MEDIC',    desc:'Restore 40 health now',  fn:()=>{health=Math.min(maxHealth,health+40);drawHUD();}},
];
// Mutable upgrade values (used by systems)
let DASH_COOLDOWN_VAL=2.0, SHIELD_DUR_VAL=3.0, healthRegenRate=5, maxCombo=4;
let CHARGE_MAX_VAL=8.0, SPRINT_VAL=9.0, SHIELD_RECHARGE_VAL=10.0;

function showUpgradeCards(){
  upgradePhase=true;
  // Pick 3 random distinct upgrades
  const picks=[...UPGRADES].sort(()=>Math.random()-.5).slice(0,3);
  const fwd=new THREE.Vector3();camera.getWorldDirection(fwd);fwd.y=0;fwd.normalize();
  const camPos=new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
  picks.forEach((up,i)=>{
    const offset=(i-1)*1.4; // spread left/right
    const right=new THREE.Vector3(-fwd.z,0,fwd.x);
    const cv=document.createElement('canvas');cv.width=320;cv.height=200;
    const ctx=cv.getContext('2d');
    ctx.fillStyle='rgba(0,8,25,.92)';ctx.fillRect(0,0,320,200);
    ctx.strokeStyle='rgba(80,180,255,.6)';ctx.lineWidth=2;ctx.strokeRect(4,4,312,192);
    ctx.fillStyle='rgba(80,180,255,.9)';ctx.font='bold 22px monospace';ctx.textAlign='center';
    ctx.fillText(up.label,160,55);
    ctx.fillStyle='rgba(200,220,255,.7)';ctx.font='15px monospace';
    ctx.fillText(up.desc,160,100);
    ctx.fillStyle='rgba(80,180,255,.45)';ctx.font='13px monospace';
    ctx.fillText('REACH OUT TO SELECT',160,155);
    const tex=new THREE.CanvasTexture(cv);
    const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide,depthWrite:false});
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(1.2,.75),mat);
    mesh.position.copy(camPos).addScaledVector(fwd,5).addScaledVector(right,offset);
    mesh.position.y=camPos.y+.1;
    mesh.lookAt(camPos);
    scene.add(mesh);
    upgradeCards.push({mesh,mat,tex,upgrade:up,age:0});
  });
  speak('Select an upgrade');
}

function updateUpgradeCards(dt){
  if(!upgradePhase||!upgradeCards.length)return;
  const rightPos=rightGrip?new THREE.Vector3().setFromMatrixPosition(rightGrip.matrixWorld):null;
  const leftPos=leftGrip?new THREE.Vector3().setFromMatrixPosition(leftGrip.matrixWorld):null;
  for(const c of upgradeCards) c.age+=dt;
  // Check hand proximity
  for(const c of upgradeCards){
    const close=
      (rightPos&&rightPos.distanceTo(c.mesh.position)<.65)||
      (leftPos&&leftPos.distanceTo(c.mesh.position)<.65);
    if(close){
      // Selected!
      c.upgrade.fn();
      // Clear all cards
      upgradeCards.forEach(cc=>{scene.remove(cc.mesh);cc.tex.dispose();cc.mat.dispose();});
      upgradeCards=[];
      upgradePhase=false;pendingUpgrade=false;
      haptic('right',1.0,200);haptic('left',1.0,200);
      speak('Upgrade applied');
      drawHUD();
      return;
    }
    // Gentle float
    c.mesh.position.y+=Math.sin(c.age*1.8)*.0008;
  }
}

function clearUpgradeCards(){
  upgradeCards.forEach(c=>{scene.remove(c.mesh);try{c.tex.dispose();c.mat.dispose();}catch(e){}});
  upgradeCards=[];upgradePhase=false;pendingUpgrade=false;
}

// ════════════════════════════════════════════════════════════════
//  FOOTSTEP SOUNDS  — crunch when moving on Io surface
// ════════════════════════════════════════════════════════════════
let footTimer=0;
function updateFootsteps(dt,moveX,moveZ){
  if(!isGrounded||!(Math.abs(moveX)>.1||Math.abs(moveZ)>.1))return;
  footTimer-=dt;
  if(footTimer>0)return;
  const spd=leftGripHeld?SPRINT_VAL:SPEED;
  footTimer=.42-spd*.018; // faster steps when sprinting
  const ctx=getAudio();if(!ctx)return;
  const t=ctx.currentTime;
  const nb=ctx.createBuffer(1,ctx.sampleRate*.06,ctx.sampleRate);
  const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=(Math.random()*2-1)*(1-i/nd.length);
  const src=ctx.createBufferSource();src.buffer=nb;
  const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=280+Math.random()*120;
  const g=ctx.createGain();g.gain.value=.06+Math.random()*.03;
  src.connect(lp);lp.connect(g);g.connect(ctx.destination);src.start(t);src.stop(t+.07);
}

// ════════════════════════════════════════════════════════════════
//  VOICE LINES  — Web Speech API (no files, runs in Meta browser)
// ════════════════════════════════════════════════════════════════
let lastSpoken='',voiceCooldown=0;
function speak(text){
  if(!window.speechSynthesis)return;
  if(text===lastSpoken&&voiceCooldown>0)return;
  lastSpoken=text;voiceCooldown=4;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=1.0;u.pitch=.85;u.volume=.7;
  window.speechSynthesis.speak(u);
}
function updateVoiceCooldown(dt){voiceCooldown=Math.max(0,voiceCooldown-dt);}

// ════════════════════════════════════════════════════════════════
//  RENDER LOOP
// ════════════════════════════════════════════════════════════════
function loop(time,frame){
  const dt=Math.min(clock.getDelta(),.05);
  const now=clock.elapsedTime;

  terrainU.uTime.value=now;jupU.uTime.value=now;
  drainHaptics();      // must run inside XR frame — Quest 3 ignores out-of-frame pulse() calls
  updateAudioListener();
  updateLava();updatePlumes(dt);

  if(gameActive){
    updatePlayer(dt);
    updateEnemies(dt);
    updateBolts(dt);
    updateWaves(now);
    updateCharge(dt);
    updateCombo(dt);
    updateShield(dt);
    updateEnemyHums();
    updateMusic();
    updateDayNight(dt);
    updateVoiceCooldown(dt);
    fireCooldown=Math.max(0,fireCooldown-dt);

    // ── Health regen: 5s grace period, then +5 units/s ──────────────
    // Runs inside gameActive block so healthRegen only ticks during play.
    // healthRegen is reset to 0 in takeDamage() on every hit.
    if(health>0&&health<maxHealth){
      healthRegen+=dt;
      if(healthRegen>5){
        const prev=Math.ceil(health);
        health=Math.min(maxHealth, health+5*dt);
        // Only redraw HUD when the displayed integer value changes
        if(Math.ceil(health)!==prev) drawHUD();
      }
    }
  }
  updateExplosions(dt);
  updateShockwaves(dt);
  updateWaveBanner(dt);
  updateGameOverBanner(dt);
  updateDust(dt);
  updateRockLODs();
  updateVolcanoLODs();
  updateMuzzleCone(dt);
  updateKillFlash(dt);
  updateSaberTrails(dt);
  updateUpgradeCards(dt);
  updateWeapon(dt,now);
  if(gameActive){ updatePickups(dt); updateProjectiles(dt); updateSlashDetection(dt); updateSlashWaves(dt); }

  // updateWeapon moved above

  renderer.render(scene,camera);
}

init();
