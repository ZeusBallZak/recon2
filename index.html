    bodyColor:0x110400, emissive:0x440800, emissiveInt:.4,
    eyeColor:0xff1100, ringColor:0x550200, ringOpacity:.55,
    lightColor:0xff2200, lightInt:1.5, rings:3,
    label:'DRONE'
  },
  heavy:{
    hp:8, speedBase:2.2, speedWave:.18, shootDelay:1.8, shootRand:1.0,
    boltSpeed:16, boltDmg:18, scale:1.85,
    bodyColor:0x220800, emissive:0x881100, emissiveInt:.8,
    eyeColor:0xff6600, ringColor:0x882200, ringOpacity:.75,
    lightColor:0xff4400, lightInt:2.8, rings:4,
    label:'HEAVY'
  }
};

// Weighted random type — scouts more common early, heavies ramp up with wave
function pickEnemyType(){
  const r=Math.random();
  const heavyChance=Math.min(.35, (wave-3)*.08);   // 0 until wave 3, then ramps
  const scoutChance=Math.min(.45, .15+wave*.05);
  if(r<heavyChance) return 'heavy';
  if(r<heavyChance+scoutChance) return 'scout';
  return 'standard';
}

function spawnEnemy(){
  // Spawn on the sphere surface, distributed around the player's position
  const playerDir=dolly.position.clone().normalize();
  const fwdWorld=new THREE.Vector3(0,0,-1).applyQuaternion(dolly.quaternion); // dolly forward

  // Try to find a spawn direction in player's forward hemisphere on the sphere
  let spawnDir, attempts=0;
  do {
    const a=Math.random()*Math.PI*2, angDist=(35+Math.random()*55)/PLANET_R;
    // Rotate playerDir by angDist around a random tangent axis
    const tangent=new THREE.Vector3(-playerDir.z,0,playerDir.x).normalize();
    const axisQ=new THREE.Quaternion().setFromAxisAngle(playerDir,a);
    const rotAxis=tangent.clone().applyQuaternion(axisQ);
    const distQ=new THREE.Quaternion().setFromAxisAngle(rotAxis,angDist);
    spawnDir=playerDir.clone().applyQuaternion(distQ).normalize();
    // Check it's in front of player (dot with fwd > 0.1)
    if(fwdWorld.dot(spawnDir)>0.1) break;
  } while(++attempts<12);
  if(!spawnDir) spawnDir=playerDir.clone().applyAxisAngle(new THREE.Vector3(0,1,0).applyQuaternion(dolly.quaternion),1.0).normalize();

  const type=pickEnemyType();
  const T=ENEMY_TYPES[type];
  const g=new THREE.Group();

  // Body — octahedron deformed by type scale
  const bSize=1.1*T.scale;
  const bGeo=new THREE.OctahedronGeometry(bSize,0),bp=bGeo.attributes.position;
  for(let i=0;i<bp.count;i++)bp.setXYZ(i,bp.getX(i)*(.8+Math.random()*.4),bp.getY(i)*(1.2+Math.random()*.4),bp.getZ(i)*(.8+Math.random()*.4));
  bGeo.computeVertexNormals();
  const body=new THREE.Mesh(bGeo,new THREE.MeshStandardMaterial({color:T.bodyColor,roughness:.25,metalness:.85,emissive:T.emissive,emissiveIntensity:T.emissiveInt}));
  g.add(body);

  // Sensor eye
  const eye=new THREE.Mesh(new THREE.SphereGeometry(.3*T.scale,6,4),new THREE.MeshBasicMaterial({color:T.eyeColor}));
  eye.position.z=.95*T.scale;g.add(eye);
  const eL=new THREE.PointLight(T.lightColor,T.lightInt,5*T.scale);eL.position.copy(eye.position);g.add(eL);

  // Heavy type gets an extra armour shell (no rings — too many faces)
  if(type==='heavy'){
    const shell=new THREE.Mesh(new THREE.IcosahedronGeometry(bSize*1.15,0),
      new THREE.MeshStandardMaterial({color:0x331100,roughness:.6,metalness:.9,transparent:true,opacity:.55}));
    g.add(shell);
  }

  const hoverH=type==='heavy'?2.5:3.5;
  const surfR=getPlanetHeight(spawnDir);
  g.position.copy(spawnDir).multiplyScalar(surfR+hoverH);

  // ── LOD body meshes ─────────────────────────────────────────────
  // LOD0 = existing `body` (8-face deformed octahedron, already added)
  // LOD1 = sphere 6 segments — ~36 triangles, no rings/eye
  // LOD2 = sphere 4×3   — ~12 triangles
  // LOD3 = box          — 12 triangles, pure flat colour
  const lodMat=new THREE.MeshStandardMaterial({color:T.bodyColor,roughness:.35,metalness:.75,emissive:T.emissive,emissiveIntensity:T.emissiveInt*.6});
  const sz=1.1*T.scale;
  const lod1=new THREE.Mesh(new THREE.SphereGeometry(sz*.85,6,5), lodMat);
  const lod2=new THREE.Mesh(new THREE.SphereGeometry(sz*.85,4,3), lodMat.clone());
  const lod3=new THREE.Mesh(new THREE.BoxGeometry(sz*1.2,sz*1.2,sz*1.2), lodMat.clone());
  lod1.visible=false; lod2.visible=false; lod3.visible=false;
  g.add(lod1); g.add(lod2); g.add(lod3);

  g.userData={
    type, hp:T.hp, maxHp:T.hp,
    speed:T.speedBase+Math.random()*1.5+wave*T.speedWave,
    shootTimer:T.shootDelay+Math.random()*T.shootRand,
    shootDelay:T.shootDelay, shootRand:T.shootRand,
    boltSpeed:T.boltSpeed, boltDmg:T.boltDmg,
    hoverPhase:Math.random()*Math.PI*2, hoverH,
    eye,eL,body,isDying:false,
    lodBodies:[body,lod1,lod2,lod3], lastLOD:-1,
    baseLightInt:T.lightInt,
    outOfSightTimer:0  // seconds the enemy has been outside the player's FOV
  };
  scene.add(g);enemies.push(g);
  startEnemyHum(g);
  assignFlankAngles();
}

const _camWP=new THREE.Vector3();
const _toP=new THREE.Vector3(); // scratch — reused every enemy update, no per-frame alloc
function updateEnemies(dt){
  camera.getWorldPosition(_camWP);
  const dead=[];
  for(const e of enemies){
    const ud=e.userData;if(ud.isDying){dead.push(e);continue;}
    ud.hoverPhase+=dt*2.2;
    const eDir=e.position.clone().normalize();
    const eTerrR=getPlanetHeight(eDir);
    e.position.setLength(eTerrR+ud.hoverH+Math.sin(ud.hoverPhase)*.6);
    const toP=_toP.subVectors(_camWP,e.position),dist=toP.length();
    // Face toward player: compute the tangential component of toP
    const eUp=e.position.clone().normalize();
    const towardPlayer=toP.clone().normalize();
    // Build a look-at quaternion — lookAt makes local -Z face the target,
    // but the enemy mesh faces +Z, so rotate 180° around the surface normal.
    const lookTarget=e.position.clone().add(towardPlayer.multiplyScalar(5));
    const lookMat=new THREE.Matrix4().lookAt(e.position,lookTarget,eUp);
    const targetQ=new THREE.Quaternion().setFromRotationMatrix(lookMat);
    targetQ.multiply(new THREE.Quaternion().setFromAxisAngle(eUp,Math.PI));
    e.quaternion.slerp(targetQ,0.08);

    // ── LOD switching — only triggers on level change ──────────────
    const newLOD=dist<25?0:dist<60?1:dist<120?2:3;
    if(newLOD!==ud.lastLOD){
      ud.lastLOD=newLOD;
      // Swap which body mesh is visible
      ud.lodBodies.forEach((b,i)=>{ b.visible=(i===newLOD); });
      // Eye: visible at LOD 0–2, hidden only at extreme distance
      if(ud.eye) ud.eye.visible=(newLOD<=2);
      // Light: full at 0, dim at 1, off at 2–3
      if(ud.eL) ud.eL.intensity=newLOD===0?ud.baseLightInt:newLOD===1?ud.baseLightInt*.35:0;
    }

    if(newLOD===0){
      ud.eL.intensity=(.8+.2*Math.sin(ud.hoverPhase*3))*ud.baseLightInt;
    }
    updateEnemyAI(e,ud,toP,dist,dt);
    ud.shootTimer-=dt;
    if(ud.shootTimer<=0&&dist<70&&eBolts.length<7){
      const jitter=new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).multiplyScalar(.22);
      const d=new THREE.Vector3().subVectors(_camWP,e.position).normalize().add(jitter).normalize();
      spawnBolt(e.position.clone(),d,true,ud.boltSpeed,ud.boltDmg);
      ud.shootTimer=Math.max(.4,ud.shootDelay-wave*.08)+Math.random()*ud.shootRand;
    }
    if(ud.hp<=0){ud.isDying=true;dead.push(e);}
  }

  // ── Separation pass — keep enemies spaced apart ───────────────
  // O(n²) over ≤12 enemies: push any overlapping pair apart along
  // their connecting vector, then re-snap each to the terrain surface.
  const MIN_SEP=5.5; // minimum centre-to-centre world distance
  for(let i=0;i<enemies.length;i++){
    for(let j=i+1;j<enemies.length;j++){
      const ei=enemies[i], ej=enemies[j];
      const diff=new THREE.Vector3().subVectors(ei.position,ej.position);
      const d=diff.length();
      if(d>0.001&&d<MIN_SEP){
        const push=(MIN_SEP-d)*0.5;
        diff.normalize().multiplyScalar(push);
        ei.position.add(diff);
        ej.position.sub(diff);
        // Re-snap both to terrain surface
        const di=ei.position.clone().normalize();
        const dj=ej.position.clone().normalize();
        ei.position.setLength(getPlanetHeight(di)+ei.userData.hoverH);
        ej.position.setLength(getPlanetHeight(dj)+ej.userData.hoverH);
      }
    }
  }

  // ── Enemy volcano collision ──────────────────────────────────────────
  for(const e of enemies){
    const ePos=e.position; const eRad=ePos.length(); const eDir=ePos.clone().normalize();
    for(const vc of volcanoColliders){
      if(eDir.angleTo(vc.axis)*PLANET_R>vc.r+4) continue;
      const htE=eRad-vc.baseR;
      if(htE<20||htE>vc.h+4) continue;
      // Volume escape
      const toE=new THREE.Vector3().subVectors(ePos,vc.basePos);
      const tE=Math.max(0,Math.min(vc.h,toE.dot(vc.axis)));
      const rcE=vc.basePos.clone().addScaledVector(vc.axis,tE);
      const radE=new THREE.Vector3().subVectors(ePos,rcE);
      radE.addScaledVector(vc.axis,-radE.dot(vc.axis));
      const rTE=vc.r*(1-tE/vc.h);
      if(radE.length()<rTE){
        const expel=radE.length()>0.001?radE.clone().normalize():eDir.clone();
        e.position.copy(rcE).addScaledVector(expel,rTE+2.0);
        const eD2=e.position.clone().normalize();
        e.position.setLength(getPlanetHeight(eD2)+e.userData.hoverH);
        continue;
      }
      // Surface push
      const cp=closestPointOnCone(ePos,vc.basePos,vc.axis,vc.r,vc.h);
      const dE=ePos.distanceTo(cp);
      if(dE<2.0){
        const pD=new THREE.Vector3().subVectors(ePos,cp).normalize().multiplyScalar(2.0-dE+0.1);
        e.position.add(pD);
        const eD3=e.position.clone().normalize();
        e.position.setLength(getPlanetHeight(eD3)+e.userData.hoverH);
      }
    }
  }

  // ── Enemy pyramid collision ──────────────────────────────────────
  for(const e of enemies){
    applyPyramidCollision(e.position,2.2,false);
    const eD4=e.position.clone().normalize();
    e.position.setLength(getPlanetHeight(eD4)+e.userData.hoverH);
  }

  for(const e of dead){
    killExplosion(e.position.clone());scene.remove(e);
    playExplosionSound(e.position.clone());
    stopEnemyHum(e);
    enemies=enemies.filter(x=>x!==e);
    kills++;
    registerKill();
    triggerKillFlash(WEAPONS[currentWeapon]?.col??0xffffff);
    if(e===bossEnemy){bossEnemy=null;health=Math.min(maxHealth,health+40);speak('Boss defeated');drawHUD();}
    const typeScore={scout:50,standard:100,heavy:300,boss:1000};
    score+=(typeScore[e.userData.type]||100)*wave*comboMult;drawHUD();
  }
}

function killExplosion(pos){
  const N=40, geo=new THREE.BufferGeometry();
  const arr=new Float32Array(N*3), vels=[];
  for(let i=0;i<N;i++){
    arr[i*3  ]=pos.x+(Math.random()-.5)*1.5;
    arr[i*3+1]=pos.y+(Math.random()-.5)*1.5;
    arr[i*3+2]=pos.z+(Math.random()-.5)*1.5;
    vels.push((Math.random()-.5)*6, (Math.random()-.5)*6+2, (Math.random()-.5)*6);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(arr,3));
  const mat=new THREE.PointsMaterial({color:0xff4400,size:.8,transparent:true,opacity:1,blending:THREE.AdditiveBlending,depthWrite:false});
  const pts=new THREE.Points(geo,mat); scene.add(pts);
  const fl=new THREE.PointLight(0xff4400,15,25); fl.position.copy(pos); scene.add(fl);
  // Register in explosions list — updated inside loop() which is the real XR frame callback.
  // requestAnimationFrame is hijacked by the XR runtime and stalls, causing explosions to
  // freeze permanently and leak memory. This approach is XR-safe.
  explosions.push({geo,mat,pts,fl,vels,t:0,N});
}

// Called every frame from loop() — advances all active explosions and removes finished ones
function updateExplosions(dt){
  const done=[];
  for(const ex of explosions){
    ex.t+=dt*1.1;  // dt-based so speed is frame-rate independent
    const pa=ex.geo.attributes.position.array;
    for(let i=0;i<ex.N;i++){
      pa[i*3  ]+=ex.vels[i*3  ]*dt;
      pa[i*3+1]+=ex.vels[i*3+1]*dt - 2.5*dt; // gravity
      pa[i*3+2]+=ex.vels[i*3+2]*dt;
    }
    ex.geo.attributes.position.needsUpdate=true;
    const life=Math.max(0, 1-ex.t);
    ex.mat.opacity=life;
    ex.mat.size=0.8+ex.t*3;
    ex.fl.intensity=15*life;
    if(ex.t>=1) done.push(ex);
  }
  // Clean up finished explosions — dispose geometry and material to free GPU memory
  for(const ex of done){
    scene.remove(ex.pts); scene.remove(ex.fl);
    ex.geo.dispose(); ex.mat.dispose();
    explosions=explosions.filter(e=>e!==ex);
  }
}

// ── Bolt update ───────────────────────────────────────────────────
function updateBolts(dt){
  camera.getWorldPosition(_camWP);
  const sweep=(arr,isPlayer)=>{
    const rem=[];
    for(const p of arr){
      p.position.addScaledVector(p.userData.vel,dt);
      p.userData.age+=dt;
      for(const u of p.userData.unis)u.uTime.value+=dt;
      if(p.userData.age>3.5||p.position.length()<getPlanetHeight(p.position.clone().normalize())){rem.push(p);continue;}
      if(!isPlayer)updateBoltBuzz(p);  // move panner + apply Doppler shift every frame
      if(isPlayer){
        let hit=false;
        for(const e of enemies){
          if(p.position.distanceTo(e.position)<2.8){
            e.userData.hp--;
            e.userData.body.material.emissive.setHex(0xff2200);
            setTimeout(()=>{if(e.userData.body)e.userData.body.material.emissive.setHex(0x440800);},90);
            rem.push(p);hit=true;break;
          }
        }
        if(!hit&&p.userData.age>2.5)rem.push(p);
      }else{
        if(p.position.distanceTo(_camWP)<1.5){
          if(checkShieldBlock(p.position)){rem.push(p);} // bolt absorbed by shield
          else{takeDamage(p.userData.dmg||10);rem.push(p);}
        }
      }
    }
    rem.forEach(p=>{ if(!isPlayer)stopBoltBuzz(p); scene.remove(p); });
    return arr.filter(x=>!rem.includes(x));
  };
  pBolts=sweep(pBolts,true);eBolts=sweep(eBolts,false);
}

// ── Player locomotion from XR gamepad ─────────────────────────────
// ── Analytical cone collision helper ──────────────────────────────────────
// Returns the closest point on the CONE SURFACE (slant + apex) to world point P.
// B     = cone base centre (world), axis = unit vector from base toward apex,
// r     = base radius, h = cone height.
// Strategy: project P onto the axis, clamp to [0,h], find the ring at that height,
// then find the nearest point on that ring from P.
// This is O(1) vector math — no raycasting, no mesh queries.
function closestPointOnCone(P, B, axis, r, h){
  const toP=new THREE.Vector3().subVectors(P,B);
  // Height of P projected along cone axis, clamped to cone range
  const t=Math.max(0,Math.min(h, toP.dot(axis)));
  // Centre and radius of the ring at height t
  const C=B.clone().addScaledVector(axis,t);
  const rT=r*(1-t/h); // tapers to 0 at apex
  // Perpendicular component from ring-centre to P (strip the axis component)
  const perp=new THREE.Vector3().subVectors(P,C);
  perp.addScaledVector(axis,-perp.dot(axis));
  const perpLen=perp.length();
  if(perpLen<0.001){
    // P is on the axis — return a point on the ring in an arbitrary perpendicular direction
    const anyPerp=new THREE.Vector3(1,0,0)
      .addScaledVector(axis,-axis.x).normalize();
    return C.clone().addScaledVector(anyPerp,rT);
  }
  return C.clone().addScaledVector(perp,rT/perpLen);
}

const _fwd=new THREE.Vector3(),_rgt=new THREE.Vector3();
function updatePlayer(dt){
  const session=renderer.xr.getSession();
  if(!session)return;

  let moveX=0,moveZ=0;

  for(const src of session.inputSources){
    if(!src.gamepad)continue;
    const gp=src.gamepad,ax=gp.axes;

    if(src.handedness==='left'){
      if(Math.abs(ax[2])>.15)moveX=ax[2];
      if(Math.abs(ax[3])>.15)moveZ=ax[3];
      leftGripHeld=gp.buttons[1]?.pressed??false;
      // X button (index 4): cycle weapons
      const xNow=gp.buttons[4]?.pressed??false;
      if(xNow&&!xWasPressed){
        currentWeaponIndex=(currentWeaponIndex+1)%WEAPONS_ORDER.length;
        const nextType=WEAPONS_ORDER[currentWeaponIndex];
        equipWeapon(nextType);
        speak(WEAPONS[nextType].name);
      }
      xWasPressed=xNow;
    }

    if(src.handedness==='right'){
      // Right thumbstick X: snap turn
      if(snapCooldown<=0&&Math.abs(ax[2])>.65){
        const surfNorm=dolly.position.clone().normalize();
        const snapQ=new THREE.Quaternion()
          .setFromAxisAngle(surfNorm,-Math.sign(ax[2])*SENS_SNAP);
        dolly.quaternion.premultiply(snapQ);
        snapCooldown=.38;
      }
      // A button (index 4): super jump
      const aNow=gp.buttons[4]?.pressed??false;
      if(aNow&&!aWasPressed&&isGrounded){
        playerVY=JUMP_VEL;
        isGrounded=false;
        haptic('right',1.0,120);haptic('left',0.8,100);
        drawHUD();
      }
      aWasPressed=aNow;
      // B button (index 5): dash forward
      const bNow=gp.buttons[5]?.pressed??false;
      if(bNow&&!bWasPressed&&!dashActive&&dashCooldown<=0&&gameActive){
        const sN=dolly.position.clone().normalize();
        camera.getWorldDirection(_dashDir);
        _dashDir.addScaledVector(sN,-_dashDir.dot(sN));
        if(_dashDir.lengthSq()<.0001)_dashDir.copy(_fwd);
        _dashDir.normalize();
        dashActive=true;
        dashRemaining=DASH_DUR;
        dashCooldown=DASH_COOLDOWN;
        haptic('right',1.0,80);haptic('left',0.6,60);
        spawnLandingDust(new THREE.Vector3(dolly.position.x,dolly.position.y,dolly.position.z));
      }
      bWasPressed=bNow;
    }
  }
  if(snapCooldown>0)snapCooldown-=dt;

  // ── Dolly orientation — align +Y with surface normal ─────────────
  {
    const sN=dolly.position.clone().normalize();
    const dU=new THREE.Vector3(0,1,0).applyQuaternion(dolly.quaternion);
    const ang=dU.angleTo(sN);
    if(ang>0.0015){
      const ax=new THREE.Vector3().crossVectors(dU,sN);
      if(ax.lengthSq()>1e-8){
        // Normal case: rotate around cross-product axis
        const step=Math.min(ang,4.5*dt);
        dolly.quaternion.premultiply(new THREE.Quaternion().setFromAxisAngle(ax.normalize(),step));
      } else {
        // Degenerate case (nearly 180°): pick an arbitrary perpendicular axis
        const perp=new THREE.Vector3(1,0,0);
        if(Math.abs(sN.dot(perp))>.9) perp.set(0,0,1);
        const safeAx=new THREE.Vector3().crossVectors(sN,perp).normalize();
        dolly.quaternion.premultiply(new THREE.Quaternion().setFromAxisAngle(safeAx,Math.min(ang,4.5*dt)));
      }
    }
  }

  // ── Tangential locomotion ─────────────────────────────────────────
  const surfNormLoco=dolly.position.clone().normalize();
  camera.getWorldDirection(_fwd);
  _fwd.addScaledVector(surfNormLoco,-_fwd.dot(surfNormLoco));
  if(_fwd.lengthSq()<.0001)_fwd.set(0,0,-1);_fwd.normalize();
  _rgt.crossVectors(_fwd,surfNormLoco).normalize();
  const spd=leftGripHeld?SPRINT_VAL:SPEED;
  dolly.position.addScaledVector(_fwd,-moveZ*spd*dt);
  dolly.position.addScaledVector(_rgt, moveX*spd*dt);
  updateFootsteps(dt,moveX,moveZ);

  // ── Dash (tangential) ────────────────────────────────────────────
  dashCooldown=Math.max(0,dashCooldown-dt);
  if(dashActive){
    const step=Math.min(dashRemaining,dt)*DASH_SPEED;
    dolly.position.addScaledVector(_dashDir,step);
    dashRemaining-=dt;
    const dPos=dolly.position;
    for(const e of enemies){
      const ud=e.userData;if(ud.dashHit)continue;
      const toE=new THREE.Vector3().subVectors(e.position,dPos);
      if(toE.length()<3.0){
        ud.dashHit=true; ud.hp-=Math.ceil(ud.maxHp*.20);
        const pushDir=toE.lengthSq()>.001?toE.normalize():_dashDir.clone();
        e.position.addScaledVector(pushDir,5);
        const eD=e.position.clone().normalize();
        e.position.setLength(Math.max(getPlanetHeight(eD),e.position.length()));
        haptic('right',1.0,60);
      }
    }
    if(dashRemaining<=0){
      dashActive=false;dashRemaining=0;
      enemies.forEach(e=>{e.userData.dashHit=false;});
      haptic('right',0.5,60);
    }
  }

  // ── Volcano collision — analytical closest-point-on-cone ──────────
  const PLAYER_R=1.2;
  const playerDir=dolly.position.clone().normalize();
  const playerRad=dolly.position.length();

  for(const vc of volcanoColliders){
    const approxArc=playerDir.angleTo(vc.axis)*PLANET_R;
    if(approxArc>vc.r+PLAYER_R+6) continue;
    const htAboveBase=playerRad-vc.baseR;
    if(htAboveBase<22||htAboveBase>vc.h+PLAYER_R+2) continue;

    // ── Volume escape: is the player INSIDE the cone? ─────────────
    // If so, push directly outward from the cone axis — this is the
    // most reliable escape from a stuck state regardless of how deeply
    // the player is embedded.
    const toP=new THREE.Vector3().subVectors(dolly.position,vc.basePos);
    const tClamped=Math.max(0,Math.min(vc.h,toP.dot(vc.axis)));
    const ringCentre=vc.basePos.clone().addScaledVector(vc.axis,tClamped);
    const rAtT=vc.r*(1-tClamped/vc.h);
    const radialFromAxis=new THREE.Vector3().subVectors(dolly.position,ringCentre);
    radialFromAxis.addScaledVector(vc.axis,-radialFromAxis.dot(vc.axis));
    const radialDist=radialFromAxis.length();
    if(radialDist<rAtT){
      // Player is inside the cone volume — expel immediately
      const expelDir=radialDist>0.001
        ? radialFromAxis.clone().normalize()
        : new THREE.Vector3().subVectors(playerDir,vc.axis.clone().multiplyScalar(playerDir.dot(vc.axis))).normalize();
      // Move to just outside the cone surface at this ring
      dolly.position.copy(ringCentre).addScaledVector(expelDir,rAtT+PLAYER_R+0.2);
      // Re-snap to terrain
      const ed=dolly.position.clone().normalize();
      dolly.position.setLength(getPlanetHeight(ed));
      continue; // already resolved, skip surface test
    }

    // ── Surface proximity push ─────────────────────────────────────
    const closestPt=closestPointOnCone(dolly.position,vc.basePos,vc.axis,vc.r,vc.h);
    const toPlayer=new THREE.Vector3().subVectors(dolly.position,closestPt);
    const dist=toPlayer.length();
    if(dist>=PLAYER_R) continue;

    let pushDir;
    if(dist>0.001){
      pushDir=toPlayer.clone().normalize();
    }else{
      pushDir=new THREE.Vector3()
        .subVectors(playerDir,vc.axis.clone().multiplyScalar(playerDir.dot(vc.axis)));
      if(pushDir.lengthSq()<0.0001) continue;
      pushDir.normalize();
    }
    pushDir.addScaledVector(playerDir,-pushDir.dot(playerDir));
    if(pushDir.lengthSq()<0.0001) continue;
    pushDir.normalize();
    dolly.position.addScaledVector(pushDir,PLAYER_R-dist+0.12);
    const newDir=dolly.position.clone().normalize();
    dolly.position.setLength(getPlanetHeight(newDir));
  }

  // ── Pyramid collision ─────────────────────────────────────────────
  applyPyramidCollision(dolly.position, PLAYER_R, true);
  applyLandmarkCollision();

  // ── Spherical gravity + terrain following ─────────────────────────
  // Guard: dolly must not be at origin (normalize would give NaN/zero)
  if(dolly.position.lengthSq()<1){dolly.position.set(0,PLANET_R+2,0);}
  const surfDirP=dolly.position.clone().normalize();
  // FBM gives the authoritative terrain surface radius at this direction —
  // always computed because it matches the displaced geometry exactly.
  const fbmGroundR=getPlanetHeight(surfDirP);
  // Raycast refines it for sub-grid precision; falls back to FBM if it misses.
  floorRay.set(surfDirP.clone().multiplyScalar(PLANET_R*2), surfDirP.clone().negate());
  const hits=terrainMesh?floorRay.intersectObject(terrainMesh,false):[];
  const groundR=hits.length>0
    ? Math.max(hits[0].point.length(), fbmGroundR-3)
    : fbmGroundR;

  if(!isGrounded){
    playerVY-=IO_GRAVITY*dt;
    const newR=dolly.position.length()+playerVY*dt;
    if(newR<=groundR){
      dolly.position.setLength(groundR);
      playerVY=0;isGrounded=true;
      haptic('right',0.6,80);haptic('left',0.5,70);
      spawnLandingDust(dolly.position.clone());drawHUD();
    }else{
      dolly.position.setLength(Math.max(newR,groundR));
    }
  }else{
    dolly.position.setLength(THREE.MathUtils.lerp(dolly.position.length(),groundR,Math.min(1,dt*18)));
  }

  // ── Safety clamp: keep player on the planet ─────────────────────
  // If the player has somehow escaped to space or phased into the core,
  // teleport back to the surface above the north pole.
  {
    const rad=dolly.position.length();
    if(rad>PLANET_R+150||rad<PLANET_R*0.5||isNaN(rad)){
      dolly.position.set(0,getPlanetHeight({x:0,y:1,z:0}),0);
      dolly.quaternion.identity();
      playerVY=0;isGrounded=true;
      console.warn('Player safety reset to surface');
    }
  }

  // Shield passive regen
  if(shield<maxShield){
    shieldRegen+=dt;
    if(shieldRegen>4){shield=Math.min(maxShield,shield+8*dt);}
  }
}

// ── Weapon animation (recoil spring, muzzle flash, energy pulse) ──
function updateWeapon(dt,now){
  if(!weaponGroup)return;
  if(mfTimer>0){mfTimer=Math.max(0,mfTimer-dt);muzzleLight.intensity=mfTimer>0?7:0;muzzleSphere.visible=mfTimer>0;}
  kickZ*=Math.pow(.01,dt);kickRX*=Math.pow(.01,dt);
  weaponGroup.position.z=-0.135+kickZ;
  weaponGroup.rotation.x=WEAPON_PITCH+kickRX;
  const pulse=.8+.2*Math.sin(now*4.5);
  for(const m of energyCells)m.material.emissiveIntensity=2.6*pulse;
}

// ── Damage ────────────────────────────────────────────────────────
// ── GOD MODE — set true for testing, false for release ───────────
const GOD_MODE = true;

function takeDamage(dmg){
  if(GOD_MODE)return; // infinite health
  if(!gameActive)return;
  if(shield>0){const ab=Math.min(shield,dmg*.7);shield-=ab;dmg-=ab;shieldRegen=0;}
  health-=dmg;health=Math.max(0,health);healthRegen=0;drawHUD();
  // Damage shake — intensity and duration scale with how hard you were hit
  haptic('right', 1.0, Math.min(600, 200+dmg*18));  // full-power impact shake
  haptic('left',  1.0, Math.min(500, 180+dmg*15));
  // Brief red flash inside the VR view
  damageSphere.material.opacity=Math.min(.5,dmg/25);
  setTimeout(()=>damageSphere.material.opacity=0,220);
  if(health<=0)triggerGameOver();
}

function triggerGameOver(){
  gameActive=false;gameOverState=true;
  // Stop super blast charge immediately — if the player dies while holding
  // the trigger, chargeOsc is still live and will resume when AudioContext
  // unuspends. Disconnect and null it here before suspending.
  triggerHeld=false;chargeTime=0;stopCharge();
  if(chargeSphere)chargeSphere.material.opacity=0;
  if(chargeBoids) chargeBoids.material.opacity=0;
  damageSphere.material.opacity=0;
  damageSphere.material.color.setHex(0xff0000);
  stopAllAudio();
  window.speechSynthesis?.cancel();
  setTimeout(showGameOverBanner, 400); // brief delay so VR frame settles
  saveScore(score,wave,kills).then(()=>drawGameOverHUD());
  enemies.forEach(e=>scene.remove(e));
  pBolts.forEach(p=>scene.remove(p));
  eBolts.forEach(p=>{stopBoltBuzz(p);scene.remove(p);});
  enemies=[];pBolts=[];eBolts=[];
  drawHUD();
}

function updatePlumes(dt){
  for(const pts of plumeList){
    const ud=pts.userData,pa=pts.geometry.attributes.position.array;
    for(let i=0;i<ud.N;i++){
      ud.life[i]+=dt*.25;
      if(ud.life[i]>1){ud.life[i]=0;const a=Math.random()*Math.PI*2,r=Math.random()*3;pa[i*3]=ud.ox+Math.cos(a)*r;pa[i*3+1]=ud.oy;pa[i*3+2]=ud.oz+Math.sin(a)*r;ud.vel[i*3]=(Math.random()-.5)*3;ud.vel[i*3+1]=4+Math.random()*8;ud.vel[i*3+2]=(Math.random()-.5)*3;}
      else{pa[i*3]+=ud.vel[i*3]*dt;pa[i*3+1]+=ud.vel[i*3+1]*dt;pa[i*3+2]+=ud.vel[i*3+2]*dt;ud.vel[i*3+1]-=2.5*dt;}
    }
    pts.geometry.attributes.position.needsUpdate=true;
  }
}

function updateLava(){
  for(const ll of lavaLights){ll.phase+=.05;ll.light.intensity=ll.base*(.8+.2*Math.sin(ll.phase)+.1*Math.sin(ll.phase*3.7+1.2));}
}

// ── Wave escalation ────────────────────────────────────────────────
function updateWaves(now){
  if(!gameActive||upgradePhase)return;
  const maxE=Math.min(9, 3+wave*2), spawnI=Math.max(.8,3.5-wave*.25);
  // Block spawning during the 10-second inter-wave break
  if(now>=waveBreakUntil && enemies.length<maxE && now-lastSpawn>spawnI){
    spawnEnemy();lastSpawn=now;
  }
  if(score>=waveThresh&&wave<12){
    wave++;waveThresh=score+500*wave;
    showWaveBanner(wave);drawHUD();
    // 10-second break — clear remaining enemies' spawn timer so none appear
    waveBreakUntil=now+10;
    speak('Wave '+wave+'. 10 second break.');
    // Boss every 5th wave (after the break)
    if(wave%5===0&&!bossEnemy) setTimeout(spawnBoss,11500);
    pendingUpgrade=true;
  }
  if(pendingUpgrade&&!upgradePhase&&enemies.length===0) showUpgradeCards();
}

// ════════════════════════════════════════════════════════════════
//  AUDIO  — Web Audio API, fully procedural (no external files)
//
//  AudioContext is created on the first VR entry (requires a user
//  gesture). The listener pose is updated every frame so enemy shots
//  are correctly spatialised in 3-D as you move and rotate your head.
//
//  Player shot : bright sawtooth sweep 1100→280 Hz + harmonic + click
//  Enemy shot  : deep square-wave buzz 520→90 Hz, HRTF-panned to the
//                firing drone's world position for full 3-D audio
// ════════════════════════════════════════════════════════════════
let audioCtx=null;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

function getAudio(){
  if(!audioCtx)return null;
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}

// ── Listener tracking — called every frame ─────────────────────
// Keeps the Web Audio spatial origin locked to the VR camera so
// left/right/front/back panning is always relative to the headset.
const _aPos=new THREE.Vector3(),_aQ=new THREE.Quaternion();
const _aFwd=new THREE.Vector3(),_aUp=new THREE.Vector3();
function updateAudioListener(){
  const ctx=getAudio();if(!ctx)return;
  camera.getWorldPosition(_aPos);
  camera.getWorldQuaternion(_aQ);
  _aFwd.set(0,0,-1).applyQuaternion(_aQ);
  _aUp.set(0,1,0).applyQuaternion(_aQ);
  const l=ctx.listener;
  if(l.positionX){
    l.positionX.value=_aPos.x;l.positionY.value=_aPos.y;l.positionZ.value=_aPos.z;
    l.forwardX.value=_aFwd.x; l.forwardY.value=_aFwd.y; l.forwardZ.value=_aFwd.z;
    l.upX.value=_aUp.x;       l.upY.value=_aUp.y;       l.upZ.value=_aUp.z;
  }else{
    l.setPosition(_aPos.x,_aPos.y,_aPos.z);
    l.setOrientation(_aFwd.x,_aFwd.y,_aFwd.z,_aUp.x,_aUp.y,_aUp.z);
  }
}

function setPannerPos(pan,v){
  if(pan.positionX){pan.positionX.value=v.x;pan.positionY.value=v.y;pan.positionZ.value=v.z;}
  else pan.setPosition(v.x,v.y,v.z);
}

// ── Enemy death explosions — 5 distinct 3D procedural sounds ──────
// Each variant is synthesised with Web Audio API (no files).
// A HRTF PannerNode places the sound at the drone's world position.
// One is chosen at random on every kill.

function _makeExplosionPanner(worldPos){
  const ctx=getAudio(); if(!ctx) return null;
  const pan=ctx.createPanner();
  pan.panningModel='HRTF'; pan.distanceModel='inverse';
  pan.refDistance=6; pan.maxDistance=120; pan.rolloffFactor=1.3;
  setPannerPos(pan, worldPos);
  pan.connect(ctx.destination);
  return {ctx, pan};
}

// 3. Boom + rumble — mid explosion with long low-frequency decay
function _explode3(worldPos){
  const r=_makeExplosionPanner(worldPos); if(!r) return;
  const {ctx,pan}=r, t=ctx.currentTime;
  // Two oscillator layers for body
  [55,110].forEach((freq,i)=>{
    const o=ctx.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(freq,t);
    o.frequency.exponentialRampToValueAtTime(freq*0.25,t+0.6);
    const g=ctx.createGain(); g.gain.setValueAtTime(0.5-i*0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
    o.connect(g); g.connect(pan); o.start(t); o.stop(t+0.85);
  });
  // Broadband noise rumble
  const nb=ctx.createBuffer(1,ctx.sampleRate*1.4,ctx.sampleRate);
  const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource(); ns.buffer=nb;
  const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=180; bp.Q.value=0.8;
  const ng=ctx.createGain(); ng.gain.setValueAtTime(0.6,t); ng.gain.exponentialRampToValueAtTime(0.001,t+1.4);
  ns.connect(bp); bp.connect(ng); ng.connect(pan); ns.start(t); ns.stop(t+1.45);
}

function playExplosionSound(worldPos){ _explode3(worldPos); }
// Three layers: sawtooth sweep for body, sine harmonic for brightness,
// high-passed noise burst for the initial crack on trigger pull.
function playPlayerShot(){
  const ctx=getAudio();if(!ctx)return;
  const t=ctx.currentTime;
  const master=ctx.createGain();master.gain.value=0.85;master.connect(ctx.destination);

  // Sawtooth body: 1100 → 280 Hz
  const o1=ctx.createOscillator();o1.type='sawtooth';
  o1.frequency.setValueAtTime(1100,t);
  o1.frequency.exponentialRampToValueAtTime(280,t+0.11);
  const g1=ctx.createGain();
  g1.gain.setValueAtTime(0,t);g1.gain.linearRampToValueAtTime(0.22,t+0.005);
  g1.gain.exponentialRampToValueAtTime(0.001,t+0.13);
  o1.connect(g1);g1.connect(master);o1.start(t);o1.stop(t+0.15);

  // Sine harmonic: 2200 → 560 Hz (adds sparkle)
  const o2=ctx.createOscillator();o2.type='sine';
  o2.frequency.setValueAtTime(2200,t);
  o2.frequency.exponentialRampToValueAtTime(560,t+0.09);
  const g2=ctx.createGain();g2.gain.setValueAtTime(0.10,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.09);
  o2.connect(g2);g2.connect(master);o2.start(t);o2.stop(t+0.10);

  // High-pass noise crack on attack
  const nb=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*0.04),ctx.sampleRate);
  const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource();ns.buffer=nb;
  const nf=ctx.createBiquadFilter();nf.type='highpass';nf.frequency.value=4500;
  const ng=ctx.createGain();ng.gain.setValueAtTime(0.09,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.04);
  ns.connect(nf);nf.connect(ng);ng.connect(master);ns.start(t);ns.stop(t+0.05);
}

// ── Enemy bolt: continuous 3D buzz with manual Doppler ─────────
// Each bolt gets its own PannerNode updated every frame and two
// detuned sawtooth oscillators whose pitch is shifted by:
//   f_obs = f₀ · c / (c − v_radial)
// where v_radial = component of bolt velocity toward the camera,
// giving a rising whine on approach and a falling growl on pass.
const BUZZ_C = 55;
const BUZZ_F0 = 150;  // slightly higher than 95 Hz — audible growl with Doppler range

function createBoltBuzz(bolt){
  const ctx=getAudio();if(!ctx)return;

  // 3-D panner placed at bolt spawn position
  const pan=ctx.createPanner();
  pan.panningModel='HRTF';pan.distanceModel='inverse';
  pan.refDistance=4;pan.maxDistance=90;pan.rolloffFactor=1.4;
  setPannerPos(pan,bolt.position);pan.connect(ctx.destination);

  // Master gain — fade in so the onset isn't a click
  const master=ctx.createGain();
  master.gain.setValueAtTime(0,ctx.currentTime);
  master.gain.linearRampToValueAtTime(0.09375,ctx.currentTime+0.04);
  master.connect(pan);

  // LFO tremolo at 30 Hz — the "buzzing" texture character
  const lfo=ctx.createOscillator();lfo.type='sine';lfo.frequency.value=10; // lowered from 30 Hz
  const lfoAmt=ctx.createGain();lfoAmt.gain.value=0.18;
  lfo.connect(lfoAmt);lfoAmt.connect(master.gain);

  // Oscillator 1 — main sawtooth
  const o1=ctx.createOscillator();o1.type='sawtooth';o1.frequency.value=BUZZ_F0;
  const g1=ctx.createGain();g1.gain.value=0.45;o1.connect(g1);g1.connect(master);

  // Oscillator 2 — 1.2% detune produces a beating effect
  const o2=ctx.createOscillator();o2.type='sawtooth';o2.frequency.value=BUZZ_F0*1.012;
  const g2=ctx.createGain();g2.gain.value=0.30;o2.connect(g2);g2.connect(master);

  o1.start();o2.start();lfo.start();
  bolt.userData.audio={o1,o2,lfo,lfoAmt,master,pan,active:true};
}

// Called every frame while the bolt is live — moves the panner and
// applies the Doppler frequency shift. _camWP is already updated by
// updateBolts before this is called so no extra getWorldPosition needed.
function updateBoltBuzz(bolt){
  const aud=bolt.userData.audio;if(!aud||!aud.active)return;
  const ctx=getAudio();if(!ctx)return;

  setPannerPos(aud.pan,bolt.position);

  // Radial velocity: positive = bolt moving toward camera
  const dx=_camWP.x-bolt.position.x,dy=_camWP.y-bolt.position.y,dz=_camWP.z-bolt.position.z;
  const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
  if(dist<0.1)return;
  const vRad=(bolt.userData.vel.x*dx+bolt.userData.vel.y*dy+bolt.userData.vel.z*dz)/dist;
  // Clamp denominator so ratio never goes infinite when bolt nearly matches c
  const denom=Math.max(BUZZ_C*0.1, BUZZ_C-vRad);
  const ratio=Math.min(2.5,Math.max(0.25, BUZZ_C/denom));
  const now=ctx.currentTime;
  // setTargetAtTime smooths the shift — avoids zipper noise each frame
  aud.o1.frequency.setTargetAtTime(BUZZ_F0*ratio,       now,0.022);
  aud.o2.frequency.setTargetAtTime(BUZZ_F0*1.012*ratio, now,0.022);
}

// Called once when the bolt is removed — fades out then disconnects
function stopBoltBuzz(bolt){
  const aud=bolt.userData.audio;if(!aud||!aud.active)return;
  aud.active=false;
  const ctx=getAudio();if(!ctx)return;
  aud.master.gain.setTargetAtTime(0,ctx.currentTime,0.04);
  setTimeout(()=>{
    try{aud.o1.stop();aud.o2.stop();aud.lfo.stop();}catch(e){}
    try{aud.pan.disconnect();}catch(e){}
  },200);
}
// Square sweep for menace + sawtooth buzz for alien texture.
// HRTF panner placed at the drone's world position; listener is
// updated each frame in updateAudioListener() so panning is correct
// as the player moves. Volume rolls off with inverse distance law.
function playEnemyShot(worldPos){
  const ctx=getAudio();if(!ctx)return;
  const t=ctx.currentTime;

  const pan=ctx.createPanner();
  pan.panningModel='HRTF';
  pan.distanceModel='inverse';
  pan.refDistance=8;
  pan.maxDistance=150;
  pan.rolloffFactor=1.2;
  setPannerPos(pan,worldPos);
  pan.connect(ctx.destination);

  const master=ctx.createGain();master.gain.value=0.10;master.connect(pan);

  // Square sweep: 180 → 35 Hz (lowered from 520→90 — sub-bass thud)
  const o1=ctx.createOscillator();o1.type='square';
  o1.frequency.setValueAtTime(180,t);
  o1.frequency.exponentialRampToValueAtTime(35,t+0.20);
  const g1=ctx.createGain();g1.gain.setValueAtTime(0.35,t);g1.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  o1.connect(g1);g1.connect(master);o1.start(t);o1.stop(t+0.25);

  // Sawtooth buzz: 90 → 18 Hz (lowered from 260→45 — deep rumble)
  const o2=ctx.createOscillator();o2.type='sawtooth';
  o2.frequency.setValueAtTime(90,t);
  o2.frequency.exponentialRampToValueAtTime(18,t+0.18);
  const g2=ctx.createGain();g2.gain.setValueAtTime(0.18,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  o2.connect(g2);g2.connect(master);o2.start(t);o2.stop(t+0.22);
}


// ════════════════════════════════════════════════════════════════
//  AMBIENT VOLCANO RUMBLE  — 3D looping low-frequency drone
//  One PannerNode per volcano, positioned at its world location.
//  Starts after AudioContext is created (on VR entry).
// ════════════════════════════════════════════════════════════════
const VOLCANO_POSITIONS=[
  {dir:new THREE.Vector3(-0.55, 0.78, -0.30).normalize(), h:70},
  {dir:new THREE.Vector3( 0.42, 0.86,  0.28).normalize(), h:40},
  {dir:new THREE.Vector3(-0.35, 0.72,  0.59).normalize(), h:55},
  {dir:new THREE.Vector3( 0.70, 0.55,  0.45).normalize(), h:48},
  {dir:new THREE.Vector3(-0.62, 0.50, -0.60).normalize(), h:62},
  {dir:new THREE.Vector3( 0.20, 0.60, -0.77).normalize(), h:35},
  {dir:new THREE.Vector3(-0.80, 0.30,  0.52).normalize(), h:58},
  {dir:new THREE.Vector3( 0.65,-0.40,  0.65).normalize(), h:45},
  {dir:new THREE.Vector3(-0.30, 0.20, -0.93).normalize(), h:72},
  {dir:new THREE.Vector3( 0.35,-0.62,  0.70).normalize(), h:52},
  {dir:new THREE.Vector3(-0.55,-0.60,  0.58).normalize(), h:44},
  {dir:new THREE.Vector3( 0.62,-0.45, -0.65).normalize(), h:60},
  {dir:new THREE.Vector3(-0.22,-0.72, -0.66).normalize(), h:38},
  {dir:new THREE.Vector3( 0.90,-0.18,  0.40).normalize(), h:50},
  {dir:new THREE.Vector3(-0.85,-0.14, -0.50).normalize(), h:66},
];
let volcanoNodes=[];

function startVolcanoAmbience(){
  const ctx=getAudio();if(!ctx)return;
  if(volcanoNodes.length)return;
  VOLCANO_POSITIONS.forEach(v=>{
    const surfR=getPlanetHeight(v.dir);
    const plumePos=v.dir.clone().multiplyScalar(surfR+v.h);
    const pan=ctx.createPanner();
    pan.panningModel='HRTF'; pan.distanceModel='inverse';
    pan.refDistance=18; pan.maxDistance=300; pan.rolloffFactor=1.1;
    setPannerPos(pan,plumePos);
    pan.connect(ctx.destination);

    // Sub-bass rumble oscillator
    const o1=ctx.createOscillator();o1.type='sine';o1.frequency.value=28+Math.random()*8;
    const g1=ctx.createGain();g1.gain.value=0.55;
    o1.connect(g1);g1.connect(pan);

    // Irregular crackle LFO
    const lfo=ctx.createOscillator();lfo.type='sine';
    lfo.frequency.value=0.18+Math.random()*0.12;
    const lfoG=ctx.createGain();lfoG.gain.value=0.22;
    lfo.connect(lfoG);lfoG.connect(g1.gain);

    // Band-pass noise for hiss/steam
    const nb=ctx.createBuffer(1,ctx.sampleRate*4,ctx.sampleRate);
    const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
    const ns=ctx.createBufferSource();ns.buffer=nb;ns.loop=true;
    const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=90;bp.Q.value=0.6;
    const ng=ctx.createGain();ng.gain.value=0.30;
    ns.connect(bp);bp.connect(ng);ng.connect(pan);

    o1.start();lfo.start();ns.start();
    volcanoNodes.push({o1,lfo,ns,pan,g1,ng});
  });
}

function stopVolcanoAmbience(){
  volcanoNodes.forEach(n=>{
    try{n.o1.stop();n.lfo.stop();n.ns.stop();}catch(e){}
    try{n.pan.disconnect();}catch(e){}
  });
  volcanoNodes=[];
}


// ════════════════════════════════════════════════════════════════
//  LANDING DUST  — particle burst when super jump lands
// ════════════════════════════════════════════════════════════════
let dustParticles=[];

function spawnLandingDust(pos){
  const N=60,geo=new THREE.BufferGeometry();
  const arr=new Float32Array(N*3),vels=[];
  for(let i=0;i<N;i++){
    arr[i*3]=pos.x+(Math.random()-.5)*.8;
    arr[i*3+1]=pos.y+.1;
    arr[i*3+2]=pos.z+(Math.random()-.5)*.8;
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*4.5,vy=.5+Math.random()*2.5;
    vels.push(Math.cos(a)*sp, vy, Math.sin(a)*sp);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(arr,3));
  const mat=new THREE.PointsMaterial({
    color:0xc8a020,size:.35,transparent:true,opacity:.85,
    blending:THREE.AdditiveBlending,depthWrite:false
  });
  const pts=new THREE.Points(geo,mat);
  scene.add(pts);
  dustParticles.push({geo,mat,pts,vels,t:0,N});
}

function updateDust(dt){
  const done=[];
  for(const d of dustParticles){
    d.t+=dt;
    const pa=d.geo.attributes.position.array;
    for(let i=0;i<d.N;i++){
      pa[i*3  ]+=d.vels[i*3  ]*dt;
      pa[i*3+1]+=d.vels[i*3+1]*dt; d.vels[i*3+1]-=4*dt; // gravity drag
      pa[i*3+2]+=d.vels[i*3+2]*dt;
    }
    d.geo.attributes.position.needsUpdate=true;
    d.mat.opacity=Math.max(0,.85*(1-d.t/1.2));
    d.mat.size=.35+d.t*.4;
    if(d.t>=1.2)done.push(d);
  }
  for(const d of done){
    scene.remove(d.pts);d.geo.dispose();d.mat.dispose();
    dustParticles=dustParticles.filter(x=>x!==d);
  }
}

//  SCORE LEADERBOARD  — persistent via window.storage API
// ════════════════════════════════════════════════════════════════
const LB_KEY='io_leaderboard';
const LB_MAX=10;

async function saveScore(finalScore,finalWave,finalKills){
  try{
    let lb=[];
    try{ const r=await window.storage.get(LB_KEY);if(r)lb=JSON.parse(r.value); }catch(e){}
    lb.push({score:finalScore,wave:finalWave,kills:finalKills,date:new Date().toLocaleDateString()});
    lb.sort((a,b)=>b.score-a.score);
    lb=lb.slice(0,LB_MAX);
    await window.storage.set(LB_KEY,JSON.stringify(lb));
  }catch(e){}
}

async function loadLeaderboard(){
  try{
    const r=await window.storage.get(LB_KEY);
    return r?JSON.parse(r.value):[];
  }catch(e){return [];}
}

// Draw leaderboard into the game-over wrist HUD
async function drawGameOverHUD(){
  const lb=await loadLeaderboard();
  if(!hudCtx||!hudTexture)return;
  const ctx=hudCtx,W=512,H=256;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='rgba(0,8,18,0.94)';
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(4,4,W-8,H-8,14);ctx.fill();}
  else ctx.fillRect(4,4,W-8,H-8);
  ctx.strokeStyle='rgba(255,30,0,0.45)';ctx.lineWidth=2;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(4,4,W-8,H-8,14);ctx.stroke();}
  else ctx.strokeRect(4,4,W-8,H-8);

  // Title
  ctx.fillStyle='rgba(255,30,0,0.90)';ctx.font='bold 22px monospace';ctx.textAlign='center';
  ctx.fillText('MARINE DOWN',W/2,36);
  ctx.fillStyle='rgba(255,100,50,0.70)';ctx.font='bold 14px monospace';
  ctx.fillText(`SCORE ${score}  ·  KILLS ${kills}  ·  WAVE ${wave}`,W/2,60);
  ctx.fillStyle='rgba(255,80,0,0.40)';ctx.font='11px monospace';
  ctx.fillText('PULL RIGHT TRIGGER TO REDEPLOY',W/2,80);

  // Leaderboard
  ctx.fillStyle='rgba(48,190,255,0.55)';ctx.font='bold 12px monospace';ctx.textAlign='left';
  ctx.fillText('── TOP SCORES ──────────────────',14,104);
  lb.slice(0,6).forEach((e,i)=>{
    const isMe=(e.score===score&&e.wave===wave&&e.kills===kills);
    ctx.fillStyle=isMe?'rgba(255,200,50,0.95)':'rgba(48,190,255,0.75)';
    ctx.font=isMe?'bold 12px monospace':'12px monospace';
    ctx.textAlign='left';  ctx.fillText(`${i+1}. ${e.score.toLocaleString()}`,14,122+i*22);
    ctx.textAlign='right'; ctx.fillText(`W${e.wave} K${e.kills}  ${e.date}`,W-14,122+i*22);
  });
  hudTexture.needsUpdate=true;
}

// ── Equip weapon: swap geometry on rightGrip weaponGroup ─────────
function equipWeapon(type){
  currentWeapon=type;
  currentWeaponIndex=WEAPONS_ORDER.indexOf(type);
  if(type!=='saber'){saberTip=null;tipGlowMesh=null;tipGlowMat=null;tipHaloMesh=null;tipHaloMat=null;}
  const def=WEAPONS[type];
  if(weaponAmmoMap[type]===undefined) weaponAmmoMap[type]=def.ammo;
  // Partial refill on pickup if already owned
  else if(def.ammo!==Infinity) weaponAmmoMap[type]=Math.min(def.ammo, (weaponAmmoMap[type]||0)+def.ammo);

  if(!weaponGroup)return;
  // Clear current geometry
  while(weaponGroup.children.length) weaponGroup.remove(weaponGroup.children[0]);
  energyCells=[];

  if(type==='laser'){
    // Rebuild the original laser rifle
    buildWeaponModel();
    // Re-attach to rightGrip
    if(rightGrip){ rightGrip.remove(weaponGroup); rightGrip.add(weaponGroup); }
  } else {
    buildWeaponGeometry(type, weaponGroup);
    // Re-add muzzle flash nodes
    weaponGroup.add(muzzleLight);
    weaponGroup.add(muzzleSphere);
    weaponGroup.scale.setScalar(1.5);
    weaponGroup.position.set(.01,.108,-.135);
    weaponGroup.rotation.x=WEAPON_PITCH;
  }
  drawHUD();
}

// ── Pickup spawn & management ─────────────────────────────────────
const PICKUP_TYPES=['shotgun','grenade','saber','rail','rocket','dual','flame','cannon'];
// Ordered weapon list for X-button cycling (laser is index 0) — 9 weapons total
const WEAPONS_ORDER=['laser','shotgun','grenade','saber','rail','rocket','dual','flame','cannon'];
let currentWeaponIndex=0;

function buildPickupMesh(type){
  const g=new THREE.Group();
  buildWeaponGeometry(type, g);
  g.scale.setScalar(1.1); // doubled from 0.55
  // Ground ring (weapon colour)
  const ring=new THREE.Mesh(new THREE.TorusGeometry(.30,.025,6,32),
    new THREE.MeshBasicMaterial({color:WEAPONS[type].pickupCol,transparent:true,opacity:.5,blending:THREE.AdditiveBlending,depthWrite:false}));
  ring.rotation.x=Math.PI/2; ring.position.y=-.45; g.add(ring);
  // Green inner glow sphere
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.55,10,8),
    new THREE.MeshBasicMaterial({color:0x00ff44,transparent:true,opacity:.13,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide})));
  // Green outer halo
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.80,8,6),
    new THREE.MeshBasicMaterial({color:0x00cc33,transparent:true,opacity:.05,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide})));
  // Green point light tinting the ground beneath
  const pl=new THREE.PointLight(0x00ff44,2.5,8);g.add(pl);
  // Vertical beam pillar rising upward
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,4,6),
    new THREE.MeshBasicMaterial({color:0x00ff44,transparent:true,opacity:.18,blending:THREE.AdditiveBlending,depthWrite:false})));
  return g;
}

// spawnPickup now takes a normalised THREE.Vector3 direction on the sphere.
// Legacy callers that pass (type, x, z) are handled below.
function spawnPickup(type, dirOrX, zOrUndef){
  let n;
  if(dirOrX instanceof THREE.Vector3){
    n=dirOrX.clone().normalize();
  } else {
    // Legacy flat-coord path: treat x,z as arbitrary offset angles
    const x=dirOrX, z=zOrUndef||0;
    const len=Math.sqrt(x*x+z*z)||1;
    n=new THREE.Vector3(x/len*.7, Math.sqrt(Math.max(0,1-(x/len*.7)**2-(z/len*.7)**2)), z/len*.7).normalize();
  }
  const surfR=getPlanetHeight(n);
  const mesh=buildPickupMesh(type);
  mesh.position.copy(n).multiplyScalar(surfR+1.2);
  // Orient pickup so its local +Y points away from planet centre
  const q=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),n);
  mesh.quaternion.copy(q);
  scene.add(mesh);
  pickups.push({type, mesh, age:0, surfNorm:n.clone()});
}

function spawnInitialPickups(){
  // Scatter 9 pickups in a ring around the north pole (player start).
  // Each at a polar angle of 12°–25° so they're 60–120 units away.
  PICKUP_TYPES.forEach((t,i)=>{
    const phi   = (i/PICKUP_TYPES.length)*Math.PI*2;   // evenly spaced in azimuth
    const theta = 0.15+Math.random()*0.20;             // 8°–23° from north pole
    const dir=new THREE.Vector3(
      Math.sin(theta)*Math.cos(phi),
      Math.cos(theta),
      Math.sin(theta)*Math.sin(phi)
    ).normalize();
    spawnPickup(t, dir);
  });
}

function updatePickups(dt){
  const t=clock.elapsedTime;
  const camPos=new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
  const rem=[];
  for(const p of pickups){
    p.age+=dt;
    // Spin around radial axis (surface normal)
    p.mesh.rotateOnAxis(p.surfNorm||new THREE.Vector3(0,1,0), dt*(Math.PI/2));
    // Radial bob — move slightly in/out along surface normal
    const bob=Math.sin(t*2+p.age)*0.04;
    const baseR=getPlanetHeight(p.surfNorm||p.mesh.position.clone().normalize())+1.2;
    p.mesh.position.copy(p.surfNorm||p.mesh.position.clone().normalize()).multiplyScalar(baseR+bob);
    // Proximity pickup
    if(camPos.distanceTo(p.mesh.position)<2.5){
      equipWeapon(p.type);
      playPickupSound(p.type);
      haptic('right',.8,120);
      scene.remove(p.mesh);
      rem.push(p);
      // Respawn at new random near-pole location after 25 s
      const phi2=Math.random()*Math.PI*2, theta2=0.1+Math.random()*0.4;
      const respawnDir=new THREE.Vector3(
        Math.sin(theta2)*Math.cos(phi2), Math.cos(theta2), Math.sin(theta2)*Math.sin(phi2)
      ).normalize();
      setTimeout(()=>{ if(gameActive)spawnPickup(p.type, respawnDir); },25000);
    }
  }
  pickups=pickups.filter(x=>!rem.includes(x));
}

// ── Pickup sound — quick rising tone ─────────────────────────────
function playPickupSound(type){
  const ctx=getAudio(); if(!ctx) return;
  const t=ctx.currentTime;
  const o=ctx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(600,t+.18);
  const g=ctx.createGain(); g.gain.setValueAtTime(.4,t); g.gain.exponentialRampToValueAtTime(.001,t+.22);
  o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+.25);
}

// ── Rail fire sound — electric crack ────────────────────────────
function playRailSound(){

  const t=ctx.currentTime;
  const nb=ctx.createBuffer(1,ctx.sampleRate*.1,ctx.sampleRate);

  const ns=ctx.createBufferSource(); ns.buffer=nb;

  const g=ctx.createGain(); g.gain.setValueAtTime(.6,t); g.gain.exponentialRampToValueAtTime(.001,t+.1);
  ns.connect(hp); hp.connect(g); g.connect(ctx.destination); ns.start(t); ns.stop(t+.12);
  const o=ctx.createOscillator(); o.type='square';
  o.frequency.setValueAtTime(800,t); o.frequency.exponentialRampToValueAtTime(80,t+.08);
  const g2=ctx.createGain(); g2.gain.setValueAtTime(.4,t); g2.gain.exponentialRampToValueAtTime(.001,t+.1);
  o.connect(g2); g2.connect(ctx.destination); o.start(t); o.stop(t+.1);

// ── Shotgun billboard pellets ─────────────────────────────────────────
// Each pellet is a PlaneGeometry (2 triangles) that always faces the camera.
// The plane's Y axis is aligned with the travel direction so the pellet
// looks elongated along its path — a velocity-stretched billboard.
let shotgunBolts=[];

function spawnShotgunPellet(startPos, dir){
  const col=WEAPONS.shotgun.col;
  // Outer glow plane
  const gMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.7,
    blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
  const gMesh=new THREE.Mesh(new THREE.PlaneGeometry(.18,.45),gMat);
  // Inner bright core (half size, fully opaque)
  const cMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.9,
    blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
  const cMesh=new THREE.Mesh(new THREE.PlaneGeometry(.07,.18),cMat);
  const grp=new THREE.Group();
  grp.add(gMesh,cMesh);
  grp.position.copy(startPos);
  scene.add(grp);
  shotgunBolts.push({grp,gMat,cMat,dir:dir.clone().normalize(),age:0,maxAge:.7,dmg:8});
}

function updateShotgunBolts(dt){
  const camPos=new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
  const camFwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  const done=[];
  for(const b of shotgunBolts){
    b.age+=dt;
    b.grp.position.addScaledVector(b.dir,55*dt);

    // Velocity-stretched billboard:
    // 1. Face camera (normal = camFwd)
    // 2. Rotate around that normal so the plane's +Y aligns with travel direction
    b.grp.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),camFwd);
    // Project travel dir onto camera plane, use it as the plane's up
    const travelInPlane=b.dir.clone()
      .addScaledVector(camFwd,-b.dir.dot(camFwd)).normalize();
    if(travelInPlane.lengthSq()>.001){
      const planeUp=new THREE.Vector3(0,1,0).applyQuaternion(b.grp.quaternion);
      const angle=Math.atan2(
        travelInPlane.dot(new THREE.Vector3().crossVectors(camFwd,planeUp).normalize()),
        travelInPlane.dot(planeUp));
      b.grp.rotateOnWorldAxis(camFwd,angle);
    }

    // Fade over lifetime
    const life=Math.max(0,1-b.age/b.maxAge);
    b.gMat.opacity=life*.7; b.cMat.opacity=life*.9;

    // Terrain and age cull
    const bRad=b.grp.position.length();
    const bSurf=getPlanetHeight(b.grp.position.clone().normalize());
    if(b.age>b.maxAge||bRad<bSurf){done.push(b);continue;}

    // Enemy hit
    for(const e of enemies){
      if(b.grp.position.distanceTo(e.position)<2.5){
        e.userData.hp-=b.dmg;
        triggerKillFlash(WEAPONS.shotgun.col);
        done.push(b); break;
      }
    }
  }
  done.forEach(b=>{scene.remove(b.grp);shotgunBolts=shotgunBolts.filter(x=>x!==b);});
}

// ── Grenade & rocket & cannon update ─────────────────────────────
// ════════════════════════════════════════════════════════════════
//  SWORD SLASH WAVES  — velocity-driven crescent energy projectiles
//
//  Research sources:
// ── VOLT SABER: SLASH RIBBON SYSTEM ──────────────────────────────────────────
// Tracks blade TIP world-position every ~16 ms. When tip speed exceeds
// SLASH_SPEED_THRESHOLD the ribbon becomes visible, showing the last 0.5 s of
// tip movement as a tapered electric-yellow arc in world space.
// Any enemy whose centre passes within 2 m of any ribbon point takes 100% damage.
// No projectile is spawned — the ribbon IS the slash.

// ── VOLT SABER: SLASH RIBBON + DETACH SYSTEM ─────────────────────────────
// 1. Blade tip positions are recorded every ~16 ms into _slashPts.
// 2. The current ribbon is visible on the sword while the blade moves.
// 3. Every 0.5 s the current ribbon DETACHES: its points are snapshotted,
//    the snapshot is given a forward velocity, and it flies away as an
//    independent mesh. _slashPts is then cleared so a fresh ribbon builds.
// 4. Any enemy whose centre comes within 2 m of a launched ribbon point
//    takes 100% damage (instant kill).

// ── Shared geometry builder (used by both live ribbon and launched ribbons)
// pts: THREE.Vector3[] oldest→newest. camFwd: direction used for ribbon width.
function buildRibbonGeo(pts, camFwd){
  const n=pts.length;
  if(n<2) return null;
  const verts=new Float32Array(n*6);
  const idxArr=[];
  const W=0.22; // max half-width in world units
  for(let i=0;i<n;i++){
    const p=pts[i];
    let dir;
    if(i<n-1) dir=new THREE.Vector3().subVectors(pts[i+1],p).normalize();
    else       dir=new THREE.Vector3().subVectors(p,pts[i-1]).normalize();
    let perp=new THREE.Vector3().crossVectors(dir,camFwd).normalize();
    if(perp.lengthSq()<0.01) perp=new THREE.Vector3().crossVectors(dir,new THREE.Vector3(0,1,0)).normalize();
    if(perp.lengthSq()<0.01) perp.set(1,0,0);
    const t=i/Math.max(1,n-1);
    const w=W*Math.sqrt(t); // taper: tail=0, tip=full
    const b=i*6;
    verts[b  ]=p.x-perp.x*w; verts[b+1]=p.y-perp.y*w; verts[b+2]=p.z-perp.z*w;
    verts[b+3]=p.x+perp.x*w; verts[b+4]=p.y+perp.y*w; verts[b+5]=p.z+perp.z*w;
  }
  for(let i=0;i<n-1;i++){
    const a=i*2,b=i*2+1,c=i*2+2,d=i*2+3;
    idxArr.push(a,b,c,b,d,c);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(verts,3));
  geo.setIndex(idxArr);
  return geo;
}

// ── Detach current ribbon and launch it forward ──────────────────────────
function launchSlashRibbon(pts, camFwd){
  if(pts.length<3) return;
  const mat=new THREE.MeshBasicMaterial({color:0xffee00,transparent:true,opacity:0.92,
    blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
  const geo=buildRibbonGeo(pts,camFwd);
  if(!geo){mat.dispose();return;}
  const mesh=new THREE.Mesh(geo,mat);
  scene.add(mesh);
  // Velocity: camera forward at the moment of detach, speed 50 units/s
  const vel=camFwd.clone().multiplyScalar(50);
  // Store camFwd snapshot so ribbon shape stays consistent while traveling
  launchedRibbons.push({pts:pts,vel:vel,fwd:camFwd.clone(),age:0,maxAge:1.4,mesh:mesh,mat:mat});
}

// ── Update all in-flight launched ribbons ────────────────────────────────
function updateLaunchedRibbons(dt){
  const done=[];
  for(let ri=0;ri<launchedRibbons.length;ri++){
    const r=launchedRibbons[ri];
    r.age+=dt;
    const life=Math.max(0,1-r.age/r.maxAge);
    if(life<0.01){done.push(ri);continue;}
    // Translate every point by velocity
    for(let pi=0;pi<r.pts.length;pi++) r.pts[pi].addScaledVector(r.vel,dt);
    // Rebuild geometry at new positions
    r.mat.opacity=life*0.90;
    const oldGeo=r.mesh.geometry;
    const geo=buildRibbonGeo(r.pts,r.fwd);
    if(geo){r.mesh.geometry=geo; oldGeo.dispose();}
    // 100% damage on enemy contact
    for(let pi=0;pi<r.pts.length;pi++){
      for(let ei=0;ei<enemies.length;ei++){
        const e=enemies[ei];
        if(e.userData.hp>0&&e.position.distanceTo(r.pts[pi])<2.0){
          e.userData.hp=0; triggerKillFlash(0xffee00);
        }
      }
    }
  }
  // Remove done (iterate backwards to keep indices valid)
  for(let i=done.length-1;i>=0;i--){
    const r=launchedRibbons[done[i]];
    scene.remove(r.mesh); r.mesh.geometry.dispose(); r.mat.dispose();
    launchedRibbons.splice(done[i],1);
  }
}

// ── Per-frame: track tip, drive glow, update live ribbon, fire detach ─────
function updateSlashDetection(dt){
  _slashActiveDur=Math.max(0,_slashActiveDur-dt);
  _detachTimer   =Math.max(0,_detachTimer-dt);

  if(currentWeapon!=='saber'||!rightGrip||!gameActive){
    gripPosInitialised=false;
    if(tipGlowMat) tipGlowMat.opacity=Math.max(0,(tipGlowMat.opacity||0)-dt*4);
    if(tipHaloMat) tipHaloMat.opacity=Math.max(0,(tipHaloMat.opacity||0)-dt*4);
    updateSlashRibbon(0);
    return;
  }
  slashCooldown   =Math.max(0,slashCooldown-dt);
  _slashSampleTimer=Math.max(0,_slashSampleTimer-dt);

  // Track blade tip in dolly-local space for accurate velocity measurement
  const trackNode=saberTip||rightGrip;
  const trackWorld=new THREE.Vector3();
  trackNode.getWorldPosition(trackWorld);
  const trackLocal=dolly.worldToLocal(trackWorld.clone());
  _currGripPos.copy(trackLocal);
  if(!gripPosInitialised){_prevGripPos.copy(_currGripPos);gripPosInitialised=true;return;}

  const vx=(_currGripPos.x-_prevGripPos.x)/dt;
  const vy=(_currGripPos.y-_prevGripPos.y)/dt;
  const vz=(_currGripPos.z-_prevGripPos.z)/dt;
  const speed=Math.sqrt(vx*vx+vy*vy+vz*vz);

  // Record tip position when blade is moving (any perceptible movement)
  if(_slashSampleTimer<=0&&speed>0.5){
    _slashSampleTimer=0.016;
    _slashPts.push(trackWorld.clone());
    if(_slashPts.length>SLASH_HISTORY_SAMPLES) _slashPts.shift();
  }

  // Drive tip charge glow
  const charge=Math.min(1,speed/SLASH_SPEED_THRESHOLD);
  if(tipGlowMat)  tipGlowMat.opacity =charge*charge*0.95;
  if(tipHaloMat)  tipHaloMat.opacity =charge*0.55;
  if(tipGlowMesh) tipGlowMesh.scale.setScalar(1+charge*1.8);
  if(tipHaloMesh) tipHaloMesh.scale.setScalar(1+charge*1.2);

  if(speed>SLASH_SPEED_THRESHOLD){
    _slashActiveDur=SLASH_WINDOW;
    if(slashCooldown<=0){
      slashCooldown=SLASH_COOLDOWN;
      if(tipGlowMat) tipGlowMat.opacity=1.0;
      if(tipHaloMat) tipHaloMat.opacity=0.85;
      playSwingSound();
      haptic('right',0.7,35);
      spawnSaberTrail();
    }
  }

  // ── Every 0.5 s: detach current ribbon and fire it forward ───────────
  if(_detachTimer<=0){
    _detachTimer=0.5;
    if(_slashPts.length>=3){
      const camFwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
      // Clone points so launched ribbon owns its own copy
      const snapshot=[];
      for(let i=0;i<_slashPts.length;i++) snapshot.push(_slashPts[i].clone());
      launchSlashRibbon(snapshot,camFwd);
      _slashPts=[]; // start fresh ribbon on the sword
    }
  }

  updateSlashRibbon(_slashActiveDur/SLASH_WINDOW);
  _prevGripPos.copy(_currGripPos);
}

// Live ribbon still attached to the sword (fades when not swinging fast)
function updateSlashRibbon(fade){
  if(!_slashMat){
    _slashMat=new THREE.MeshBasicMaterial({color:0xffee00,transparent:true,opacity:0,
      blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
    _slashMesh=new THREE.Mesh(new THREE.BufferGeometry(),_slashMat);
    scene.add(_slashMesh);
  }
  if(fade<0.02||_slashPts.length<2){_slashMesh.visible=false;return;}
  _slashMat.opacity=fade*0.92;
  const camFwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  const oldGeo=_slashMesh.geometry;
  const geo=buildRibbonGeo(_slashPts,camFwd);
  if(geo){_slashMesh.geometry=geo; oldGeo.dispose();}
  _slashMesh.visible=true;
  // Live ribbon also damages enemies on contact
  for(let pi=0;pi<_slashPts.length;pi++){
    for(const e of enemies){
      if(e.userData.hp>0&&e.position.distanceTo(_slashPts[pi])<2.0){
        e.userData.hp=0; triggerKillFlash(0xffee00);
      }
    }
  }
}


function updateProjectiles(dt){
  // Grenades — gravity arc, explode on terrain
  const gDone=[];
  for(const g of grenadeProjs){
    g.age+=dt;
    // Gravity toward planet center (radially inward)
    const gDir=g.mesh.position.clone().normalize().negate();
    g.vel.addScaledVector(gDir,9.8*dt);
    g.mesh.position.addScaledVector(g.vel,dt);
    g.mesh.rotation.x+=dt*8;
    // Mid-flight enemy collision — detonate immediately on direct hit
    let hitEnemy=false;
    for(const e of enemies){
      if(g.mesh.position.distanceTo(e.position)<2.2){hitEnemy=true;break;}
    }
    if(hitEnemy||g.mesh.position.length()<=getPlanetHeight(g.mesh.position.clone().normalize())||g.age>5){
      const pos=g.mesh.position.clone();
      for(const e of enemies){if(e.position.distanceTo(pos)<12)e.userData.hp-=18;}
      killExplosion(pos); playExplosionSound(pos); spawnCrater(pos);
      gDone.push(g);
    }
  }
  gDone.forEach(g=>{scene.remove(g.mesh);grenadeProjs=grenadeProjs.filter(x=>x!==g);});

  // Rockets — home toward nearest enemy, area damage on hit
  const rDone=[];
  for(const r of rocketProjs){
    r.age+=dt;
    let nearest=null,nearDist=Infinity;
    for(const e of enemies){const d=r.grp.position.distanceTo(e.position);if(d<nearDist){nearDist=d;nearest=e;}}
    if(nearest){
      const toE=new THREE.Vector3().subVectors(nearest.position,r.grp.position).normalize();
      r.vel.lerp(toE.multiplyScalar(18),dt*2.2); r.vel.setLength(18);
    }
    r.grp.position.addScaledVector(r.vel.clone().normalize(),18*dt);
    if(r.vel.lengthSq()>.01){r.grp.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,-1),r.vel.clone().normalize());}
    let hit=false;
    for(const e of enemies){
      if(r.grp.position.distanceTo(e.position)<2.5){
        const pos=r.grp.position.clone();
        for(const e2 of enemies){if(e2.position.distanceTo(pos)<10)e2.userData.hp-=25;}
        killExplosion(pos); playExplosionSound(pos); hit=true; break;
      }
    }
    if(hit||r.grp.position.length()<getPlanetHeight(r.grp.position.clone().normalize())||r.age>7){
      if(!hit)killExplosion(r.grp.position.clone());
      rDone.push(r);
    }
  }
  rDone.forEach(r=>{scene.remove(r.grp);rocketProjs=rocketProjs.filter(x=>x!==r);});

  // Cannon balls — slow massive, area destroy on hit
  const cDone=[];
  for(const c of cannonProjs){
    c.age+=dt;
    c.mesh.position.addScaledVector(c.vel,dt);
    c.mesh.rotation.x+=dt*3;
    let hit=false;
    for(const e of enemies){
      if(c.mesh.position.distanceTo(e.position)<3){
        const pos=c.mesh.position.clone();
        for(const e2 of enemies){if(e2.position.distanceTo(pos)<14)e2.userData.hp-=99;}
        killExplosion(pos); playExplosionSound(pos); spawnCrater(pos);
        // Second bigger explosion ring for cannon drama
        setTimeout(()=>killExplosion(pos.clone().add(new THREE.Vector3(Math.random()*4-2,0,Math.random()*4-2))),120);
        hit=true; break;
      }
    }
    if(hit||c.mesh.position.length()<getPlanetHeight(c.mesh.position.clone().normalize())||c.age>8){
      if(!hit)killExplosion(c.mesh.position.clone());
      cDone.push(c);
    }
  }
  cDone.forEach(c=>{scene.remove(c.mesh);cannonProjs=cannonProjs.filter(x=>x!==c);});
}

//  ROCK & VOLCANO LOD UPDATES
// ════════════════════════════════════════════════════════════════

// Use dolly XZ as the distance reference — camera always sits above dolly.
// Both rocks and volcanoes are static so we only need dolly.position.
const _lodRef=new THREE.Vector3();

function updateRockLODs(){
  _lodRef.copy(dolly.position);
  for(const rk of rockGroups){
    const wp=rk.grp.position;
    const dist=_lodRef.distanceTo(wp);
    const lod=dist<30?0:dist<70?1:2;
    if(lod===rk.lastLOD)continue;
    rk.lastLOD=lod;
    // LOD2 = both meshes invisible (rock sub-pixel at that range)
    rk.meshes[0].visible=(lod===0);
    rk.meshes[1].visible=(lod===1);
    // group itself hidden at LOD2
    rk.grp.visible=(lod<2);
  }
}

function updateVolcanoLODs(){
  _lodRef.set(dolly.position.x, dolly.position.y, dolly.position.z);
  for(const vl of volcanoLODs){
    const wp=vl.meshes[0].position;
    const dist=_lodRef.distanceTo(wp);
    const lod=dist<100?0:dist<200?1:2;
    if(lod===vl.lastLOD)continue;
    vl.lastLOD=lod;
    vl.meshes.forEach((m,i)=>{ m.visible=(i===lod); });
  }
}

  // Background
  c.clearRect(0,0,W,H);
  c.fillStyle='rgba(12,0,0,0.94)';
  if(c.roundRect){ c.beginPath();c.roundRect(8,8,W-16,H-16,20);c.fill(); }
  else c.fillRect(8,8,W-16,H-16);

  // Crimson glow border
  c.strokeStyle='rgba(220,20,20,0.70)'; c.lineWidth=2.5;
  if(c.roundRect){ c.beginPath();c.roundRect(8,8,W-16,H-16,20);c.stroke(); }
  else c.strokeRect(8,8,W-16,H-16);

  c.strokeStyle='rgba(180,0,0,0.25)'; c.lineWidth=1;

  c.strokeStyle='rgba(200,20,20,0.35)'; c.lineWidth=1;

  // Stats row
  c.font='bold 22px monospace'; c.fillStyle='rgba(255,140,140,0.80)';

  c.fillText(`WAVE  ${wave}`, W/2+20, 178);

  // Instruction
  c.font='14px monospace'; c.fillStyle='rgba(220,60,60,0.50)';

  const tex=new THREE.CanvasTexture(cv);
  const mat=new THREE.MeshBasicMaterial({
    map:tex, transparent:true, opacity:0,
    side:THREE.DoubleSide, depthWrite:false
  });
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(4.0,2.0), mat);
  mesh.userData={age:0, phase:'in'};  // phases: 'in' → 'hold' (stays, no auto-fade)

  const fwd=new THREE.Vector3();
  camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize();
  const camPos=new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
  mesh.position.copy(camPos).addScaledVector(fwd, 7);
  mesh.position.y=camPos.y+0.3;
  mesh.lookAt(camPos);

  scene.add(mesh);

}

function updateGameOverBanner(dt){
  if(!gameOverBillboard) return;
  const ud=gameOverBillboard.userData;
  ud.age+=dt;
  if(ud.phase==='in'){
    gameOverBillboard.material.opacity=Math.min(1, ud.age/0.6);
    if(ud.age>=0.6){ ud.phase='hold'; }
  }
  // 'hold' phase: stays at full opacity until removed by restartGame
}

function clearGameOverBanner(){
  if(!gameOverBillboard) return;
  scene.remove(gameOverBillboard);
  gameOverBillboard.material.map.dispose();
  gameOverBillboard.material.dispose();
  gameOverBillboard.geometry.dispose();
  gameOverBillboard=null;
}

function showWaveBanner(waveNum){

  if(waveBillboard){ scene.remove(waveBillboard); waveBillboard=null; }

  // ── Canvas texture ──────────────────────────────────────────

  ctx.strokeStyle='rgba(255,120,0,0.55)'; ctx.lineWidth=2;
  if(ctx.roundRect){ ctx.beginPath();ctx.roundRect(8,8,W-16,H-16,18);ctx.stroke(); }
  else { ctx.strokeRect(8,8,W-16,H-16); }

  // "WAVE" label
  ctx.fillStyle='rgba(255,160,50,0.60)';
  ctx.font='bold 28px monospace';
  ctx.textAlign='center';
  ctx.fillText('WAVE', W/2, 58);

  // Wave number — large, glowing orange
  ctx.fillStyle='#ff6600';
  ctx.shadowColor='#ff4400'; ctx.shadowBlur=28;
  ctx.font='bold 96px monospace';
  ctx.fillText(waveNum, W/2, 148);

  // Scanline accent under the number
  ctx.strokeStyle='rgba(255,102,0,0.30)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(60,162); ctx.lineTo(W-60,162); ctx.stroke();

  const tex=new THREE.CanvasTexture(cv);
  const mat=new THREE.MeshBasicMaterial({
    map:tex, transparent:true, opacity:0,
    side:THREE.DoubleSide, depthWrite:false
  });
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(3.2,1.2), mat);
  mesh.userData={ age:0, phase:'in' };  // phases: 'in' | 'hold' | 'out'

  // Position 8 m ahead of camera at eye level, always facing player
  const fwd=new THREE.Vector3();
  camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize();
  const camPos=new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
  mesh.position.copy(camPos).addScaledVector(fwd, 8);
  mesh.position.y=camPos.y+0.2; // slight upward offset from eye centre
