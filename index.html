function updateWaveBanner(dt){
  if(!waveBillboard) return;
  const ud=waveBillboard.userData;
  ud.age+=dt;

  const FADE_IN=0.5, HOLD=2.2, FADE_OUT=1.0;

  if(ud.phase==='in'){
    waveBillboard.material.opacity=Math.min(1, ud.age/FADE_IN);
    if(ud.age>=FADE_IN){ ud.phase='hold'; ud.age=0; }
  } else if(ud.phase==='hold'){
    waveBillboard.material.opacity=1;
    if(ud.age>=HOLD){ ud.phase='out'; ud.age=0; }
  } else {
    waveBillboard.material.opacity=Math.max(0, 1-ud.age/FADE_OUT);
    if(ud.age>=FADE_OUT){
      // Dispose and remove
      waveBillboard.material.map.dispose();
      waveBillboard.material.dispose();
      waveBillboard.geometry.dispose();
      scene.remove(waveBillboard);
      waveBillboard=null;
    }
  }
}


// ════════════════════════════════════════════════════════════════
//  SUPER BLAST SYSTEM
//  Hold right trigger 10 s → screen-clearing circular shockwave
// ════════════════════════════════════════════════════════════════

// ── Charge audio — oscillator sweeps 60 → 1200 Hz over 10 s ──
function startCharge(){
  const ctx=getAudio(); if(!ctx) return;
  stopCharge(); // clear any leftover nodes
  chargeOsc=ctx.createOscillator(); chargeOsc.type='sawtooth';
  chargeOsc.frequency.setValueAtTime(40, ctx.currentTime);
  chargeOsc.frequency.linearRampToValueAtTime(320, ctx.currentTime+CHARGE_MAX);
  chargeGain=ctx.createGain();
  chargeGain.gain.setValueAtTime(0.0, ctx.currentTime);
  chargeGain.gain.linearRampToValueAtTime(0.55, ctx.currentTime+0.3);
  chargeOsc.connect(chargeGain); chargeGain.connect(ctx.destination);
  chargeOsc.start();
}

function stopCharge(){
  if(chargeGain){ try{ chargeGain.disconnect(); }catch(e){} chargeGain=null; }
  if(chargeOsc){  try{ chargeOsc.stop(); }catch(e){} chargeOsc=null; }
}

// ── Discharge boom sound ──────────────────────────────────────
function playBlastSound(){
  const ctx=getAudio(); if(!ctx) return;
  const t=ctx.currentTime;
  // Massive sub-bass impact
  const o1=ctx.createOscillator(); o1.type='sine';
  o1.frequency.setValueAtTime(55,t); o1.frequency.exponentialRampToValueAtTime(14,t+1.8);
  const g1=ctx.createGain(); g1.gain.setValueAtTime(1.4,t); g1.gain.exponentialRampToValueAtTime(0.001,t+2.0);
  o1.connect(g1); g1.connect(ctx.destination); o1.start(t); o1.stop(t+2.1);
  // Mid crunch
  const o2=ctx.createOscillator(); o2.type='square';
  o2.frequency.setValueAtTime(180,t); o2.frequency.exponentialRampToValueAtTime(22,t+1.0);
  const g2=ctx.createGain(); g2.gain.setValueAtTime(0.9,t); g2.gain.exponentialRampToValueAtTime(0.001,t+1.2);
  o2.connect(g2); g2.connect(ctx.destination); o2.start(t); o2.stop(t+1.3);
  // Wide noise rumble
  const nb=ctx.createBuffer(1,ctx.sampleRate*2.5,ctx.sampleRate);
  const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource(); ns.buffer=nb;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=400;
  const ng=ctx.createGain(); ng.gain.setValueAtTime(0.8,t); ng.gain.exponentialRampToValueAtTime(0.001,t+2.5);
  ns.connect(lp); lp.connect(ng); ng.connect(ctx.destination); ns.start(t); ns.stop(t+2.6);
}

// ── Visual shockwave — expanding spherical shells ──────────────
function spawnShockwave(origin){
  // 3 staggered spherical shells for a layered outward blast
  [0, 0.12, 0.26].forEach((delay,i)=>{
    const mat=new THREE.MeshBasicMaterial({
      color:i===0?0x88eeff:i===1?0x44aaff:0x0066cc,
      transparent:true, opacity:0.7,
      side:THREE.DoubleSide, depthWrite:false,
      blending:THREE.AdditiveBlending,
      wireframe:false
    });
    // SphereGeometry starts small; scale drives the expansion in updateShockwaves
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(1,16,12), mat);
    mesh.position.copy(origin);
    scene.add(mesh);
    shockwaves.push({mesh, mat, age:-delay, maxAge:2.2, maxR:180, isSphere:true});
  });

  // Central flash sphere
  const fm=new THREE.Mesh(
    new THREE.SphereGeometry(1,12,8),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:1,blending:THREE.AdditiveBlending,depthWrite:false})
  );
  fm.position.copy(origin); scene.add(fm);
  shockwaves.push({mesh:fm, mat:fm.material, age:0, maxAge:0.35, maxR:0, isFlash:true});

  // Point light burst
  const bl=new THREE.PointLight(0x44ddff,25,60); bl.position.copy(origin); scene.add(bl);
  shockwaves.push({mesh:bl, mat:null, age:0, maxAge:0.5, maxR:0, isLight:true, light:bl});
}

function updateShockwaves(dt){
  const done=[];
  for(const sw of shockwaves){
    sw.age+=dt;
    if(sw.age<0) continue;
    const p=Math.min(1, sw.age/sw.maxAge);

    if(sw.isFlash){
      sw.mat.opacity=1-p;
      sw.mesh.scale.setScalar(1+p*6);
    } else if(sw.isLight){
      sw.light.intensity=25*(1-p);
    } else if(sw.isSphere){
      // Expand sphere shell outward, thin out opacity as it grows
      const r=0.5+p*sw.maxR;
      sw.mesh.scale.setScalar(r);
      sw.mat.opacity=(1-p)*0.65;
    }

    if(sw.age>=sw.maxAge) done.push(sw);
  }
  for(const sw of done){
    scene.remove(sw.mesh);
    if(sw.mat) sw.mat.dispose();
    if(sw.mesh.geometry) sw.mesh.geometry.dispose();
    shockwaves=shockwaves.filter(x=>x!==sw);
  }
}

// ── Kill all enemies in shockwave radius ──────────────────────
function shockwaveKillAll(origin){
  const dead=[...enemies];
  for(const e of dead){
    killExplosion(e.position.clone());
    playExplosionSound(e.position.clone());
    scene.remove(e);
    kills++; score+=200*wave;
  }
  enemies=[];
  if(dead.length>0) drawHUD();
  haptic('right',1.0,600); haptic('left',1.0,500);
}

// ── Fire the super blast ──────────────────────────────────────
function fireBlast(){
  stopCharge();
  const origin=new THREE.Vector3(); dolly.getWorldPosition(origin);
  spawnShockwave(origin);
  shockwaveKillAll(origin);
  playBlastSound();
  chargeTime=0; triggerHeld=false;
  fireCooldown=1.5;
}

// ── Update charge each frame — auto-fire at CHARGE_MAX s ─────────
function updateCharge(dt){
  // Keep charge FX group positioned at the current weapon's tip every frame
  if(chargeFXGroup&&rightGrip){
    const tip=getWeaponTipOffset();
    chargeFXGroup.position.copy(tip);
  }
  // Flamethrower and Dual Ion Gun: triggerHeld drives continuous fire, no charge mechanic
  if(currentWeapon==='flame'||currentWeapon==='dual'){
    if(chargeSphere) chargeSphere.material.opacity=0;
    if(chargeBoids)  chargeBoids.material.opacity=0;
    if(triggerHeld&&gameActive){
      flameCooldown-=dt;
      if(flameCooldown<=0){
        flameCooldown=WEAPONS[currentWeapon].rate; // 0.12 for flame, 0.25 for dual
        fireWeapon();
      }
    }
    return;
  }
  if(!triggerHeld||!gameActive){
    // Hide charge VFX when not charging
    if(chargeSphere) chargeSphere.material.opacity=0;
    if(chargeBoids)  chargeBoids.material.opacity=0;
    return;
  }
  chargeTime+=dt;
  const t=Math.min(chargeTime/CHARGE_MAX, 1.0); // 0→1

  // ── Energy sphere: grows from invisible pinpoint to ~6 cm radius ──
  if(chargeSphere){
    const r=0.001+t*0.12;                    // 0.001 → 0.121 — doubled from 0.06
    chargeSphere.scale.setScalar(r);
    // Flicker faster near full charge
    const flicker=0.7+0.3*Math.sin(Date.now()*0.006*(1+t*8));
    chargeSphere.material.opacity=(0.3+t*0.7)*flicker;
    // Shift colour cyan → white as charge fills
    chargeSphere.material.color.setHSL(0.55*(1-t), 1.0, 0.5+t*0.5);
  }

  // ── Boid particles: orbit + flock toward sphere, grow in number/size ──
  if(chargeBoids&&chargeBoidData.length){
    const pa=chargeBoids.geometry.attributes.position.array;
    const orbitR=0.012+t*0.11;              // doubled from 0.055 — boids orbit the larger sphere
    const now=Date.now()*0.001;
    for(let i=0;i<chargeBoidData.length;i++){
      const b=chargeBoidData[i];
      b.th+=b.speed*dt*(1+t*3);             // orbit faster at full charge
      // Rotate position around boid's unique axis
      const q=new THREE.Quaternion().setFromAxisAngle(b.axis, b.th);
      const v=new THREE.Vector3(orbitR,0,0).applyQuaternion(q);
      // Add small random jitter for organic feel
      const jitter=0.004*(1-t*0.5);
      pa[i*3  ]=v.x+(Math.random()-.5)*jitter;
      pa[i*3+1]=v.y+(Math.random()-.5)*jitter;
      pa[i*3+2]=v.z+(Math.random()-.5)*jitter;
    }
    chargeBoids.geometry.attributes.position.needsUpdate=true;
    chargeBoids.material.opacity=t*0.9;
    chargeBoids.material.size=0.018+t*0.028;  // particles grow
    chargeBoids.material.color.setHSL(0.55*(1-t), 1.0, 0.7+t*0.3);
  }

  // Weapon energy cells shift cyan → white
  if(weaponGroup){
    const pulse=0.8+0.2*Math.sin(Date.now()*0.02*(1+t*6));
    const col=new THREE.Color().setHSL(0.55-t*0.55, 1, 0.5+t*0.4);
    for(const m of energyCells){
      m.material.emissive=col;
      m.material.emissiveIntensity=(2.6+t*12)*pulse;
    }
  }

  // Blue inner glow on damage sphere repurposed as charge atmosphere
  damageSphere.material.color.setHex(0x0088ff);
  damageSphere.material.opacity=t*0.18;

  // Growing haptic rumble every ~250 ms
  if(Math.floor(chargeTime*4)!==Math.floor((chargeTime-dt)*4)){
    haptic('right', 0.15+t*0.85, 45);
  }

  if(chargeTime>=CHARGE_MAX){
    // Hide charge VFX before blast
    if(chargeSphere) chargeSphere.material.opacity=0;
    if(chargeBoids)  chargeBoids.material.opacity=0;
    damageSphere.material.opacity=0;
    damageSphere.material.color.setHex(0xff0000);
    fireBlast();
  }
}

// ════════════════════════════════════════════════════════════════
//  IMPACT CRATERS  — flat scorched ring left by explosions
// ════════════════════════════════════════════════════════════════
function spawnCrater(pos){
  const r=2+Math.random()*2;
  const geo=new THREE.RingGeometry(r*.35,r,16,1);
  const mat=new THREE.MeshBasicMaterial({color:0x110500,transparent:true,opacity:.75,depthWrite:false,side:THREE.DoubleSide});
  const mesh=new THREE.Mesh(geo,mat);
  // Orient crater to lie on the sphere surface (rotate normal to face outward)
  const surfNorm=pos.clone().normalize();
  const q=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1),surfNorm);
  mesh.quaternion.copy(q);
  const groundR=getPlanetHeight(surfNorm)+.05;

  craters.push({mesh,age:0});
  if(craters.length>30){const old=craters.shift();scene.remove(old.mesh);}
}

// ════════════════════════════════════════════════════════════════
//  ENEMY AI UPGRADES
//  Scout: circles player when close.  Heavy: charge ram.
//  Standard: loose flanking spread to avoid clustering.
// ════════════════════════════════════════════════════════════════
let _flankAngles={};// enemyId → assigned flank offset angle
function assignFlankAngles(){
  // Called on spawn; assigns each enemy a flank offset so they spread out
  enemies.forEach((e,i)=>{
    if(!_flankAngles[e.uuid])_flankAngles[e.uuid]=(i/(enemies.length||1))*Math.PI*2;
  });
}
// Pick a random goal position on the sphere surface that is 5–12 m from the player.
// Called every 3 seconds per enemy, and immediately when an enemy is inside 5 m.
function pickEnemyGoal(e, ud){
  const radius = 5 + Math.random() * 7;          // 5–12 m stand-off distance
  const angle  = Math.random() * Math.PI * 2;    // random azimuth around player
  const pNorm  = _camWP.clone().normalize();      // up-vector at player position
  // Build two orthogonal tangent vectors in the plane tangent to the sphere at the player
  const arb = (Math.abs(pNorm.y) < 0.9)
    ? new THREE.Vector3(0,1,0) : new THREE.Vector3(1,0,0);
  const t1 = new THREE.Vector3().crossVectors(pNorm, arb).normalize();
  const t2 = new THREE.Vector3().crossVectors(pNorm, t1);
  // Offset from player, projected onto the sphere surface
  const goalDir = _camWP.clone()
    .addScaledVector(t1, Math.cos(angle) * radius)
    .addScaledVector(t2, Math.sin(angle) * radius)
    .normalize();
  const surfR = getPlanetHeight(goalDir);
  ud.goalPos   = goalDir.multiplyScalar(surfR + ud.hoverH);
  ud.goalTimer = 3.0;
}

function updateEnemyAI(e,ud,toPlayer,dist,dt){
  const type=ud.type;

  // ── Goal-position maintenance (keep enemies ≥5 m from player) ────────────
  // Initialise on first call with a staggered timer so enemies don't all
  // repick simultaneously.
  if(!ud.goalPos) pickEnemyGoal(e, ud);
  ud.goalTimer -= dt;
  // Repick: timer expired OR enemy has drifted inside the 5-m exclusion zone
  if(ud.goalTimer <= 0 || dist < 5) pickEnemyGoal(e, ud);

  // ── Line-of-sight tracking ─────────────────────────────────────────
  const camFwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  const toEnemy=new THREE.Vector3().subVectors(e.position,_camWP).normalize();
  const inSight=toEnemy.dot(camFwd)>0.2;
  ud.outOfSightTimer=inSight?0:(ud.outOfSightTimer||0)+dt;

  // ── Seek line of sight after 3 seconds out of view ────────────────
  if(ud.outOfSightTimer>=3.0){
    const playerDir=_camWP.clone().normalize();
    const tangFwd=camFwd.clone()
      .addScaledVector(playerDir,-camFwd.dot(playerDir)).normalize();
    const targetPos=_camWP.clone().addScaledVector(tangFwd,20);
    const seekDir=new THREE.Vector3()
      .subVectors(targetPos,e.position).normalize();
    e.position.addScaledVector(seekDir,ud.speed*1.5*dt);
    return;
  }

  // ── Active repulsion: push directly away when inside 5 m ─────────
  if(dist < 5){
    const away = e.position.clone().sub(_camWP).normalize();
    e.position.addScaledVector(away, ud.speed * 1.5 * dt);
    return;
  }

  if(type==='scout'){
    // Circle around player — orbit radius 18 m keeps them well outside 5 m
    if(dist<22){
      const angle=_flankAngles[e.uuid]||0;
      _flankAngles[e.uuid]=(angle||0)+dt*1.8;
      const cx=_camWP.x+Math.cos(_flankAngles[e.uuid])*18;
      const cz=_camWP.z+Math.sin(_flankAngles[e.uuid])*18;
      const orbitDir=new THREE.Vector3(cx-e.position.x,0,cz-e.position.z).normalize();
      e.position.addScaledVector(orbitDir,ud.speed*dt);
      return;
    }
  }
  if(type==='heavy'){
    if(!ud.chargeCool)ud.chargeCool=0;
    ud.chargeCool-=dt;
    if(dist<25&&ud.chargeCool<=0&&Math.random()<.008){
      ud.charging=true;ud.chargeCool=6+Math.random()*4;ud.chargeTimer=.55;
    }
    if(ud.charging){
      ud.chargeTimer-=dt;
      e.position.addScaledVector(toPlayer.clone().normalize(),ud.speed*3.5*dt);
      if(ud.chargeTimer<=0)ud.charging=false;
      if(dist<2.2){takeDamage(22);ud.charging=false;}
      return;
    }
  }

  // ── Standard + fallback: steer toward current goal position ──────────────
  // Goal is always ≥5 m from the player (guaranteed by pickEnemyGoal).
  // Enemies approach their goal at normal speed, creating natural spread.
  const toGoal = new THREE.Vector3().subVectors(ud.goalPos, e.position);
  const goalDist = toGoal.length();
  if(goalDist > 1.0){
    // Blend goal direction with a small flank drift for organic movement
    const flankAngle = _flankAngles[e.uuid] || 0;
    const flankDrift = new THREE.Vector3(Math.cos(flankAngle), 0, Math.sin(flankAngle))
      .multiplyScalar(0.15);
    const moveDir = toGoal.normalize().add(flankDrift).normalize();
    e.position.addScaledVector(moveDir, ud.speed * dt);
  }
}

function degradeWeapon(){
  const def=WEAPONS[currentWeapon];
  if(def.ammo===Infinity)return; // laser never degrades
  if(!weaponCondition[currentWeapon])weaponCondition[currentWeapon]=100;
  weaponCondition[currentWeapon]=Math.max(0,weaponCondition[currentWeapon]-1.2);
  const c=weaponCondition[currentWeapon];
  // Dim weapon glow with condition
  if(muzzleLight)muzzleLight.distance=5*(c/100);
  // Revert to laser when fully degraded
  if(c<=0){speak('Weapon degraded, reverting to laser');equipWeapon('laser');}
}
function getConditionMult(){
  const c=weaponCondition[currentWeapon]??100;
  return c>50?1.0:c>20?.7:.45; // damage multiplier
}

function updateUpgradeCards(dt){

  const rightPos=rightGrip?new THREE.Vector3().setFromMatrixPosition(rightGrip.matrixWorld):null;
  const leftPos=leftGrip?new THREE.Vector3().setFromMatrixPosition(leftGrip.matrixWorld):null;
  for(const c of upgradeCards) c.age+=dt;
  // Check hand proximity
  for(const c of upgradeCards){
    const close=
      (rightPos&&rightPos.distanceTo(c.mesh.position)<.65)||
      (leftPos&&leftPos.distanceTo(c.mesh.position)<.65);

      c.upgrade.fn();

  const ctx=getAudio();if(!ctx)return;
  const t=ctx.currentTime;
  const nb=ctx.createBuffer(1,ctx.sampleRate*.06,ctx.sampleRate);
  const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=(Math.random()*2-1)*(1-i/nd.length);
  const src=ctx.createBufferSource();src.buffer=nb;
  const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=280+Math.random()*120;
  const g=ctx.createGain();g.gain.value=.06+Math.random()*.03;
  src.connect(lp);lp.connect(g);g.connect(ctx.destination);src.start(t);src.stop(t+.07);
}

// ════════════════════════════════════════════════════════════════
//  GIZA PYRAMIDS  — three square pyramids on the southern side
//  Scaled proportionally to the real Giza layout.
//  Collision reuses closestPointOnCone() — a square pyramid
//  with 4 sides approximates a cone at any given height.
// ════════════════════════════════════════════════════════════════

function buildPyramids(){
  // Giza-proportion layout on the southern hemisphere.
  // Real ratios: Khufu ~230 m base / Khafre ~215 m / Menkaure ~102 m,
  // arranged along a NE→SW diagonal with similar inter-monument spacing.
  const sandMat=new THREE.MeshStandardMaterial({color:0xd4a040,roughness:.90,metalness:.04,
    emissive:new THREE.Color(0xd4a040),emissiveIntensity:.20});
  const defs=[
    // Khufu — largest, northeastern position
    {dir:new THREE.Vector3( 0.14,-0.80, 0.42).normalize(), r:28, h:22},
    // Khafre — slightly smaller, offset southwest
    {dir:new THREE.Vector3(-0.10,-0.84, 0.18).normalize(), r:26, h:20},
    // Menkaure — noticeably smaller, further southwest
    {dir:new THREE.Vector3(-0.32,-0.82, 0.06).normalize(), r:14, h:11},
  ];

  defs.forEach(pd=>{
    const axis=pd.dir.clone();
    const surfR=getPlanetHeight(axis)-18; // embed 18 units below surface like volcanoes
    const basePos=axis.clone().multiplyScalar(surfR);
    const coneCenter=basePos.clone().addScaledVector(axis,pd.h/2);

    // ConeGeometry(radius, height, 4) = square pyramid
    const geo=new THREE.ConeGeometry(pd.r,pd.h,4,1,false);
    const mesh=new THREE.Mesh(geo,sandMat.clone());
    mesh.position.copy(coneCenter);
    // Orient: ConeGeometry apex at +Y; rotate so +Y aligns with surface normal
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),axis);
    // Rotate 45° around the axis so the pyramid faces cardinal tangents
    mesh.rotateOnWorldAxis(axis,Math.PI/4);
    scene.add(mesh);

    // Store collider (same API as volcano colliders)
    pyramidColliders.push({basePos:basePos.clone(),axis,r:pd.r,h:pd.h,baseR:surfR});
  });
}

// ── Apply pyramid collision (player + enemies) ────────────────────
// Reuses closestPointOnCone() which is already defined above.
// Pyramids sit ON the surface (not embedded), so no height offset needed.
function applyPyramidCollision(pos, radius, isOnSurface){
  // pos       = THREE.Vector3 position to test and push
  // radius    = capsule radius (PLAYER_R or enemy clearance)
  // isOnSurface = true → re-snap to terrain after push
  const posRad=pos.length();
  const posDir=pos.clone().normalize();

  for(const pc of pyramidColliders){
    // Fast angular pre-cull
    if(posDir.angleTo(pc.axis)*PLANET_R>pc.r+radius+6) continue;
    const ht=posRad-pc.baseR;
    if(ht<-radius||ht>pc.h+radius) continue;

    // Volume escape: is pos inside the pyramid cone?
    const toP=new THREE.Vector3().subVectors(pos,pc.basePos);
    const t=Math.max(0,Math.min(pc.h,toP.dot(pc.axis)));
    const ringC=pc.basePos.clone().addScaledVector(pc.axis,t);
    const rT=pc.r*(1-t/pc.h);
    const radComp=new THREE.Vector3().subVectors(pos,ringC);
    radComp.addScaledVector(pc.axis,-radComp.dot(pc.axis));
    if(radComp.length()<rT){
      const expel=radComp.length()>0.001?radComp.clone().normalize():posDir.clone();
      pos.copy(ringC).addScaledVector(expel,rT+radius+0.15);
      if(isOnSurface){const d=pos.clone().normalize();pos.setLength(getPlanetHeight(d));}
      continue;
    }

    // Surface proximity push
    const cp=closestPointOnCone(pos,pc.basePos,pc.axis,pc.r,pc.h);
    const toPos=new THREE.Vector3().subVectors(pos,cp);
    const dist=toPos.length();
    if(dist>=radius) continue;

    let pushDir=dist>0.001?toPos.clone().normalize()
      :new THREE.Vector3().subVectors(posDir,pc.axis.clone().multiplyScalar(posDir.dot(pc.axis))).normalize();
    // Strip radial component so player stays on surface
    pushDir.addScaledVector(posDir,-pushDir.dot(posDir));
    if(pushDir.lengthSq()<0.0001) continue;
    pushDir.normalize();
    pos.addScaledVector(pushDir,radius-dist+0.12);
    if(isOnSurface){const d=pos.clone().normalize();pos.setLength(getPlanetHeight(d));}
  }
}

    add(g,new THREE.BoxGeometry(.58,.95,.65),new THREE.MeshStandardMaterial({color:0xffd700,roughness:.25,metalness:1.0,emissive:0x442200,emissiveIntensity:.18,envMapIntensity:1.3}),Math.cos(a)*7.3,Math.sin(a)*7.3,.1);}
  add(g,new THREE.CircleGeometry(6.3,32),
    new THREE.MeshBasicMaterial({color:0x223344,transparent:true,opacity:.25,side:THREE.DoubleSide}));
  g.rotation.x=.12;
  artL(g,-.42,-.84,-.34, 8,
    new THREE.TorusGeometry(7,1,5,16), 0x998877, 0);}

  // ── 20. SANDWORM SKELETON ────────────────────────────────────────
  {const g=new THREE.Group();
  const bm=M(0xd4c4a0,.85,.04);
  const segs=24;
  for(let i=0;i<segs;i++){
    const t=i/(segs-1);
    const lx=(t-.5)*68,lz=Math.sin(t*Math.PI*1.8)*10,ly=Math.sin(t*Math.PI)*22-1.5;
    const segR=2.5+Math.sin(t*Math.PI)*5.5;
    const ring=new THREE.Mesh(new THREE.TorusGeometry(segR,.55,6,14),bm);
    ring.position.set(lx,ly,lz);
    const nx2=68/(segs-1),nz2=Math.cos(t*Math.PI*1.8)*Math.PI*1.8*10/(segs-1);
    const ny2=Math.cos(t*Math.PI)*Math.PI*22/(segs-1);
    ring.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),new THREE.Vector3(nx2,ny2,nz2).normalize());
    g.add(ring);
    if(i%3===0&&ly>0){const fin=add(g,new THREE.BoxGeometry(.3,segR*.7,.15),bm,lx,ly+segR*.5,lz);fin.quaternion.copy(ring.quaternion);}
  }
  artL(g,.34,-.84,-.42, 8,
    new THREE.BoxGeometry(68,8,18), 0xd4c4a0, 4);}
}

// ── LOD update — called every frame ──────────────────────────────
function updateLandmarkLODs(){
  for(const lm of landmarks){
    const dist=dolly.position.distanceTo(lm.pos);
    const lod=dist<40?0:dist<100?1:dist<220?2:3;
    if(lod===lm.lastLOD) continue;
    lm.lastLOD=lod;
    // Visibility
    lm.hd.visible=(lod===0);
    lm.ld.visible=(lod===1);
    lm.mk.visible=(lod===2);
    // lod===3: all hidden (already handled by above)
  }
}

// ── Landmark bounding-sphere collision ────────────────────────────
// Each landmark has a spherical exclusion zone (collR).
// The push is projected onto the sphere tangent plane so the player
// slides around the object rather than being launched into space.
function applyLandmarkCollision(){
  const PLAYER_R=1.2;
  const playerDir=dolly.position.clone().normalize();
  for(const lm of landmarks){
    if(!lm.collR) continue;
    // Fast cull: only check if within rough range
    if(dolly.position.distanceTo(lm.pos)>lm.collR+PLAYER_R+2) continue;
    const toPlayer=new THREE.Vector3().subVectors(dolly.position,lm.pos);
    const dist=toPlayer.length();
    if(dist>=lm.collR+PLAYER_R||dist<0.001) continue;
    // Push direction — strip the radial component to stay on surface
    let pushDir=toPlayer.clone().normalize();
    pushDir.addScaledVector(playerDir,-pushDir.dot(playerDir));
    if(pushDir.lengthSq()<0.0001){
      // Push is purely radial — nudge tangentially away from landmark axis
      const anyTan=new THREE.Vector3(1,0,0);
      if(Math.abs(playerDir.dot(anyTan))>.9) anyTan.set(0,0,1);
      pushDir.crossVectors(playerDir,anyTan).normalize();
    } else { pushDir.normalize(); }
    dolly.position.addScaledVector(pushDir,lm.collR+PLAYER_R-dist+0.1);
    const nd=dolly.position.clone().normalize();
    dolly.position.setLength(getPlanetHeight(nd));
  }
}





// ════════════════════════════════════════════════════════════════
//  STARGATE PORTALS  — East & West, animated swirl, teleport
// ════════════════════════════════════════════════════════════════

function buildPortals(){
  const defs=[
    {dir:new THREE.Vector3( 0.82,0.57,0.0).normalize(), col:0x0088ff, label:'East'},
    {dir:new THREE.Vector3(-0.82,0.57,0.0).normalize(), col:0xff6600, label:'West'},
  ];
  defs.forEach((pd,i)=>{
    const surfNorm=pd.dir.clone();
    const surfR=getPlanetHeight(surfNorm);
    const surfPos=surfNorm.clone().multiplyScalar(surfR);

    const g=new THREE.Group();

    // ── Outer frame ring ─────────────────────────────────────────
    const ring=new THREE.Mesh(
      new THREE.TorusGeometry(5,.50,14,64),
      new THREE.MeshStandardMaterial({
        color:0x334455,metalness:.95,roughness:.10,
        emissive:new THREE.Color(pd.col),emissiveIntensity:.45
      })
    );
    g.add(ring);

    // ── Inner animated swirl disc ─────────────────────────────────
    const discMat=new THREE.ShaderMaterial({
      uniforms:{uTime:{value:0},uColor:{value:new THREE.Color(pd.col)}},
      vertexShader:`varying vec2 vUv;
        void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`
        uniform float uTime;uniform vec3 uColor;varying vec2 vUv;
        void main(){
          vec2 p=vUv*2.-1.;float r=length(p);
          if(r>0.96)discard;
          float a=atan(p.y,p.x);
          // Layered spiral: fast outer ring + slow deep swirl
          float s1=sin(a*5.-r*14.+uTime*3.2)*.35+.55;
          float s2=sin(a*3.+r*8.-uTime*1.8)*.25+.60;
          float s3=sin(r*22.-uTime*5.0)*.15+.85;
          float br=s1*s2*s3*smoothstep(.96,.55,r);
          gl_FragColor=vec4(uColor*br*2.,br*.90);
        }`,
      transparent:true,side:THREE.DoubleSide,
      blending:THREE.AdditiveBlending,depthWrite:false
    });
    const disc=new THREE.Mesh(new THREE.CircleGeometry(4.85,64),discMat);
    g.add(disc);

    // ── Outer glow halo ───────────────────────────────────────────
    const halo=new THREE.Mesh(
      new THREE.TorusGeometry(5.6,1.2,6,32),
      new THREE.MeshBasicMaterial({color:pd.col,transparent:true,opacity:.18,
        blending:THREE.AdditiveBlending,depthWrite:false})
    );
    g.add(halo);

    // ── Chevron markers (8 evenly spaced nubs on the outer ring) ─
    for(let k=0;k<8;k++){
      const a=k/8*Math.PI*2;
      const chev=new THREE.Mesh(
        new THREE.BoxGeometry(.3,.6,.5),
        new THREE.MeshStandardMaterial({color:pd.col,emissive:new THREE.Color(pd.col),emissiveIntensity:.8})
      );
      chev.position.set(Math.cos(a)*5.1,Math.sin(a)*5.1,0);
      g.add(chev);
    }

    // ── Point light ───────────────────────────────────────────────
    const pl=new THREE.PointLight(pd.col,5,45);g.add(pl);

    // ── Orientation: ring stands upright, hole axis faces North ──
    // Torus default: ring in XY plane, hole axis = Z.
    // We want: hole axis = tangential "north" direction, ring Y = surface normal.
    // Basis: X = right, Y = surfNorm (planet up), Z = discNormal (hole / walk-through)
    const northish=new THREE.Vector3(0,1,0);
    const discNormal=northish.clone()
      .addScaledVector(surfNorm,-northish.dot(surfNorm)).normalize();
    const right=new THREE.Vector3().crossVectors(surfNorm,discNormal).normalize();
    const mat4=new THREE.Matrix4().makeBasis(right,surfNorm,discNormal);
    g.quaternion.setFromRotationMatrix(mat4);
    g.position.copy(surfPos);
    scene.add(g);

    portals.push({group:g,discMat,pos:surfPos.clone(),
      surfNorm:surfNorm.clone(),discNormal:discNormal.clone(),cooldown:0,index:i});
  });
}

function updatePortals(dt){
  if(!portals.length) return;
  const t=clock.elapsedTime;
  for(const p of portals){
    p.discMat.uniforms.uTime.value=t;
    p.cooldown=Math.max(0,p.cooldown-dt);
  }
  if(!gameActive||portals.length<2) return;

  const camPos=new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
  for(let i=0;i<portals.length;i++){
    const portal=portals[i];
    if(portal.cooldown>0) continue;
    if(camPos.distanceTo(portal.pos)>7) continue;

    // ── Teleport ─────────────────────────────────────────────────
    const other=portals[1-i];

    // Exit point: 10 m along the OTHER portal's disc normal (walk-through direction)
    // Project along sphere surface so the player doesn't leave the terrain.
    const exitRaw=other.pos.clone().addScaledVector(other.discNormal,10);
    const exitDir=exitRaw.clone().normalize();
    const exitR=getPlanetHeight(exitDir);
    dolly.position.copy(exitDir).multiplyScalar(exitR);

    // Instantly align dolly up to new surface normal
    const newNorm=exitDir.clone();
    const curUp=new THREE.Vector3(0,1,0).applyQuaternion(dolly.quaternion);
    const ang=curUp.angleTo(newNorm);
    if(ang>0.001){
      const ax=new THREE.Vector3().crossVectors(curUp,newNorm);
      if(ax.lengthSq()>0.0001)
        dolly.quaternion.premultiply(
          new THREE.Quaternion().setFromAxisAngle(ax.normalize(),ang));
    }

    // Cooldown on both portals so player doesn't instantly re-enter
    portal.cooldown=3.0;
    other.cooldown=3.0;

    haptic('right',1.0,220);haptic('left',1.0,180);
    speak('Portal');
    break;
  }
}


// ════════════════════════════════════════════════════════════════
//  RENDER LOOP
// ════════════════════════════════════════════════════════════════
function loop(time,frame){
  const dt=Math.min(clock.getDelta(),.05);
  const now=clock.elapsedTime;

  terrainU.uTime.value=now;jupU.uTime.value=now;
  drainHaptics();      // must run inside XR frame — Quest 3 ignores out-of-frame pulse() calls
  updateAudioListener();
  updateLava();updatePlumes(dt);

  if(gameActive){
    updatePlayer(dt);
    updateEnemies(dt);
    updateBolts(dt);
    updateWaves(now);
    updateCharge(dt);
    updateCombo(dt);
    updateShield(dt);
    updateEnemyHums();
    updateMusic();
    updateDayNight(dt);
    updateVoiceCooldown(dt);
    fireCooldown=Math.max(0,fireCooldown-dt);

    // ── Health regen: 5s grace period, then +5 units/s ──────────────
    // Runs inside gameActive block so healthRegen only ticks during play.
    // healthRegen is reset to 0 in takeDamage() on every hit.
    if(health>0&&health<maxHealth){
      healthRegen+=dt;
      if(healthRegen>5){
        const prev=Math.ceil(health);
        health=Math.min(maxHealth, health+5*dt);
        // Only redraw HUD when the displayed integer value changes
        if(Math.ceil(health)!==prev) drawHUD();
      }
    }
  }
  updateExplosions(dt);
  updateShockwaves(dt);
  updateWaveBanner(dt);
  updateGameOverBanner(dt);
  updateDust(dt);
  updateRockLODs();
  updateVolcanoLODs();
  updateLandmarkLODs();
  updatePortals(dt);
  updateMuzzleCone(dt);
  updateKillFlash(dt);
  updateSaberTrails(dt);
  updateUpgradeCards(dt);
  updateWeapon(dt,now);
  if(gameActive){ updatePickups(dt); updateProjectiles(dt); updateSlashDetection(dt); updateLaunchedRibbons(dt); updateShotgunBolts(dt); }

  // updateWeapon moved above

  renderer.render(scene,camera);
}

init();
