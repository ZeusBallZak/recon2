<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IO: FIRST CONTACT — VR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
canvas{display:block;width:100%;height:100%;}

/* ── Pre-VR overlay (visible only on flat screen before entering VR) ── */
#overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 60%,rgba(8,4,2,.97) 0%,#000 100%);
  font-family:'Courier New',monospace;z-index:10;
}
.iotitle{
  font-size:clamp(3rem,9vw,7rem);color:#ff6600;letter-spacing:.5em;
  text-shadow:0 0 40px #ff4400,0 0 100px #ff2200;
  animation:tp 3s ease-in-out infinite;
}
@keyframes tp{0%,100%{text-shadow:0 0 40px #ff4400,0 0 100px #ff2200}50%{text-shadow:0 0 60px #ff6600,0 0 140px #ff3300}}
.sub{color:rgba(255,160,50,.45);font-size:.78rem;letter-spacing:.35em;margin:.5rem 0 .3rem;}
.sub2{color:rgba(55,205,255,.32);font-size:.68rem;letter-spacing:.28em;margin-bottom:2.4rem;}
.scanline{width:280px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,102,0,.6),transparent);margin-bottom:2.4rem;animation:sc 2s ease-in-out infinite;}
@keyframes sc{0%,100%{opacity:.3}50%{opacity:1}}
#vr-btn{
  font-family:'Courier New',monospace;font-size:.9rem;letter-spacing:.25em;
  color:#ff6600;background:none;border:1px solid rgba(255,102,0,.5);
  padding:14px 52px;cursor:pointer;text-transform:uppercase;
  transition:all .2s;outline:none;
}
#vr-btn:hover:not(:disabled){background:rgba(255,102,0,.1);box-shadow:0 0 22px rgba(255,102,0,.4);border-color:#ff6600;}
#vr-btn:disabled{opacity:.3;cursor:not-allowed;}
.ctrlinfo{
  margin-top:2.4rem;color:rgba(255,160,50,.26);font-size:.64rem;
  letter-spacing:.12em;text-align:center;line-height:2.1;
}
.ctrlinfo span{color:rgba(255,160,50,.5);}
#status{
  margin-top:1.2rem;font-size:.62rem;letter-spacing:.18em;
  color:rgba(55,205,255,.35);min-height:1.2em;text-align:center;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Flat-screen overlay: visible before entering VR, invisible inside headset -->
<div id="overlay">
  <div class="iotitle">IO</div>
  <div class="sub">FIRST CONTACT · JUPITER SYSTEM · 2184 CE</div>
  <div class="sub2">META QUEST 3 · WEBXR IMMERSIVE VR</div>
  <div class="scanline"></div>
  <button id="vr-btn" disabled>CHECKING VR SUPPORT…</button>
  <div class="ctrlinfo">
    <span>LEFT STICK</span> Move &nbsp;·&nbsp; <span>LEFT GRIP</span> Sprint<br>
    <span>RIGHT STICK ←→</span> Snap Turn 45° &nbsp;·&nbsp; <span>RIGHT TRIGGER</span> Fire<br>
    <span>A BUTTON</span> Super Jump &nbsp;·&nbsp; Raise left wrist to read HUD
  </div>
  <div id="status"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// ══════════════════════════════════════════════════════════════════════
//  IO : FIRST CONTACT  ·  WebXR VR Edition
//  Optimised for Meta Quest 3 / Quest Pro (72–90 Hz target)
//
//  Architecture:
//  • Single scene — weapon lives in world space on rightGrip
//  • Dolly group   — camera + controllers move together on terrain
//  • XR head-tracking adds physical head pose on top of dolly.y
//  • Canvas-texture wrist HUD on left grip (raise wrist to read)
//  • Handedness-aware controller assignment (works regardless of
//    which Quest controller connects first)
//  • GLSL: Io terrain FBM · Jupiter bands + GRS · laser bolt rim-glow
// ══════════════════════════════════════════════════════════════════════

// ── Scene globals ──────────────────────────────────────────────────────
let renderer, scene, camera, dolly, clock;
let terrainU, jupU;
let terrainMesh=null;          // reference for floor raycasting
const floorRay=new THREE.Raycaster(); // outward ray for terrain collision (sphere)
const volcRay=new THREE.Raycaster();  // volcano mesh collision ray

// Controllers — assigned by handedness on 'connected' event
let rightCtrl=null, leftCtrl=null, rightGrip=null, leftGrip=null;
// Raw XRInputSource references — stored on 'connected' so haptic() can
// call .gamepad.hapticActuators[0].pulse() directly without any lookup.
let rightXRSource=null, leftXRSource=null;

// Weapon (attached to rightGrip after connection)
let weaponGroup=null, energyCells=[], muzzleLight=null, muzzleSphere=null;

// Wrist HUD (attached to leftGrip after connection)
let hudCanvas, hudCtx, hudTexture, hudMesh=null;

// Damage vignette sphere (child of dolly)
let damageSphere;

// ── Game state ──────────────────────────────────────────────────────────
let gameActive=false, gameOverState=false;
let health=100, maxHealth=100, shield=100, maxShield=100;
let score=0, kills=0, wave=1, lastSpawn=0, waveThresh=500, shieldRegen=0, healthRegen=0, waveBreakUntil=0;
// ── Combo multiplier ─────────────────────────────────────────────
let comboCount=0, comboTimer=0, comboMult=1;
// ── Boss system ──────────────────────────────────────────────────
let bossEnemy=null, bossPhase=1;
// ── Upgrade system ───────────────────────────────────────────────
let pendingUpgrade=false, upgradePhase=false, upgradeCards=[];
// ── Player energy shield ─────────────────────────────────────────
let shieldActive=false, shieldDur=0, shieldRecharge=0, shieldMesh=null, xWasPressed=false;
const SHIELD_DUR=3.0, SHIELD_RECHARGE=10.0;
// ── Weapon degradation ───────────────────────────────────────────
let weaponCondition={}; // type → 0..100
// ── Day/night cycle ──────────────────────────────────────────────
let sunLight=null, ambientLight=null;

// ── Spatial audio tracks ─────────────────────────────────────────
let enemyHumNodes={};  // enemyId → {osc,gain,pan}
let musicNodes=null;
// ── Impact craters ───────────────────────────────────────────────
let craters=[];
// ── Jump physics — Io surface gravity = 1/6 Earth (1.635 m/s²) ──
let playerVY=0, isGrounded=true;
const IO_GRAVITY=1.635;        // units/s²
const JUMP_VEL=Math.sqrt(2*IO_GRAVITY*50); // launch speed to reach 50 units peak
let enemies=[], pBolts=[], eBolts=[], explosions=[];
let lavaLights=[], plumeList=[];
let rockGroups=[];
let volcanoLODs=[];
let portals=[];
let landmarks=[]; // {hd,ld,mk,pos,collR,lastLOD} — 20 sci-fi artifacts with 3-level LOD
// Volcano colliders — XZ centre, base radius, height, base world Y
// Populated in buildVolcanoes() after terrain heights are known.
let volcanoColliders=[];
let pyramidColliders=[]; // [{basePos,axis,r,h,baseR}] — same format used by closestPointOnCone

// ── Input state ────────────────────────────────────────────────────────
let snapCooldown=0, leftGripHeld=false, aWasPressed=false, bWasPressed=false;
// ── Dash state ────────────────────────────────────────────────────
let dashActive=false, dashRemaining=0, dashCooldown=0;
const DASH_SPEED=50;    // units/s (covers 10 m in 0.2 s)
const DASH_DIST=10;     // metres
const DASH_DUR=DASH_DIST/DASH_SPEED; // 0.2 s
const DASH_COOLDOWN=2.0;// seconds between dashes
const DASH_STOP_R=2.0;  // enemy proximity that cancels dash
const _dashDir=new THREE.Vector3(); // normalised forward direction of dash
let fireCooldown=0, mfTimer=0;
let kickZ=0, kickRX=0; // weapon recoil springs

// ── Super Blast charge state ──────────────────────────────────────
let triggerHeld=false, chargeTime=0;
const CHARGE_MAX=8.0;
let chargeOsc=null, chargeGain=null;
let shockwaves=[];
let chargeSphere=null, chargeBoids=null, chargeBoidData=[];
let waveBillboard=null;
let gameOverBillboard=null;

// ── Weapon system ─────────────────────────────────────────────────────
let currentWeapon='laser';
let weaponAmmoMap={laser:Infinity};
let grenadeProjs=[], rocketProjs=[], cannonProjs=[];
// ── Sword slash wave velocity tracking ──────────────────────────
// Track right grip world position each frame to compute swing velocity.
const _prevGripPos=new THREE.Vector3();
const _currGripPos=new THREE.Vector3();
let gripVelX=0, gripVelY=0, gripVelZ=0; // world-space velocity components
const SLASH_SPEED_THRESHOLD=4.0;  // m/s — minimum tip speed to activate slash ribbon
const SLASH_COOLDOWN=0.28;        // seconds — minimum between swing-sound/haptic triggers
const SLASH_WINDOW=0.5;           // seconds — ribbon stays visible after a fast swing
const SLASH_HISTORY_SAMPLES=32;   // tip positions stored (32 × ~16 ms ≈ 0.5 s)
let slashCooldown=0;
let gripPosInitialised=false;
// Slash ribbon state (no projectile — the ribbon IS the slash)
let _slashPts=[], _slashSampleTimer=0, _slashActiveDur=0;
let _slashMesh=null, _slashMat=null;
let launchedRibbons=[], _detachTimer=0.5; // launched ribbon projectiles
let pickups=[];
let flameCooldown=0;

const SPEED=5.5, SPRINT=9.0, SENS_SNAP=Math.PI/4; // 45° snap turns

// Quest 3 controller pitch offset in radians.
// The grip space -Z axis already points roughly "forward" when you hold the
// controller, but the physical controller body tilts downward ~30°.
// WEAPON_PITCH rotates the barrel down in grip space to match, so a neutral
// comfortable wrist position aims the barrel straight ahead.
// Tune this if still uncomfortable: more negative = barrel aims lower.
const WEAPON_PITCH = -0.45; // ≈ -26°  (was -0.18 / -10°)

// ── Terrain helpers (JS mirrors GLSL) ─────────────────────────────────
const fr=x=>x-Math.floor(x);
const lp=(a,b,t)=>a+(b-a)*t;
function h2(x,y){return fr(Math.sin(x*127.1+y*311.7)*43758.5453);}
function n2(x,y){
  const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
  const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
  return lp(lp(h2(ix,iy),h2(ix+1,iy),ux),lp(h2(ix,iy+1),h2(ix+1,iy+1),ux),uy);
}
function fbm(x,y){let v=0,a=.5,sx=0,sy=100;for(let i=0;i<6;i++){v+=a*n2(x+sx,y+sy);x*=2;y*=2;sx+=31.7;sy+=17.3;a*=.5;}return v;}
function getH(x,z){return fbm(x*.05,z*.05)*8+fbm(x*.2,z*.2)*2;}

// ════════════════════════════════════════════════════════════════
//  PLANET CONSTANTS  — Io as a small walkable sphere
// ════════════════════════════════════════════════════════════════
const PLANET_R = 280;          // base sphere radius (world units)
const PLANET_FLOOR_BUFFER = 0.3;  // dolly sits just above mesh surface

// Returns the radial distance from planet centre to the terrain surface
// at the given normalised direction.  Reuses the same JS fbm() that
// drives the CPU vertex displacement in buildTerrain().
function getPlanetHeight(n){
  // n = THREE.Vector3 (or {x,y,z}) on the unit sphere
  // Scale matches the fragment shader's  vPos.xz * .05  sampling.
  return PLANET_R + getH(n.x * PLANET_R, n.z * PLANET_R) + PLANET_FLOOR_BUFFER;
}

// Legacy flat-terrain shim — kept so any stray callers don't crash.
// Maps a 3-D world position back to its surface height.
function sampleGround(x, y, z){
  const len = Math.sqrt(x*x+y*y+z*z)||1;
  return getPlanetHeight({x:x/len, y:y/len, z:z/len});
}

// ════════════════════════════════════════════════════════════════
//  GLSL SHADERS
// ════════════════════════════════════════════════════════════════

// ── Io Terrain ──────────────────────────────────────────────────
const ioV=`
varying vec2 vUv;varying float vH;varying vec3 vN,vPos;
void main(){
  vUv=uv;
  vH=length(position)-280.0;
  vPos=position;
  vN=normal;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`; 

const ioF=`
uniform float uTime;
uniform vec3 uSunDir;
varying vec2 vUv;varying float vH;varying vec3 vN,vPos;
float hh(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float nn(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(hh(i),hh(i+vec2(1,0)),f.x),mix(hh(i+vec2(0,1)),hh(i+vec2(1,1)),f.x),f.y);}
float fb(vec2 p){float v=0.,a=.5;vec2 s=vec2(0,100);for(int i=0;i<6;i++){v+=a*nn(p+s);p*=2.;s+=vec2(31.7,17.3);a*=.5;}return v;}
void main(){
  // Spherical UV: sample FBM via normalised surface direction, not raw XZ.
  // This matches JS getPlanetHeight() exactly (n.xz * PLANET_R * 0.05 = n.xz * 14).
  // Avoids pole-pinch artifact and colour/height drift on the displaced sphere.
  vec2 p=normalize(vPos).xz*14.0;
  float n1=fb(p),n2=fb(p*3.+vec2(5.2,1.3)),n3=fb(p*9.+vec2(1.7,9.2)+uTime*.008),n4=fb(p*.5+vec2(3.1,7.4));
  vec3 sY=vec3(.92,.84,.10),sO=vec3(.88,.44,.05),sR=vec3(.72,.18,.06),sW=vec3(.94,.91,.82);
  vec3 bas=vec3(.16,.09,.04),basG=vec3(.28,.22,.15),lava=vec3(1.,.32,.01),lC=vec3(1.,.85,.15);
  vec3 col=mix(sY,sO,smoothstep(.3,.7,n1));
  col=mix(col,sR,smoothstep(.55,.75,n2)*.5);col=mix(col,bas,smoothstep(.6,.8,n2)*.7);
  col=mix(col,basG,smoothstep(.65,.85,n4)*.4);col=mix(col,sW,smoothstep(.78,.92,n1)*.9);
  float cal=smoothstep(3.5,-1.,vH);col=mix(col,bas,cal*.9);
  float crack=1.-smoothstep(0.,.07,abs(n3-.48));
  float lE=clamp(crack*(cal*1.5+.25),0.,1.);
  vec3 lCol=mix(lava,lC,smoothstep(.4,1.,lE));col=mix(col,lCol,lE);
  // World-space lighting: N = geometry normal (model-space = world-space for unrotated mesh)
  // L = sun direction passed as uniform so it matches sunLight.position exactly.
  // Half the planet faces away → diff drops to 0.20 (20% self-illumination floor).
  vec3 N=normalize(vN),L=normalize(uSunDir);
  float diff=max(.20,dot(N,L));
  gl_FragColor=vec4(col*diff+lCol*lE*.35,1.);}`;

// ── Jupiter ─────────────────────────────────────────────────────
const jupV=`varying vec2 vUv;varying vec3 vN;
void main(){vUv=uv;vN=normal;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;

const jupF=`
uniform float uTime;uniform vec3 uSunDir;varying vec2 vUv;varying vec3 vN;
float hh(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float nn(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(hh(i),hh(i+vec2(1,0)),f.x),mix(hh(i+vec2(0,1)),hh(i+vec2(1,1)),f.x),f.y);}
float fb(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*nn(p);p=p*2.+vec2(3.1,1.7);a*=.5;}return v;}
void main(){
  float t=uTime*.015;vec2 uv=vUv;
  float y=uv.y
    +fb(vec2(uv.x*5.+t,uv.y*2.))*.05
    +fb(vec2(uv.x*10.-t*.6,uv.y*4.))*.025
    +fb(vec2(uv.x*20.+t*.4,uv.y*8.))*.01;
  float b=y*10.;
  float s1=sin(b*3.14159)*.5+.5,s2=sin(b*6.28318+1.3)*.5+.5;
  float s3=sin(b*1.5708+.7)*.5+.5,s4=sin(b*9.42477-.4)*.5+.5;
  vec3 cr=vec3(.95,.89,.74),be=vec3(.82,.70,.52),o1=vec3(.78,.48,.22);
  vec3 o2=vec3(.68,.36,.14),ru=vec3(.55,.28,.12),db=vec3(.35,.18,.09),wh=vec3(.98,.95,.88);
  vec3 col=mix(cr,be,s1);
  col=mix(col,o1,s2*.65);col=mix(col,o2,s3*.5);
  col=mix(col,db,fb(vec2(uv.x*5.+t*.5,y*6.))*.55);
  col=mix(col,wh,fb(vec2(uv.x*3.-t*.3,y*4.+1.))*.3);
  col=mix(col,ru,s4*.35);
  col=mix(col,o1,fb(vec2(uv.x*20.+t*2.,y*15.))*.12);

  // ── GREAT RED SPOT ───────────────────────────────────────────────
  // Jupiter sits at world(−850,620,−1900). Player looks from origin.
  // Visible face maps to u≈0.30 on SphereGeometry UV.
  // GRS latitude ~23°S → v≈0.40.  Old u=0.62 was on the hidden back face.
  vec2 grsC=vec2(0.30,0.40);
  vec2 grsEll=(uv-grsC)*vec2(4.0,8.2);   // oval: wider in longitude
  float grsDist=length(grsEll);
  float grsOuter=smoothstep(1.00,0.00,grsDist);
  float grsRing=smoothstep(1.00,0.55,grsDist)-smoothstep(0.55,0.10,grsDist);
  float grsCore=smoothstep(0.40,0.00,grsDist);
  float swA=atan(grsEll.y,grsEll.x);
  float sw1=fb(grsEll*1.3+vec2(t*.55,swA*2.3));   // cyclonic swirl layer 1
  float sw2=fb(grsEll*2.6-vec2(t*.28,swA*3.1));   // cyclonic swirl layer 2
  vec3 grsDeep=vec3(0.48,0.09,0.03);   // dark reddish eye
  vec3 grsMid =vec3(0.94,0.34,0.08);   // orange-red main body
  vec3 grsEdge=vec3(0.68,0.14,0.05);   // crimson outer ring
  vec3 grsFil =vec3(0.98,0.54,0.16);   // bright ring filaments
  vec3 grsCol=mix(grsEdge,grsMid,smoothstep(0.,1.,sw1*1.8));
  grsCol=mix(grsCol,grsDeep,grsCore*.65);
  grsCol=mix(grsCol,grsFil,grsRing*sw2*1.6);
  col=mix(col,grsCol,grsOuter*.97);
  col+=vec3(0.12,0.04,0.01)*grsRing*(1.-sw1*.4)*grsOuter; // luminous halo

  // Oval BA companion storm
  vec2 sp2=(uv-vec2(0.21,0.56))*vec2(6.,14.);
  col=mix(col,vec3(.96,.86,.72),smoothstep(1.,.1,length(sp2))*.7);

  // ── Sun directional shading (world-space) ────────────────────────
  vec3 Nn=normalize(vN);
  float sunDot=dot(Nn,uSunDir);
  float diff=max(0.20,sunDot);
  col*=diff;
  float terminator=smoothstep(-0.15,0.15,sunDot); // 0=night,1=day
  col+=vec3(.12,.05,.01)*(1.-terminator)*0.6; // night-side orange atmospheric edge
  gl_FragColor=vec4(col,1.);}`;  

// ── Laser Bolt — rim/NdotV glow + travelling energy pulse ─────
const laserV=`
varying vec3 vN,vVD;varying vec2 vUv;
void main(){
  vUv=uv;vN=normalMatrix*normal;
  vec4 mv=modelViewMatrix*vec4(position,1.);vVD=-mv.xyz;
  gl_Position=projectionMatrix*mv;}`;

const laserF=`
uniform float uTime;uniform vec3 uColor;
varying vec3 vN,vVD;varying vec2 vUv;
void main(){
  vec3 N=normalize(vN),V=normalize(vVD);
  float NdV=max(0.,dot(N,V)),rim=1.-NdV;
  float along=vUv.y;
  float fade=smoothstep(0.,.13,along)*smoothstep(1.,.87,along);
  float gA=pow(rim,1.1)*2.8,gB=pow(rim,.45)*1.1;
  float core=pow(NdV,3.)*1.3;
  float pulse=pow(sin(along*22.-uTime*18.)*.5+.5,2.)*.75;
  float scan=sin(along*65.-uTime*4.)*.07+.93;
  vec3 col=uColor*gB+vec3(1.)*gA+vec3(1.)*core;
  col+=uColor*pulse*rim*1.3;col*=scan;
  float alpha=(gB*.55+gA*.55+core*.4+pulse*.25)*fade;
  gl_FragColor=vec4(col,clamp(alpha,0.,1.));}`;

// ════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════
function init(){
  const canvas=document.getElementById('c');

  renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;

  // ── WebXR ─────────────────────────────────────────────────────
  renderer.xr.enabled=true;
  // Quest 3 native res is managed by the runtime; 1.0 = full native eye buffer
  try{ renderer.xr.setFramebufferScaleFactor(1.0); }catch(e){}

  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(80,innerWidth/innerHeight,0.05,5000);
  clock=new THREE.Clock();

  // ── Procedural environment cube map for metallic reflections ───────
  // Six 256² canvas faces simulating: bright top (sun), dark bottom (shadow),
  // dim sides with Jupiter glow + scattered stars. Used by scene.environment
  // so every MeshStandardMaterial with metalness > 0 picks it up automatically.
  scene.environment=(function buildEnvMap(){
    const sz=256, faces=[];
    for(let f=0;f<6;f++){
      const c=document.createElement('canvas');
      c.width=c.height=sz;
      const cx=c.getContext('2d');
      if(f===2){ // +Y top : sun & warm sky
        const g=cx.createRadialGradient(sz/2,sz/3,5,sz/2,sz/2,sz/1.4);
        g.addColorStop(0,'#fff0c8');g.addColorStop(.18,'#ffcc88');
        g.addColorStop(.55,'#553311');g.addColorStop(1,'#1a0808');
        cx.fillStyle=g;cx.fillRect(0,0,sz,sz);
      } else if(f===3){ // -Y bottom : Io shadow
        cx.fillStyle='#050202';cx.fillRect(0,0,sz,sz);
        const g=cx.createRadialGradient(sz/2,sz/2,5,sz/2,sz/2,sz/2);
        g.addColorStop(0,'#3a1808');g.addColorStop(1,'#000000');
        cx.fillStyle=g;cx.fillRect(0,0,sz,sz);
      } else { // ±X, ±Z sides : dim space with stars + Jupiter
        const g=cx.createLinearGradient(0,0,0,sz);
        g.addColorStop(0,'#181028');g.addColorStop(.7,'#060610');g.addColorStop(1,'#020208');
        cx.fillStyle=g;cx.fillRect(0,0,sz,sz);
        if(f===4){ // +Z front : Jupiter glow disc
          const j=cx.createRadialGradient(sz*.35,sz*.35,4,sz*.35,sz*.35,sz*.18);
          j.addColorStop(0,'#cc7744');j.addColorStop(.5,'#552210');
          j.addColorStop(1,'rgba(0,0,0,0)');
          cx.fillStyle=j;cx.fillRect(0,0,sz,sz);
        }
        for(let s=0;s<70;s++){
          const sx=Math.random()*sz, sy=Math.random()*sz;
          const sr=Math.random()*1.4+.3, sa=Math.random()*.7+.3;
          cx.fillStyle=`rgba(255,${230+Math.random()*25|0},${200+Math.random()*55|0},${sa})`;
          cx.beginPath();cx.arc(sx,sy,sr,0,Math.PI*2);cx.fill();
        }
      }
      faces.push(c);
    }
    const cube=new THREE.CubeTexture(faces);
    cube.needsUpdate=true;
    if(THREE.sRGBEncoding) cube.encoding=THREE.sRGBEncoding;
    return cube;
  })();

  // ── Player dolly ─────────────────────────────────────────────
  // Dolly moves through the world (locomotion).
  // The XR system offsets the camera from dolly by the physical head pose,
  // so dolly.y = terrain floor → camera appears at floor + head-height (~1.7 m).
  dolly=new THREE.Group();
  dolly.add(camera);
  scene.add(dolly);

  buildWorld();
  buildControllers();  // sets up event listeners; weapon/HUD attached on 'connected'
  buildWeaponModel();  // builds geometry; attached to rightGrip on connect
  buildWristHUD();     // builds canvas texture plane; attached to leftGrip on connect
  buildDamageFlash();
  setupXRButton();

  window.addEventListener('resize',()=>{
    renderer.setSize(innerWidth,innerHeight);
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
  });

  // Stop all audio when the page loses focus or is hidden
  // (e.g. Quest home button, browser tab switch, headset removal)
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden) stopAllAudio();
    else resumeAudioIfNeeded();
  });
  window.addEventListener('blur', stopAllAudio);
  window.addEventListener('focus', resumeAudioIfNeeded);

  renderer.setAnimationLoop(loop);
}

function buildWorld(){
  buildStarfield();
  buildJupiter();
  buildTerrain();
  buildRocks();
  buildVolcanoes();
  buildPortals();
  buildPyramids();
  buildScifiArtifacts();
  // Lighting — fixed sun position matching Io's orbital relationship with Jupiter
  ambientLight=new THREE.AmbientLight(0x201510,0.55);scene.add(ambientLight);
  sunLight=new THREE.DirectionalLight(0xffe8cc,1.6);
  sunLight.position.set(320, 480, -260).normalize().multiplyScalar(600);
  scene.add(sunLight);
  // ── Sun sprite — circular disc with radial gradient ─────────────
  // Draw on a canvas so the sun appears as a proper round glowing ball,
  // not a rectangle.  Two layered sprites: inner disc + outer corona.
  const sunPos=sunLight.position.clone().normalize().multiplyScalar(2800);

  // Inner disc: white-hot core → yellow → orange → transparent edge
  (function(){
    const sz=256;
    const c=document.createElement('canvas');c.width=c.height=sz;
    const cx=c.getContext('2d');
    const g=cx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
    g.addColorStop(0.00,'rgba(255,255,240,1.00)'); // white-hot core
    g.addColorStop(0.18,'rgba(255,248,200,1.00)'); // warm white
    g.addColorStop(0.42,'rgba(255,220,120,0.95)'); // yellow
    g.addColorStop(0.68,'rgba(255,160, 40,0.60)'); // orange glow
    g.addColorStop(0.88,'rgba(255,100, 10,0.15)'); // deep orange
    g.addColorStop(1.00,'rgba(255, 80,  0,0.00)'); // transparent
    cx.fillStyle=g;cx.fillRect(0,0,sz,sz);
    const tex=new THREE.CanvasTexture(c);
    const mat=new THREE.SpriteMaterial({map:tex,transparent:true,
      blending:THREE.AdditiveBlending,depthWrite:false});
    const sp=new THREE.Sprite(mat);
    sp.scale.setScalar(140);sp.position.copy(sunPos);
    scene.add(sp);
  })();

  // Outer corona halo: soft radial glow much larger than the disc
  (function(){
    const sz=128;
    const c=document.createElement('canvas');c.width=c.height=sz;
    const cx=c.getContext('2d');
    const g=cx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
    g.addColorStop(0.00,'rgba(255,220,120,0.45)');
    g.addColorStop(0.35,'rgba(255,180, 60,0.20)');
    g.addColorStop(0.70,'rgba(255,120, 20,0.07)');
    g.addColorStop(1.00,'rgba(255, 80,  0,0.00)');
    cx.fillStyle=g;cx.fillRect(0,0,sz,sz);
    const tex=new THREE.CanvasTexture(c);
    const mat=new THREE.SpriteMaterial({map:tex,transparent:true,
      blending:THREE.AdditiveBlending,depthWrite:false});
    const sp=new THREE.Sprite(mat);
    sp.scale.setScalar(420);sp.position.copy(sunPos);
    scene.add(sp);
  })();
  const jl=new THREE.DirectionalLight(0xcc6633,0.45);jl.position.set(-850,620,-1900);scene.add(jl);
}

function buildStarfield(){
  // Main field — 10 k stars (Quest 3 budget)
  const N=6000,p=new Float32Array(N*3),c=new Float32Array(N*3);
  const pal=[[1,.9,.8],[.65,.78,1],[1,.72,.55],[.92,.92,1],[1,1,.72],[.8,.95,1]];
  for(let i=0;i<N;i++){
    const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=2200+Math.random()*400;
    p[i*3]=r*Math.sin(ph)*Math.cos(th);p[i*3+1]=r*Math.sin(ph)*Math.sin(th);p[i*3+2]=r*Math.cos(ph);
    const cl=pal[Math.floor(Math.random()*pal.length)],b=.25+Math.random()*.75;
    c[i*3]=cl[0]*b;c[i*3+1]=cl[1]*b;c[i*3+2]=cl[2]*b;
  }
  const sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.BufferAttribute(p,3));sg.setAttribute('color',new THREE.BufferAttribute(c,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({size:1.8,sizeAttenuation:true,vertexColors:true,transparent:true,opacity:.92,depthWrite:false})));

  // Milky Way band — 5 k
  const MW=3000,ta=1.05,mp=new Float32Array(MW*3),mc=new Float32Array(MW*3);
  for(let i=0;i<MW;i++){
    const th=Math.random()*Math.PI*2,bw=Math.random()-.5;
    const ph=Math.PI/2+bw*.18*(1+2*Math.abs(bw)),r=1850+Math.random()*200;
    const x=r*Math.sin(ph)*Math.cos(th),y=r*Math.cos(ph),z=r*Math.sin(ph)*Math.sin(th);
    mp[i*3]=x;mp[i*3+1]=y*Math.cos(ta)-z*Math.sin(ta);mp[i*3+2]=y*Math.sin(ta)+z*Math.cos(ta);
    const t=Math.random(),br=.06+Math.random()*.22;
    const [rc,gc,bc]=t<.25?[.55,.65,1]:t<.55?[1,.88,.95]:t<.75?[1,.70,.45]:[.85,.90,1];
    mc[i*3]=rc*br;mc[i*3+1]=gc*br;mc[i*3+2]=bc*br;
  }
  const mwg=new THREE.BufferGeometry();mwg.setAttribute('position',new THREE.BufferAttribute(mp,3));mwg.setAttribute('color',new THREE.BufferAttribute(mc,3));
  scene.add(new THREE.Points(mwg,new THREE.PointsMaterial({size:1.4,vertexColors:true,transparent:true,opacity:.75,depthWrite:false,blending:THREE.AdditiveBlending})));

  // Nebula blobs — 80
  const NB=40,nbp=new Float32Array(NB*3),nbc=new Float32Array(NB*3);
  const npal=[[.4,.15,.7],[.1,.25,.8],[.7,.1,.3],[0,.45,.55],[.5,.3,.1]];
  for(let i=0;i<NB;i++){
    const th=Math.random()*Math.PI*2,ph=(Math.random()-.5)*.7+Math.PI/2,r=1650;
    nbp[i*3]=r*Math.sin(ph)*Math.cos(th);nbp[i*3+1]=r*Math.cos(ph)*.8;nbp[i*3+2]=r*Math.sin(ph)*Math.sin(th);
    const nc=npal[Math.floor(Math.random()*npal.length)],b=.04+Math.random()*.09;
    nbc[i*3]=nc[0]*b;nbc[i*3+1]=nc[1]*b;nbc[i*3+2]=nc[2]*b;
  }
  const nbg=new THREE.BufferGeometry();nbg.setAttribute('position',new THREE.BufferAttribute(nbp,3));nbg.setAttribute('color',new THREE.BufferAttribute(nbc,3));
  scene.add(new THREE.Points(nbg,new THREE.PointsMaterial({size:60,vertexColors:true,transparent:true,opacity:.5,depthWrite:false,blending:THREE.AdditiveBlending})));
}

function buildJupiter(){
  const jupSunDir=new THREE.Vector3(320,480,-260).normalize();
  jupU={uTime:{value:0}, uSunDir:{value:jupSunDir}};
  const jup=new THREE.Mesh(new THREE.SphereGeometry(420,64,48),new THREE.ShaderMaterial({uniforms:jupU,vertexShader:jupV,fragmentShader:jupF}));
  jup.position.set(-850,620,-1900);scene.add(jup);
  jup.add(new THREE.Mesh(new THREE.SphereGeometry(462,24,18),new THREE.MeshBasicMaterial({color:0x774422,transparent:true,opacity:.06,side:THREE.BackSide})));
  jup.add(new THREE.Mesh(new THREE.SphereGeometry(524,24,18),new THREE.MeshBasicMaterial({color:0x995533,transparent:true,opacity:.03,side:THREE.BackSide})));
}

function buildTerrain(){
  // uSunDir is the world-space sun direction — must match sunLight.position exactly
  // so the hemisphere shading aligns with the visible DirectionalLight shadow.
  const sunDir=new THREE.Vector3(320,480,-260).normalize();
  terrainU={uTime:{value:0}, uSunDir:{value:sunDir}};

  // ── Spherical planet geometry ──────────────────────────────────
  // SphereGeometry(PLANET_R, 80, 60) — 80 longitude × 60 latitude segments.
  // Each vertex is displaced RADIALLY outward by the same FBM as getH(),
  // so CPU collision and GPU shading always match.
  const geo=new THREE.SphereGeometry(PLANET_R, 80, 60);
  const pos=geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const px=pos.getX(i),py=pos.getY(i),pz=pos.getZ(i);
    const len=Math.sqrt(px*px+py*py+pz*pz)||1;
    const nx=px/len,ny=py/len,nz=pz/len;
    const r=getPlanetHeight({x:nx,y:ny,z:nz});
    pos.setXYZ(i,nx*r,ny*r,nz*r);
  }
  pos.needsUpdate=true;
  geo.computeVertexNormals();

  terrainMesh=new THREE.Mesh(geo,new THREE.ShaderMaterial({
    uniforms:terrainU,
    vertexShader:ioV,
    fragmentShader:ioF,
    side:THREE.FrontSide
  }));
  scene.add(terrainMesh);
}

function buildRocks(){
  const rc=[0xc8a020,0xd46010,0x904010,0x504030,0xe0c060,0x806040,0x302010];
  for(let i=0;i<40;i++){
    // Uniform random point on sphere surface (upper hemisphere + sides)
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(1-Math.random()*1.8); // bias toward north hemisphere
    const nx=Math.sin(phi)*Math.cos(theta), ny=Math.cos(phi), nz=Math.sin(phi)*Math.sin(theta);
    const col=rc[Math.floor(Math.random()*rc.length)];
    const mat=new THREE.MeshStandardMaterial({color:col,roughness:.85,metalness:.05,
      emissive:new THREE.Color(col),emissiveIntensity:.20});
    const sz=.4+Math.random()**2*5;

    const geo0=new THREE.IcosahedronGeometry(sz,0), pa=geo0.attributes.position;
    for(let v=0;v<pa.count;v++)pa.setXYZ(v,pa.getX(v)*(.65+Math.random()*.7),pa.getY(v)*(.65+Math.random()*.7),pa.getZ(v)*(.65+Math.random()*.7));
    geo0.computeVertexNormals();
    const m0=new THREE.Mesh(geo0,mat);
    const m1=new THREE.Mesh(new THREE.BoxGeometry(sz*1.1,sz*.9,sz*1.05),mat.clone());
    m1.visible=false;

    const grp=new THREE.Group();
    grp.add(m0,m1);
    // Place on sphere surface
    const surfR=getPlanetHeight({x:nx,y:ny,z:nz});
    const surfNorm=new THREE.Vector3(nx,ny,nz);
    grp.position.copy(surfNorm).multiplyScalar(surfR+sz*.5);
    // Orient so rock "up" aligns with surface normal, plus random tilt
    const q=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),surfNorm);
    grp.quaternion.copy(q);
    grp.rotateX((Math.random()-.5)*1.2);
    grp.rotateZ((Math.random()-.5)*1.2);
    scene.add(grp);
    rockGroups.push({grp,meshes:[m0,m1],lastLOD:-1});
  }
}

function buildVolcanoes(){
  const volcMat=new THREE.MeshStandardMaterial({color:0x201008,roughness:.95,
    emissive:new THREE.Color(0x201008),emissiveIntensity:.20});
  // Volcano directions on the sphere (normalised), with cone params
  const vDefs=[
    // Northern hemisphere (original 3)
    {dir:new THREE.Vector3(-0.55, 0.78, -0.30).normalize(), h:70, r:55},
    {dir:new THREE.Vector3( 0.42, 0.86,  0.28).normalize(), h:40, r:32},
    {dir:new THREE.Vector3(-0.35, 0.72,  0.59).normalize(), h:55, r:42},
    // Mid-latitudes and equator (6)
    {dir:new THREE.Vector3( 0.70, 0.55,  0.45).normalize(), h:48, r:38},
    {dir:new THREE.Vector3(-0.62, 0.50, -0.60).normalize(), h:62, r:50},
    {dir:new THREE.Vector3( 0.20, 0.60, -0.77).normalize(), h:35, r:28},
    {dir:new THREE.Vector3(-0.80, 0.30,  0.52).normalize(), h:58, r:44},
    {dir:new THREE.Vector3( 0.65,-0.40,  0.65).normalize(), h:45, r:36},
    {dir:new THREE.Vector3(-0.30, 0.20, -0.93).normalize(), h:72, r:58},
    // 6 new — open southern / equatorial zones
    {dir:new THREE.Vector3( 0.35,-0.62,  0.70).normalize(), h:52, r:40}, // south equatorial east
    {dir:new THREE.Vector3(-0.55,-0.60,  0.58).normalize(), h:44, r:34}, // south-southwest
    {dir:new THREE.Vector3( 0.62,-0.45, -0.65).normalize(), h:60, r:48}, // south-east negative-z
    {dir:new THREE.Vector3(-0.22,-0.72, -0.66).normalize(), h:38, r:30}, // deep south negative-z
    {dir:new THREE.Vector3( 0.90,-0.18,  0.40).normalize(), h:50, r:40}, // east equatorial
    {dir:new THREE.Vector3(-0.85,-0.14, -0.50).normalize(), h:66, r:52}, // west-southwest equatorial
  ];
  const volcMat2=volcMat.clone();
  vDefs.forEach(v=>{
    const baseR=getPlanetHeight(v.dir)-25; // embed 25 units below surface
    const basePos=v.dir.clone().multiplyScalar(baseR);
    const coneAxis=v.dir.clone(); // cone axis = radially outward
    const cy=basePos.clone().addScaledVector(coneAxis,v.h/2);

    // Orient cone so its axis aligns with surface normal
    const qCone=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),coneAxis);

    // LOD0 — full detail with vertex jitter
    const geo0=new THREE.ConeGeometry(v.r,v.h,20,4,true),pa=geo0.attributes.position;
    for(let i=0;i<pa.count;i++){pa.setX(i,pa.getX(i)+(Math.random()-.5)*4);pa.setZ(i,pa.getZ(i)+(Math.random()-.5)*4);}
    geo0.computeVertexNormals();
    const m0=new THREE.Mesh(geo0,volcMat.clone()); m0.position.copy(cy); m0.quaternion.copy(qCone); scene.add(m0);

    // LOD1
    const m1=new THREE.Mesh(new THREE.ConeGeometry(v.r,v.h,10,2,true),volcMat.clone());
    m1.position.copy(cy); m1.quaternion.copy(qCone); m1.visible=false; scene.add(m1);

    // LOD2
    const m2=new THREE.Mesh(new THREE.ConeGeometry(v.r,v.h,6,1,true),volcMat.clone());
    m2.position.copy(cy); m2.quaternion.copy(qCone); m2.visible=false; scene.add(m2);

    volcanoLODs.push({meshes:[m0,m1,m2],lastLOD:-1});

    const plumeTop=basePos.clone().addScaledVector(coneAxis,v.h);
    const ll=new THREE.PointLight(0xff5500,6+Math.random()*4,70+v.r);
    ll.position.copy(plumeTop); scene.add(ll);
    lavaLights.push({light:ll,phase:Math.random()*Math.PI*2,base:6+Math.random()*4});
    buildPlume(plumeTop.x,plumeTop.y,plumeTop.z);

    const terrainR=getPlanetHeight(coneAxis); // terrain surface radius at this volcano
    const surfacePos=coneAxis.clone().multiplyScalar(terrainR);
    volcanoColliders.push({
      basePos:basePos.clone(), surfacePos, axis:coneAxis.clone(),
      r:v.r, h:v.h, baseR, terrainR,
      mesh:m0
    });
  });
}

function buildPlume(ox,oy,oz){
  const N=120,geo=new THREE.BufferGeometry();
  const pos=new Float32Array(N*3),vel=[],life=new Float32Array(N).map(()=>Math.random());
  for(let i=0;i<N;i++){
    const a=Math.random()*Math.PI*2,r=Math.random()*3;
    pos[i*3]=ox+Math.cos(a)*r;pos[i*3+1]=oy;pos[i*3+2]=oz+Math.sin(a)*r;
    vel.push((Math.random()-.5)*3,4+Math.random()*8,(Math.random()-.5)*3);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({color:0xff5500,size:1.2,transparent:true,opacity:.75,blending:THREE.AdditiveBlending,depthWrite:false}));
  pts.userData={vel,life,ox,oy,oz,N};scene.add(pts);plumeList.push(pts);
}

function buildWeaponModel(){

  for(let i=0;i<5;i++)weaponGroup.add(mk(new THREE.CylinderGeometry(.024,.024,.003,6),mM,0,.002,-.16-i*.028,Math.PI/2,0,0));

function drawHUD(){
  if(!hudCtx||!hudTexture)return;
  const ctx=hudCtx,W=512,H=256;
  ctx.clearRect(0,0,W,H);

  // Panel
  ctx.fillStyle='rgba(0,8,18,0.92)';
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(4,4,W-8,H-8,14);ctx.fill();}
  else{ctx.fillRect(4,4,W-8,H-8);}

  ctx.strokeStyle='rgba(48,190,255,0.42)';ctx.lineWidth=2;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(4,4,W-8,H-8,14);ctx.stroke();}
  else{ctx.strokeRect(4,4,W-8,H-8);}

  const cd='rgba(48,190,255,0.48)',cb='rgba(48,190,255,0.90)';

  if(gameOverState){
    ctx.fillStyle='rgba(255,30,0,0.88)';ctx.font='bold 34px monospace';ctx.textAlign='center';

    ctx.fillText(`KILLS  ${kills}`,W/2,144);

    ctx.fillText('PULL RIGHT TRIGGER TO REDEPLOY',W/2,220);
    hudTexture.needsUpdate=true;return;
  }

  // HEALTH bar
  ctx.fillStyle=cd;ctx.font='bold 16px monospace';ctx.textAlign='left';ctx.fillText('HEALTH',16,46);
  ctx.fillStyle='rgba(18,20,28,0.85)';ctx.fillRect(90,28,306,20);
  ctx.fillStyle=`hsl(${(health/maxHealth)*25},90%,50%)`;ctx.fillRect(90,28,306*(health/maxHealth),20);
  ctx.fillStyle=cb;ctx.font='bold 14px monospace';ctx.textAlign='right';ctx.fillText(Math.ceil(health),W-16,46);

  // SHIELD bar
  ctx.fillStyle=cd;ctx.font='bold 16px monospace';ctx.textAlign='left';ctx.fillText('SHIELD',16,80);
  ctx.fillStyle='rgba(18,20,28,0.85)';ctx.fillRect(90,62,306,20);
  ctx.fillStyle=`rgba(0,110,255,${0.3+0.7*(shield/maxShield)})`;ctx.fillRect(90,62,306*(shield/maxShield),20);
  ctx.fillStyle=cb;ctx.font='bold 14px monospace';ctx.textAlign='right';ctx.fillText(Math.ceil(shield),W-16,80);

  // Divider
  ctx.fillStyle='rgba(48,190,255,0.18)';ctx.fillRect(12,96,W-24,1);

  // WEAPON name + ammo
  const wDef=WEAPONS[currentWeapon];
  const wAmmo=weaponAmmoMap[currentWeapon];
  const ammoStr=wAmmo===Infinity?'∞':(wAmmo||0).toString();
  ctx.fillStyle=`#${wDef.pickupCol.toString(16).padStart(6,'0')}`;
  ctx.font='bold 13px monospace'; ctx.textAlign='left';
  ctx.fillText(wDef.name, 16, 128);
  ctx.font='bold 36px monospace';
  ctx.fillText(ammoStr, 16, 170);
  ctx.fillStyle='rgba(48,190,255,0.35)';
  ctx.font='11px monospace';
  ctx.fillText('WALK NEAR PICKUPS TO GRAB', 16, 210);

  // ── Planet coordinates ─────────────────────────────────────────
  // Latitude  = arcsin(y)   → N/S
  // Longitude = atan2(x, z) → E/W  (x=East, z=South for our planet)
  const dir=dolly.position.clone().normalize();
  const latDeg=Math.asin(Math.max(-1,Math.min(1,dir.y)))*180/Math.PI;
  const lonDeg=Math.atan2(dir.x,dir.z)*180/Math.PI;
  const latStr=Math.abs(latDeg).toFixed(1)+'° '+(latDeg>=0?'N':'S');
  const lonStr=Math.abs(lonDeg).toFixed(1)+'° '+(lonDeg>=0?'E':'W');
  ctx.fillStyle='rgba(180,220,255,0.70)';
  ctx.font='bold 12px monospace';
  ctx.fillText(latStr, 16, 232);
  ctx.fillText(lonStr, 16, 250);

  ctx.fillText(`DRONES ${enemies.length}`,W-16,184);

    ctx.fillStyle=`hsl(${40+comboCount*15},100%,65%)`;ctx.font='bold 13px monospace';

  }
  if(shieldActive){
    ctx.fillStyle='rgba(80,140,255,.9)';ctx.font='bold 11px monospace';
    ctx.fillText(`[SHIELD] ${shieldDur.toFixed(1)}s`,W-16,220);

  // Boss health bar
  if(bossEnemy&&bossEnemy.userData){

    ctx.fillStyle='rgba(255,0,0,.7)';ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillText('BOSS',W/2,232);
    ctx.fillStyle='rgba(40,0,0,.8)';ctx.fillRect(W/2-80,235,160,10);
    ctx.fillStyle=`hsl(${bHP*12},100%,50%)`;ctx.fillRect(W/2-80,235,160*bHP,10);

//  CONTROLLERS  — Meta Quest 3 Touch controller layout
//  Left stick: move  |  Right stick: snap turn
//  Right trigger: fire  |  A: jump  |  B: dash  |  X: weapon cycle
// ════════════════════════════════════════════════════════════════
function buildControllers(){
  for(let i=0;i<2;i++){
    const ctrl=renderer.xr.getController(i);
    const grip=renderer.xr.getControllerGrip(i);
    dolly.add(ctrl,grip);

    ctrl.addEventListener('connected',e=>{
      const hand=e.data.handedness;
      if(hand==='right'){ rightCtrl=ctrl;rightGrip=grip;rightXRSource=e.data;onRightConnected();
        // Confirmation buzz — confirms haptics are alive the moment you pick up the controller
        setTimeout(()=>pulseSource(rightXRSource,1.0,200),200);
      }
      else              { leftCtrl=ctrl; leftGrip=grip; leftXRSource=e.data; onLeftConnected();  }
    });

    ctrl.addEventListener('selectstart',()=>{
      if(ctrl===rightCtrl){
        if(gameOverState){ restartGame(); return; }
        if(gameActive){
          triggerHeld=true;
          // Flame and dual ion gun use hold-fire instead of the charge mechanic
          if(currentWeapon!=='flame'&&currentWeapon!=='dual') startCharge();
        }
      }
    });

    ctrl.addEventListener('selectend',()=>{
      if(ctrl===rightCtrl && gameActive && triggerHeld){
        triggerHeld=false;
        if(currentWeapon==='flame'||currentWeapon==='dual'){
          stopCharge(); chargeTime=0; // hold-fire weapons — no charge mechanic
        } else if(chargeTime>=CHARGE_MAX){
          stopCharge();
        } else if(chargeTime<0.25){
          stopCharge(); fireWeapon();
        } else {
          stopCharge();
        }
        chargeTime=0;
      }
    });
  }
}

    bPos[i*3]=Math.sin(ph)*Math.cos(th)*r;bPos[i*3+1]=Math.sin(ph)*Math.sin(th)*r;bPos[i*3+2]=Math.cos(ph)*r;
    chargeBoidData.push({th,ph,speed:1.2+Math.random()*2.2,axis:new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize(),r});

// Returns the tip offset in rightGrip local space for the current weapon
// (after weaponGroup's scale 1.5× and position are applied)
// ── Sword blade tip marker ────────────────────────────────────────
// An invisible Object3D placed at the sword's blade tip in saber geometry
// space (0, 0.80, 0 — blade top). Used by getWeaponTipOffset().
let saberTip=null;
let tipGlowMesh=null, tipGlowMat=null; // inner bright core glow at tip
let tipHaloMesh=null, tipHaloMat=null; // outer electric halo at tip
let _tipTrailTimer=0;                  // throttle for continuous tip trails

function getWeaponTipOffset(){
  // Read the actual world position of the appropriate tip object, then
  // convert to rightGrip local space so chargeFXGroup can be positioned there.
  if(!rightGrip) return new THREE.Vector3(0,0,0);

  let worldPos=new THREE.Vector3();

  if(currentWeapon==='saber'){
    if(saberTip){
      saberTip.getWorldPosition(worldPos);
    } else {
      // Fallback: approximate — grip origin + offset along grip -Z
      rightGrip.getWorldPosition(worldPos);
    }
  } else {
    // All guns: use muzzleSphere world position (already exactly at barrel tip)
    if(muzzleSphere) muzzleSphere.getWorldPosition(worldPos);
    else rightGrip.getWorldPosition(worldPos);
  }

  // Convert world → rightGrip local so chargeFXGroup.position is correct
  return rightGrip.worldToLocal(worldPos);
}

function onLeftConnected(){
  if(!leftGrip)return;
  if(hudMesh)leftGrip.add(hudMesh);

  // Slim left controller body visual
  const lcv=new THREE.Mesh(new THREE.BoxGeometry(.028,.13,.028),new THREE.MeshStandardMaterial({color:0x223344,roughness:.5,metalness:.8}));

function setStatus(msg){document.getElementById('status').textContent=msg;}

function setupXRButton(){
  const btn=document.getElementById('vr-btn');
  if(!navigator.xr){
    btn.textContent='WebXR Not Supported';
    setStatus('Open in the Meta Quest Browser to play.');
    return;
  }
  navigator.xr.isSessionSupported('immersive-vr').then(ok=>{
    if(ok){
      btn.textContent='ENTER VR';btn.disabled=false;
      btn.onclick=enterVR;
      setStatus('Meta Quest 3 ready.');
    }else{
      btn.textContent='VR Not Available';
      setStatus('No VR headset detected. Open in the Meta Quest Browser.');
    }
  }).catch(e=>{
    btn.textContent='VR Check Failed';
    setStatus('WebXR query error: '+e.message);
  });
}

function enterVR(){
  setStatus('Requesting VR session…');
  navigator.xr.requestSession('immersive-vr',{
    requiredFeatures:['local-floor'],
    optionalFeatures:['bounded-floor','hand-tracking']
  }).then(session=>{
    renderer.xr.setSession(session);
    initAudio();
    setTimeout(startVolcanoAmbience, 600);
    setTimeout(()=>{startMusic();buildShieldMesh();}, 800); // slight delay for AudioContext to warm up
    session.addEventListener('end',onXREnd);
    document.getElementById('overlay').style.display='none';
    startGame();
  }).catch(e=>{setStatus('Session error: '+e.message);});
}

// ── Stop all audio ────────────────────────────────────────────────
// Suspends the AudioContext immediately — kills all oscillators,
// noise buffers, panners, and bolt buzz nodes in one call.
// Used on XR session end, game over, and page losing focus.
function stopAllAudio(){
  if(!audioCtx)return;
  for(const p of eBolts) stopBoltBuzz(p);
  stopVolcanoAmbience();
  stopAllEnemyHums();
  stopMusic();
  audioCtx.suspend().catch(()=>{});
}

function resumeAudioIfNeeded(){
  if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume().catch(()=>{});
}

function onXREnd(){
  document.getElementById('overlay').style.display='flex';
  gameActive=false;gameOverState=false;
  stopAllAudio();
}

// ── Haptic feedback ───────────────────────────────────────────────
// Calls pulse() directly on the stored XRInputSource gamepad actuator.
// This is the only haptic API that works in WebXR on Meta Quest 3.
//
// Key facts that tripped up the previous implementation:
//  • vibrationActuator / playEffect are Web Gamepad API — NOT WebXR
//  • hapticActuators[0].pulse(intensity, durationMs) is the WebXR API
//  • XRInputSource refs from the 'connected' event are stable for the
//    session lifetime, so we store them and call directly — no lookup
//  • All call sites (selectstart, loop body) are inside the XR frame
//    so no queue is needed; pulse() is valid to call here directly
//
// intensity : 0.0 – 1.0
// duration  : milliseconds

function pulseSource(src, intensity, duration){
  if(!src||!src.gamepad)return;
  const acts=src.gamepad.hapticActuators;
  if(acts&&acts.length){
    acts[0].pulse(Math.min(1,Math.max(0,intensity)), duration);
  }
}

function haptic(hand, intensity, duration){
  if(hand==='right') pulseSource(rightXRSource, intensity, duration);
  else               pulseSource(leftXRSource,  intensity, duration);
}

// drainHaptics is no longer needed — kept as a no-op so loop() call is harmless
function drainHaptics(){}

function fireWeapon(){
  if(!rightGrip||fireCooldown>0||!gameActive)return;
  const def=WEAPONS[currentWeapon];
  if(def.ammo!==Infinity&&(weaponAmmoMap[currentWeapon]||0)<=0) return;
  fireCooldown=def.rate;
  if(def.ammo!==Infinity) weaponAmmoMap[currentWeapon]--;
  // Auto-switch to laser when this weapon is now empty
  if(def.ammo!==Infinity&&(weaponAmmoMap[currentWeapon]||0)<=0){
    setTimeout(()=>{ equipWeapon('laser'); speak('Switching to laser'); },150);
  }
  drawHUD();

  // Muzzle flash
  muzzleLight.intensity=7;mfTimer=.068;muzzleSphere.visible=true;
  kickZ=.05;kickRX=-.14;
  haptic('right',1.0,120);

  triggerMuzzleCone(currentWeapon);
  degradeWeapon();

  // Dispatch
  if(currentWeapon==='laser')   { playPlayerShot(); fireLaser(); }
  else if(currentWeapon==='shotgun') { playPlayerShot(); fireShotgun(); }
  else if(currentWeapon==='grenade'){ playPlayerShot(); fireGrenade(); }
  else if(currentWeapon==='saber')  { fireSaber(); }
  else if(currentWeapon==='rail')   { fireRail(); }
  else if(currentWeapon==='rocket') { playPlayerShot(); fireRocket(); }
  else if(currentWeapon==='dual')   { playPlayerShot(); fireDual(); }
  else if(currentWeapon==='flame')  { fireFlame(); }
  else if(currentWeapon==='cannon') { fireCannon(); }
}

function spawnBolt(startPos,dir,isEnemy,boltSpd=22,boltDmg=10){
  const LEN=1.5,grp=new THREE.Group();
  grp.position.copy(startPos);
  const d=dir.clone().normalize();
  grp.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),d);

  if(isEnemy){
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(.008,.008,LEN,5),new THREE.MeshBasicMaterial({color:0xff2200})));
    const u={uTime:{value:0},uColor:{value:new THREE.Color(.9,.12,0)}};
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(.055,.055,LEN,6,1,true),new THREE.ShaderMaterial({uniforms:u,vertexShader:laserV,fragmentShader:laserF,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide})));
    grp.add(new THREE.PointLight(0xff2200,3.5,10));
    grp.userData={vel:d.clone().multiplyScalar(boltSpd),age:0,unis:[u],dmg:boltDmg};
    scene.add(grp);eBolts.push(grp);
    createBoltBuzz(grp);  // attach live 3-D buzz that follows this bolt
  }else{
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(.010,.010,LEN,7),new THREE.MeshBasicMaterial({color:0xffffff})));
    const u1={uTime:{value:0},uColor:{value:new THREE.Color(0,.67,1)}};
    const u2={uTime:{value:0},uColor:{value:new THREE.Color(.27,.8,1)}};
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(.060,.060,LEN,8,1,true),new THREE.ShaderMaterial({uniforms:u1,vertexShader:laserV,fragmentShader:laserF,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide})));
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(.030,.030,LEN*1.02,6,1,true),new THREE.ShaderMaterial({uniforms:u2,vertexShader:laserV,fragmentShader:laserF,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide})));
    grp.add(new THREE.PointLight(0x22aaff,4,12));
    grp.userData={vel:d.clone().multiplyScalar(95),age:0,unis:[u1,u2]};
    scene.add(grp);pBolts.push(grp);
  }
}
